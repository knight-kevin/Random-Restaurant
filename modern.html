<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="人间寻味记" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#fff7e8" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <title>人间寻味记</title>
    <style>
      :root {
        color: #1e2329;
        background:
          radial-gradient(circle at 12% 8%, rgba(255, 88, 110, 0.26), transparent 28rem),
          radial-gradient(circle at 88% 16%, rgba(66, 211, 255, 0.22), transparent 30rem),
          radial-gradient(circle at 55% 96%, rgba(255, 205, 78, 0.24), transparent 30rem),
          linear-gradient(135deg, #fff8f0 0%, #f7fbff 48%, #fff3fb 100%);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { margin: 0; min-width: 320px; min-height: 100vh; min-height: 100dvh; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); overscroll-behavior-y: contain; }
      body.is-filter-open { position: fixed; width: 100%; overflow: hidden; }
      button, input, textarea { font: inherit; }
      button, a { touch-action: manipulation; }
      button { border: 0; cursor: pointer; }
      button:disabled { cursor: not-allowed; opacity: 0.7; }

      .app-shell { width: min(1160px, calc(100% - 32px)); margin: 0 auto; padding: 22px 0 48px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 18px 20px; }
      h1, h2, h3 { margin: 0; letter-spacing: 0; }
      h1 { margin-top: 4px; font-size: clamp(2rem, 4.8vw, 4rem); line-height: 1.02; }
      .eyebrow { margin: 0; color: #7d5544; font-size: 0.78rem; font-weight: 800; letter-spacing: 0; }
      .top-actions { display: flex; gap: 8px; padding: 6px; border: 1px solid rgba(255, 91, 91, 0.18); border-radius: 999px; background: rgba(255,255,255,.78); box-shadow: 0 18px 42px rgba(45,54,60,.08); }
      .nav-action { min-height: 42px; border-radius: 999px; padding: 0 16px; background: transparent; color: #33423a; font-weight: 800; }
      .nav-action.is-active { background: linear-gradient(135deg, #ff5b6e, #ff8a3d); color: #fff; }

      .home-grid { display: grid; grid-template-columns: minmax(0, 1.35fr) minmax(320px, .65fr); gap: 18px; align-items: start; }
      .home-grid > * { min-width: 0; }
      .panel, .hero-stage { border: 1px solid rgba(255,255,255,.74); border-radius: 8px; background: rgba(255,255,255,.86); box-shadow: 0 24px 70px rgba(42,55,83,.13); backdrop-filter: blur(18px); }
      .hero-stage { width: 100%; min-width: 0; overflow: visible; padding: clamp(20px, 3vw, 32px); backdrop-filter: none; }
      .hero-copy { display: grid; gap: 10px; max-width: 720px; }
      .hero-copy .eyebrow { font-size: clamp(.98rem, 1.5vw, 1.12rem); }
      .hero-copy h2 { font-family: inherit; font-size: clamp(1.9rem, 5vw, 4.6rem); font-weight: 900; line-height: 1.02; }
      .hero-copy p:last-child { max-width: 560px; margin: 0; color: #5d6870; font-size: 1.02rem; line-height: 1.7; }
      .filter-panel { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)) auto; gap: 12px; align-items: end; margin-top: 20px; padding: 14px; border: 1px solid rgba(255,91,91,.18); border-radius: 8px; background: rgba(255,255,255,.82); }
      .filter-panel label, .filter-field { display: grid; gap: 7px; color: #39493f; font-weight: 800; min-width: 0; }
      .filter-panel span { font-size: .82rem; color: #7d5544; }
      .filter-panel select { min-height: 42px; border: 1px solid #cbd5c4; border-radius: 8px; padding: 0 12px; background: #fff; color: #1f2933; outline: none; font-weight: 700; }
      .multi-filter { position: relative; min-width: 0; }
      .multi-filter-button { display: flex; width: 100%; min-height: 42px; align-items: center; justify-content: space-between; gap: 10px; border: 1px solid #cbd5c4; border-radius: 8px; padding: 0 12px; background: #fff; color: #1f2933; font-weight: 700; text-align: left; }
      .multi-filter-button::after { content: "⌄"; color: #687274; font-size: 1rem; transition: transform .18s ease; }
      .multi-filter.is-open .multi-filter-button { border-color: #ff725e; box-shadow: 0 0 0 3px rgba(255,114,94,.12); }
      .multi-filter.is-open .multi-filter-button::after { transform: rotate(180deg); }
      .multi-filter-menu { position: absolute; z-index: 12; top: calc(100% + 7px); left: 0; width: max(100%, 220px); max-height: 280px; overflow: auto; padding: 8px; border: 1px solid rgba(255,114,94,.2); border-radius: 8px; background: #fff; box-shadow: 0 18px 42px rgba(42,55,83,.18); }
      .multi-filter-option { display: flex; grid-template-columns: none; align-items: center; gap: 9px; padding: 9px 8px; border-radius: 6px; color: #33423a; cursor: pointer; }
      .multi-filter-option:hover { background: #fff3ee; }
      .multi-filter-option input { width: 18px; height: 18px; margin: 0; accent-color: #ff654f; }
      .multi-filter-option span { color: inherit; font-size: .88rem; }
      .filter-summary { margin: 0; color: #53655a; font-size: .9rem; font-weight: 800; white-space: nowrap; }
      .food-filter { position: relative; z-index: 31; width: 100%; min-width: 0; margin-top: 20px; }
      .category-tabs { display: flex; width: 100%; min-width: 0; gap: 24px; overflow-x: auto; padding: 0 4px 12px; scrollbar-width: none; }
      .category-tabs::-webkit-scrollbar { display: none; }
      .category-tab { position: relative; flex: 0 0 auto; padding: 8px 0; background: transparent; color: #20252a; font-weight: 900; white-space: nowrap; }
      .category-tab.is-active { color: #ff5b37; }
      .category-tab.is-active::after { position: absolute; right: 0; bottom: 0; left: 0; height: 4px; border-radius: 4px; background: #ff5b37; content: ""; }
      .filter-entry-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      .filter-entry { display: flex; min-width: 0; min-height: 42px; align-items: center; justify-content: center; gap: 5px; padding: 6px 9px; border: 1px solid #ece8e3; border-radius: 9px; background: #f8f8f7; color: #25292d; font-size: .9rem; font-weight: 900; line-height: 1; white-space: nowrap; box-shadow: 0 4px 12px rgba(38,42,47,.04); }
      .filter-entry::after { flex: 0 0 auto; content: "⌄"; color: #596068; font-size: .82rem; line-height: 1; }
      .filter-entry.is-active { border-color: #ffb6a2; background: #fff1eb; color: #ff5b37; }
      .filter-entry.is-active::after { transform: rotate(180deg); }
      .filter-entry small { display: block; max-width: 100%; overflow: hidden; color: #777d82; font-size: .7rem; font-weight: 700; text-overflow: ellipsis; white-space: nowrap; }
      .filter-dropdown { position: absolute; top: calc(100% + 10px); right: 0; left: 0; display: flex; max-height: min(75vh, 650px); flex-direction: column; border: 1px solid #eee9e4; border-radius: 8px; background: #fff; box-shadow: 0 22px 50px rgba(42,55,83,.16); overflow: hidden; }
      .filter-dropdown-inner { min-height: 0; overflow: auto; overscroll-behavior: contain; padding: 18px; -webkit-overflow-scrolling: touch; }
      .filter-backdrop { position: fixed; z-index: 25; inset: 0; background: rgba(25,29,34,.22); backdrop-filter: blur(1px); }
      .filter-panel-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; font-weight: 900; }
      .location-status { color: #5d6870; font-size: .86rem; font-weight: 700; }
      .location-action { padding: 8px 10px; border-radius: 7px; background: #fff1eb; color: #ff5b37; font-weight: 900; }
      .choice-row { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
      .choice-button { min-height: 42px; border: 1px solid transparent; border-radius: 7px; background: #f7f7f6; color: #30353a; font-weight: 800; }
      .choice-button.is-selected { border-color: #ff6547; background: #fff2ed; color: #ff5433; }
      .area-picker { display: grid; grid-template-columns: 128px minmax(0, .8fr) minmax(0, 1.2fr); min-height: 330px; margin-top: 16px; border-top: 1px solid #f0ece8; }
      .area-level { display: grid; align-content: start; gap: 2px; padding: 10px 0; }
      .area-level + .area-level { border-left: 1px solid #f0ece8; }
      .area-option { min-height: 44px; padding: 8px 14px; background: transparent; color: #30353a; text-align: left; }
      .area-option.is-selected { background: #f7f7f6; color: #ff5b37; font-weight: 900; }
      .food-picker { display: grid; grid-template-columns: 112px minmax(0, 1fr); min-height: 390px; }
      .food-group-nav { display: grid; align-content: start; border-right: 1px solid #f0ece8; background: #fafafa; }
      .food-group-nav-button { min-height: 52px; padding: 8px 12px; background: transparent; color: #30353a; text-align: left; font-weight: 800; }
      .food-group-nav-button.is-selected { background: #fff; color: #ff5b37; }
      .food-groups { display: grid; align-content: start; gap: 18px; padding-left: 16px; }
      .food-group { display: grid; gap: 14px; align-items: start; }
      .food-group-title { display: grid; gap: 5px; justify-items: start; color: #25292d; font-weight: 900; }
      .food-group-title span:first-child { display: grid; width: 34px; height: 34px; place-items: center; border-radius: 50%; background: #fff1eb; color: #ff5b37; }
      .food-options { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .food-option { min-height: 46px; padding: 8px 10px; border: 1px solid transparent; border-radius: 7px; background: #f8f8f7; color: #30353a; font-weight: 800; }
      .food-option.is-selected { border-color: #ff6547; background: #fff2ed; color: #ff5433; }
      .sort-options { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .sort-option { display: flex; min-height: 50px; align-items: center; justify-content: space-between; padding: 0 14px; border: 1px solid #ece8e3; border-radius: 7px; background: #fff; color: #30353a; font-weight: 800; }
      .sort-option.is-selected { border-color: #ff6547; background: #fff2ed; color: #ff5433; }
      .filter-footer { display: flex; flex: 0 0 auto; justify-content: space-between; gap: 10px; padding: 12px 18px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid #eee9e4; background: #fff; box-shadow: 0 -8px 20px rgba(31,41,51,.06); }
      .filter-footer button { min-height: 44px; border-radius: 8px; padding: 0 22px; font-weight: 900; }
      .filter-reset { background: #f5f5f4; color: #454b50; }
      .filter-confirm { flex: 1; max-width: 280px; background: linear-gradient(135deg, #ff704d, #ff4d32); color: #fff; }
      .active-filter-summary { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; margin: 12px 2px 0; color: #53655a; font-size: .86rem; font-weight: 800; }
      .filter-token { padding: 4px 8px; border-radius: 999px; background: #fff1eb; color: #ff5b37; }

      .reel-shell { position: relative; margin-top: 24px; padding: 18px; border-radius: 8px; background: radial-gradient(circle at 38% 28%, rgba(255,125,99,.38), transparent 30%), radial-gradient(circle at 70% 18%, rgba(87,204,255,.26), transparent 32%), linear-gradient(160deg, #222a5a, #111827 72%); box-shadow: inset 0 0 0 1px rgba(255,255,255,.12), 0 18px 46px rgba(35,45,85,.18); }
      .reel-window { position: relative; height: 430px; overflow: hidden; border-radius: 8px; perspective: 1200px; }
      .reel-window::before { position: absolute; z-index: 0; inset: 42px 10%; content: ""; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,.11), rgba(255,211,108,.08) 42%, transparent 68%); box-shadow: inset 0 0 50px rgba(255,255,255,.1), 0 0 60px rgba(255,211,108,.14); }
      .reel-marker { position: absolute; z-index: 4; top: 50%; left: 50%; width: 10px; height: 10px; border-radius: 50%; transform: translate(-50%, -50%); background: #ffd36c; box-shadow: 0 0 0 8px rgba(255,211,108,.16), 0 0 30px rgba(255,211,108,.55); }
      .reel-track { position: absolute; z-index: 2; inset: 0; transform-style: preserve-3d; transform: rotateX(10deg) rotateY(0deg); will-change: transform; }
      .reel-track.is-revealed .reel-card:not(.is-final) { opacity: 0; filter: blur(10px) saturate(.45); pointer-events: none; transition: opacity .38s ease, filter .38s ease; }
      .reel-track.is-revealed .reel-card.is-final { animation: finalReveal 1.05s cubic-bezier(.16,1,.3,1) both; }
      .reel-card { position: absolute; top: 50%; left: 50%; width: 128px; height: 154px; overflow: hidden; border-radius: 44% / 18%; clip-path: ellipse(61% 51% at 50% 50%); background: #fffaf2; box-shadow: 0 18px 36px rgba(0,0,0,.24); transform: translate(-50%, -50%) rotateY(var(--theta)) rotateX(var(--phi)) rotateZ(var(--twist)) translateZ(var(--radius)) scaleX(var(--curve-scale)) scale(var(--card-scale)); transform-style: preserve-3d; opacity: var(--depth-opacity); filter: saturate(var(--depth-saturation)) brightness(var(--depth-light)); backface-visibility: visible; transition: opacity .24s ease, filter .24s ease; }
      .reel-card::before { position: absolute; z-index: 3; inset: -2px; content: ""; border-radius: inherit; background: radial-gradient(circle at 50% 42%, transparent 0 46%, rgba(10,25,36,.24) 72%, rgba(10,25,36,.42) 100%); pointer-events: none; mix-blend-mode: multiply; }
      .reel-card::after { position: absolute; z-index: 4; inset: 0; content: ""; border-radius: inherit; background: linear-gradient(100deg, rgba(255,255,255,.38), transparent 34%, rgba(0,0,0,.28)); pointer-events: none; }
      .reel-card.is-final { z-index: 8; width: 238px; height: 300px; border-radius: 24px; clip-path: inset(0 round 24px); box-shadow: 0 28px 58px rgba(0,0,0,.36), 0 0 0 3px rgba(255,211,108,.76), 0 0 36px rgba(255,211,108,.28); }
      .food-photo { display: grid; height: 94px; place-items: center; background-color: #cf4f35; background-image: radial-gradient(circle at 50% 48%, rgba(255,255,255,.18), rgba(255,255,255,0) 38%), linear-gradient(135deg, rgba(243,180,92,.65), rgba(207,79,53,.24)), var(--food-image); background-size: cover; background-position: center; }
      .food-photo span { display: grid; width: 58px; height: 58px; place-items: center; border-radius: 50%; background: rgba(255,255,255,.88); color: #a33824; font-size: 1.25rem; font-weight: 900; box-shadow: 0 16px 28px rgba(30,35,41,.18); }
      .reel-card h3 { padding: 10px 10px 0; font-size: .86rem; }
      .reel-card p { margin: 4px 0 0; padding: 0 10px; color: #687274; font-size: .76rem; }
      .reel-card.is-final .food-photo { height: 96px; }
      .reel-card.is-final h3 { padding: 11px 13px 0; overflow-wrap: anywhere; font-size: .92rem; line-height: 1.25; }
      .reel-card.is-final p { padding-inline: 13px; overflow-wrap: anywhere; font-size: .7rem; line-height: 1.38; }
      .reel-card.is-final .tag-line { padding: 7px 13px 0; }
      .reel-card.is-final .tag-line .mini-tag:nth-child(n+2) { display: none; }
      .reel-placeholder { display: grid; position: relative; z-index: 2; height: 100%; place-items: center; color: rgba(255,255,255,.72); text-align: center; }
      @keyframes finalReveal { 0% { transform: translate(-50%, -50%) rotateY(-34deg) rotateX(12deg) translateZ(120px) scale(.56); opacity: 0; filter: blur(8px) saturate(.8); } 55% { opacity: 1; filter: blur(0) saturate(1.05); } 100% { transform: translate(-50%, -50%) rotateY(var(--theta)) rotateX(var(--phi)) rotateZ(0deg) translateZ(var(--radius)) scaleX(1) scale(var(--card-scale)); opacity: 1; filter: blur(0) saturate(1.12); } }

      .random-controls { display: grid; grid-template-columns: auto 1fr; gap: 18px; align-items: center; margin-top: 22px; }
      .count-pill { display: grid; min-width: 98px; min-height: 98px; place-items: center; padding: 12px; border-radius: 50%; background: #fff2f5; color: #f04462; box-shadow: inset 0 0 0 1px rgba(240,68,98,.12), 0 14px 30px rgba(240,68,98,.12); }
      .count-pill strong { font-size: 2rem; line-height: 1; }
      .count-pill span { font-size: .82rem; font-weight: 800; }
      .random-button { min-height: clamp(108px, 15vw, 160px); border-radius: 999px; background: radial-gradient(circle at 34% 18%, rgba(255,255,255,.38), transparent 30%), linear-gradient(135deg, #ff5b6e, #ff8a3d 50%, #8b5cf6); color: #fff; font-size: clamp(1.45rem, 4vw, 2.65rem); font-weight: 900; box-shadow: 0 22px 44px rgba(255,91,110,.28), inset 0 -10px 24px rgba(88,30,110,.18); transition: transform .18s ease, filter .18s ease; }
      .random-button:hover { transform: translateY(-2px) scale(1.01); }
      .random-button:active { transform: translateY(1px) scale(.99); }

      .result-card { display: grid; gap: 16px; margin-top: 22px; padding: 20px; border: 1px solid rgba(255,91,110,.22); border-radius: 8px; background: linear-gradient(135deg, #fff, #fff1f5 52%, #fff8e8); box-shadow: 0 18px 44px rgba(255,91,110,.12); }
      .result-card h3 { margin-top: 4px; font-size: clamp(1.8rem, 5vw, 3.2rem); }
      .result-card dl { display: grid; gap: 12px; margin: 0; }
      .result-card dt { color: #7d5544; font-size: .85rem; font-weight: 900; }
      .result-card dd { margin: 4px 0 0; line-height: 1.6; }
      .quiet-hint { margin-top: 18px; color: #687274; text-align: center; }

      .panel { padding: 20px; }
      .manage-panel { max-width: 980px; margin: 18px auto 0; }
      .section-heading { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
      .section-heading h2 { margin-top: 3px; font-size: 1.45rem; }
      .success-action, .secondary-action, .ghost-action, .danger-action, .map-action { min-height: 42px; border-radius: 8px; padding: 10px 14px; font-weight: 800; }
      .success-action, .secondary-action { background: #1f5d4a; color: #fff; }
      .ghost-action { border: 1px solid #c7d0c2; background: #fff; color: #2d4c3a; }
      .danger-action { border: 1px solid #efc4ba; background: #fff5f2; color: #9b341c; }
      .map-action { display: inline-flex; align-items: center; justify-content: center; text-decoration: none; background: #fff4d4; color: #8a421f; border: 1px solid rgba(138,66,31,.16); }
      .result-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

      .restaurant-form { display: grid; gap: 14px; padding-bottom: 18px; border-bottom: 1px solid #e4e8df; }
      .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
      label { display: grid; gap: 7px; color: #39493f; font-weight: 800; }
      label span { font-size: .9rem; }
      input, textarea, select { width: 100%; border: 1px solid #cbd5c4; border-radius: 8px; padding: 11px 12px; background: #fff; color: #1f2933; outline: none; }
      textarea { resize: vertical; }
      input:focus, textarea:focus { border-color: #1f5d4a; box-shadow: 0 0 0 3px rgba(31,93,74,.12); }
      .form-actions, .row-actions { display: flex; flex-wrap: wrap; gap: 10px; }
      .restaurant-list, .history-list { display: grid; gap: 10px; margin-top: 18px; max-height: 640px; overflow: auto; padding-right: 4px; }
      .list-card { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 14px; align-items: center; padding: 14px; border: 1px solid #e0e6dc; border-radius: 8px; background: #fff; }
      .list-card.is-editing { border-color: #d95f35; background: #fff8f2; }
      .list-card h3 { margin-bottom: 5px; font-size: 1.02rem; }
      .list-card p, .list-card time { display: block; margin: 0; color: #53655a; line-height: 1.55; }
      .muted { color: #7d887d !important; }
      .tag-line { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
      .mini-tag { width: fit-content; padding: 3px 8px; border-radius: 999px; background: #fff4d4; color: #8a421f; font-size: .76rem; font-weight: 800; }
      .thought-text { margin-top: 8px !important; padding: 10px; border-radius: 8px; background: #f8fbf4; color: #39493f !important; }
      .rating-summary { display: grid; gap: 7px; margin-top: 10px; padding: 12px; border-radius: 8px; background: #fffaf0; border: 1px solid rgba(138,66,31,.12); }
      .rating-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
      .rating-chip { display: grid; gap: 3px; padding: 8px; border-radius: 8px; background: rgba(255,255,255,.78); color: #8a421f; font-weight: 900; text-align: center; }
      .rating-chip span { color: #687274; font-size: .72rem; font-weight: 800; }
      .review-form { display: grid; gap: 12px; margin-top: 12px; padding: 12px; border: 1px solid #dfe7d9; border-radius: 8px; background: #fbfcf8; }
      .review-score-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
      .review-form select { min-height: 40px; }
      .review-images { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
      .review-images img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 2px solid #fff; box-shadow: 0 10px 22px rgba(31,41,51,.16); cursor: zoom-in; }
      .image-preview { position: fixed; z-index: 60; inset: 0; display: grid; place-items: center; padding: max(20px, env(safe-area-inset-top)) 18px max(20px, env(safe-area-inset-bottom)); background: rgba(12,15,20,.9); }
      .image-preview[hidden] { display: none; }
      .image-preview img { display: block; max-width: min(94vw, 1100px); max-height: 88vh; object-fit: contain; border-radius: 8px; box-shadow: 0 30px 80px rgba(0,0,0,.48); }
      .image-preview-close { position: fixed; top: max(14px, env(safe-area-inset-top)); right: max(14px, env(safe-area-inset-right)); display: grid; width: 44px; height: 44px; place-items: center; border-radius: 50%; background: rgba(255,255,255,.16); color: #fff; font-size: 1.7rem; line-height: 1; backdrop-filter: blur(10px); }
      body.is-image-preview-open { overflow: hidden; }
      .history-list .list-card { grid-template-columns: minmax(0, 1fr); align-items: start; }
      .history-list .list-card > div { min-width: 0; }

  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">

            <label><span>餐厅名称 *</span><input id="name-input" placeholder="例如：餐厅 100" required /></label>

    <button class="filter-backdrop" id="filter-backdrop" type="button" aria-label="关闭筛选面板" hidden></button>
    <div class="image-preview" id="image-preview" role="dialog" aria-modal="true" aria-label="图片预览" hidden>
      <button class="image-preview-close" id="image-preview-close" type="button" aria-label="关闭图片预览">×</button>
      <img id="image-preview-content" alt="打卡图片预览" />
    </div>
    <div class="toast" id="toast" hidden></div>

    <script type="module">
      import {
        CATEGORY_LABELS,
        CATEGORY_TABS,
        FOOD_GROUPS,
        getCategoryLabel,
        inferRestaurantCategory,
        inferSubcategory,
        matchesFoodSelection,
      } from "./scripts/categories.js?v=20260625-v13";
      import {
        formatDistance,
        getRestaurantDistance,
        parseAverageCost,
        requestCurrentPosition,
      } from "./scripts/location-fixed.js?v=20260625-v13";

      const RESTAURANTS_KEY = "random-restaurant-checkin:restaurants";
      const RESTAURANTS_VERSION_KEY = "random-restaurant-checkin:restaurants-version";
      const CURRENT_DATASET_VERSION = "amap-hangzhou-1300-2026-06-25-v13";
      const CHECK_INS_KEY = "random-restaurant-checkin:check-ins";
      const ROLL_DURATION_MS = 3000;
      const REEL_LENGTH = 32;
      const DISTANCE_OPTIONS = [
        { value: 0, label: "不限" },
        { value: 500, label: "500m" },
        { value: 1000, label: "1km" },
        { value: 3000, label: "3km" },
        { value: 5000, label: "5km" },
        { value: 10000, label: "10km" },
      ];
      const SORT_OPTIONS = [
        { value: "recommended", label: "综合排序" },
        { value: "distance", label: "距离优先" },
        { value: "rating", label: "好评优先" },
        { value: "cost-asc", label: "人均从低到高" },
        { value: "cost-desc", label: "人均从高到低" },
      ];
      const DISTRICT_RULES = [
        { district: "西湖区", keywords: ["象山", "小和山", "屏峰", "转塘", "龙坞", "袁浦", "之江", "小和山新苑", "西溪", "留下", "石马", "西联", "西文", "高教园", "首尔印象", "星光荟", "奥莱金街", "象山国际", "象山站", "七贤山居"] },
        { district: "拱墅区", keywords: ["大关", "上塘", "香积寺", "胜利河", "河东路", "新天地", "海外海", "乐堤港", "中大银泰", "大关大润发", "上塘路", "香积寺路"] },
        { district: "萧山区", keywords: ["萧山", "西子丁兰"] },
        { district: "余杭区", keywords: ["良渚", "海创园", "永旺", "永旺梦乐城", "西溪印象城"] },
        { district: "钱塘区", keywords: ["下沙", "高教园", "金沙湖", "文海南路", "下沙江滨"] },
        { district: "上城区", keywords: ["景芳", "新塘路", "九堡", "信义坊", "丁兰", "西子丁兰"] },
        { district: "滨江区", keywords: ["滨江", "西兴", "长河", "浦沿"] },
        { district: "临平区", keywords: ["临平", "乔司"] },
        { district: "富阳区", keywords: ["富阳"] },
      ];

      let initialRestaurants = [];
      let restaurants = [];
      let checkIns = readJson(CHECK_INS_KEY, []);
      let selectedRestaurant = null;
      let pendingRestaurant = null;
      let editingRestaurantId = null;
      let editingReviewId = null;
      let activeCategoryTab = "recommend";
      let selectedFoodValues = new Set();
      let selectedLocations = new Set();
      let selectedBusinessAreas = new Set();
      let selectedDistance = 0;
      let selectedSort = "recommended";
      let activeFilterPanel = "";
      let activeAreaLevel = "district";
      let activeAreaDistrict = "";
      let activeFoodGroup = "popular";
      let userPosition = null;
      let locationStatus = "尚未定位";
      let isLocating = false;
      let lockedScrollY = 0;
      let restaurantDistances = new Map();
      let isRolling = false;
      let toastTimer = 0;
      let audioContext = null;
      let sphereFrame = 0;
      let sphereLastTime = performance.now();
      let sphereRotationY = 0;
      let rollStartedAt = 0;

      const elements = {
        homeTab: document.querySelector("#home-tab"),
        manageTab: document.querySelector("#manage-tab"),
        homeView: document.querySelector("#home-view"),
        manageView: document.querySelector("#manage-view"),
        backHomeButton: document.querySelector("#back-home-button"),
        count: document.querySelector("#restaurant-count"),
        manageCount: document.querySelector("#manage-count"),
        categoryTabs: document.querySelector("#category-tabs"),
        nearbyFilterButton: document.querySelector("#nearby-filter-button"),
        foodFilterButton: document.querySelector("#food-filter-button"),
        sortFilterButton: document.querySelector("#sort-filter-button"),
        filterDropdown: document.querySelector("#filter-dropdown"),
        filterDropdownContent: document.querySelector("#filter-dropdown-content"),
        filterBackdrop: document.querySelector("#filter-backdrop"),
        filterResetButton: document.querySelector("#filter-reset-button"),
        filterConfirmButton: document.querySelector("#filter-confirm-button"),
        imagePreview: document.querySelector("#image-preview"),
        imagePreviewClose: document.querySelector("#image-preview-close"),
        imagePreviewContent: document.querySelector("#image-preview-content"),
        filterSummary: document.querySelector("#filter-summary"),
        pickButton: document.querySelector("#pick-button"),
        reelArea: document.querySelector("#reel-area"),
        resultArea: document.querySelector("#result-area"),
        clearHistoryButton: document.querySelector("#clear-history-button"),
        historyList: document.querySelector("#history-list"),
        form: document.querySelector("#restaurant-form"),
        nameInput: document.querySelector("#name-input"),
        addressInput: document.querySelector("#address-input"),
        restaurantCategoryInput: document.querySelector("#restaurant-category-input"),
        noteInput: document.querySelector("#note-input"),
        submitButton: document.querySelector("#submit-button"),
        cancelEditButton: document.querySelector("#cancel-edit-button"),
        restaurantList: document.querySelector("#restaurant-list"),
        toast: document.querySelector("#toast"),
      };

      bootstrap();

      async function bootstrap() {
        initialRestaurants = await fetch(`restaurants.json?v=${CURRENT_DATASET_VERSION}`, { cache: "no-store" }).then((response) => response.json());
        restaurants = readRestaurants();
        bindEvents();
        render();
        renderReel(buildRollingReel(), false);
        sphereFrame = requestAnimationFrame(animateSphere);
      }

      function bindEvents() {
        elements.homeTab.addEventListener("click", () => { closeFilterPanel(); switchView("home"); });
        elements.manageTab.addEventListener("click", () => { closeFilterPanel(); switchView("manage"); });
        elements.backHomeButton.addEventListener("click", () => { closeFilterPanel(); switchView("home"); });
        elements.categoryTabs.addEventListener("click", handleCategoryTabClick);
        document.querySelectorAll("[data-filter-panel]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            toggleFilterPanel(button.dataset.filterPanel);
          });
        });
        elements.filterDropdownContent.addEventListener("click", handleFilterPanelClick);
        elements.filterBackdrop.addEventListener("click", closeFilterPanel);
        elements.imagePreview.addEventListener("click", (event) => {
          if (event.target === elements.imagePreview) closeImagePreview();
        });
        elements.imagePreviewClose.addEventListener("click", closeImagePreview);
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && !elements.imagePreview.hidden) closeImagePreview();
        });
        elements.filterResetButton.addEventListener("click", resetActiveFilterPanel);
        elements.filterConfirmButton.addEventListener("click", closeFilterPanel);
        document.addEventListener("click", (event) => {
          if (!event.composedPath().includes(document.querySelector(".food-filter"))) closeFilterPanel();
        });
        elements.pickButton.addEventListener("click", pickRestaurant);
        elements.clearHistoryButton.addEventListener("click", clearHistory);
        elements.cancelEditButton.addEventListener("click", () => { resetForm(); render(); });
        elements.form.addEventListener("submit", submitRestaurant);
        elements.restaurantList.addEventListener("click", handleRestaurantListClick);
        elements.historyList.addEventListener("click", handleHistoryClick);
        elements.historyList.addEventListener("submit", submitReview);
      }

      function resetSelectionAfterFilterChange() {
        selectedRestaurant = null;
        pendingRestaurant = null;
        render();
        renderReel(buildRollingReel(), false);
      }

      function handleCategoryTabClick(event) {
        const button = event.target.closest("[data-category-tab]");
        if (!button) return;
        closeFilterPanel();
        activeCategoryTab = button.dataset.categoryTab;
        resetSelectionAfterFilterChange();
      }

      function toggleFilterPanel(panel) {
        activeFilterPanel = activeFilterPanel === panel ? "" : panel;
        renderFilterControls();
      }

      function closeFilterPanel() {
        if (!activeFilterPanel) return;
        activeFilterPanel = "";
        renderFilterControls();
      }

      function lockPageScroll() {
        if (document.body.classList.contains("is-filter-open")) return;
        lockedScrollY = window.scrollY;
        document.body.style.top = `-${lockedScrollY}px`;
        document.body.classList.add("is-filter-open");
      }

      function unlockPageScroll() {
        if (!document.body.classList.contains("is-filter-open")) return;
        document.body.classList.remove("is-filter-open");
        document.body.style.top = "";
        window.scrollTo(0, lockedScrollY);
      }

      function handleFilterPanelClick(event) {
        const target = event.target.closest("button");
        if (!target) return;
        if (target.dataset.distance !== undefined) {
          selectedDistance = Number(target.dataset.distance);
          if (selectedDistance > 0 && !userPosition) locateUser();
        }
        if (target.dataset.areaLevel) activeAreaLevel = target.dataset.areaLevel;
        if (target.dataset.district !== undefined) {
          const value = target.dataset.district;
          if (value) {
            activeAreaDistrict = value;
            toggleSetValue(selectedLocations, value);
          } else {
            selectedLocations.clear();
          }
          selectedBusinessAreas.clear();
        }
        if (target.dataset.businessArea !== undefined) {
          if (target.dataset.businessArea) toggleSetValue(selectedBusinessAreas, target.dataset.businessArea);
          else selectedBusinessAreas.clear();
        }
        if (target.dataset.foodValue) toggleSetValue(selectedFoodValues, target.dataset.foodValue);
        if (target.dataset.foodGroup) activeFoodGroup = target.dataset.foodGroup;
        if (target.dataset.sort) {
          selectedSort = target.dataset.sort;
          if (selectedSort === "distance" && !userPosition) locateUser();
        }
        if (target.dataset.action === "locate") locateUser();
        resetSelectionAfterFilterChange();
      }

      function toggleSetValue(set, value) {
        if (set.has(value)) set.delete(value);
        else set.add(value);
      }

      async function locateUser() {
        if (isLocating) return;
        isLocating = true;
        locationStatus = "正在定位...";
        renderFilterControls();
        try {
          userPosition = await requestCurrentPosition();
          restaurantDistances = new Map();
          locationStatus = `定位成功，精度约 ${Math.round(userPosition.accuracy)}m`;
          if (!selectedDistance) selectedDistance = 3000;
          showMessage("已获取当前位置，可以随机周边美食。");
        } catch (error) {
          userPosition = null;
          selectedDistance = 0;
          locationStatus = error.message;
          showMessage(error.message);
        } finally {
          isLocating = false;
          resetSelectionAfterFilterChange();
        }
      }

      function resetActiveFilterPanel() {
        if (activeFilterPanel === "nearby") {
          selectedDistance = 0;
          selectedLocations.clear();
          selectedBusinessAreas.clear();
        }
        if (activeFilterPanel === "food") selectedFoodValues.clear();
        if (activeFilterPanel === "sort") selectedSort = "recommended";
        resetSelectionAfterFilterChange();
      }

      function readJson(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      }

      function readRestaurants() {
        const storedVersion = localStorage.getItem(RESTAURANTS_VERSION_KEY);
        if (storedVersion !== CURRENT_DATASET_VERSION) {
          localStorage.setItem(RESTAURANTS_VERSION_KEY, CURRENT_DATASET_VERSION);
          localStorage.setItem(RESTAURANTS_KEY, JSON.stringify(initialRestaurants));
          return initialRestaurants;
        }
        const stored = readJson(RESTAURANTS_KEY, initialRestaurants);
        if (!Array.isArray(stored)) {
          localStorage.setItem(RESTAURANTS_KEY, JSON.stringify(initialRestaurants));
          return initialRestaurants;
        }
        return isPlaceholderRestaurantList(stored) ? initialRestaurants : stored;
      }

      function isPlaceholderRestaurantList(items) {
        return items.length === 99 && items.every((restaurant, index) => restaurant.name === `餐厅 ${String(index + 1).padStart(3, "0")}`);
      }

      function saveAll() {
        localStorage.setItem(RESTAURANTS_KEY, JSON.stringify(restaurants));
        localStorage.setItem(RESTAURANTS_VERSION_KEY, CURRENT_DATASET_VERSION);
        localStorage.setItem(CHECK_INS_KEY, JSON.stringify(checkIns));
      }

      function getRestaurantText(restaurant) {
        return `${restaurant.name || ""} ${restaurant.note || ""} ${restaurant.address || ""}`;
      }

      function matchesCategory(restaurant, categoryValue) {
        return inferCategory(restaurant) === categoryValue;
      }

      function inferCategory(restaurant) {
        return inferRestaurantCategory(restaurant);
      }

      function getDistrict(address = "", restaurant = {}) {
        if (restaurant.district) return restaurant.district;
        const matched = DISTRICT_RULES.find((rule) =>
          rule.keywords.some((keyword) => address.includes(keyword)),
        );
        return matched ? matched.district : "其他区域";
      }

      function getLocations() {
        return [...new Set(restaurants.map((restaurant) => getDistrict(restaurant.address, restaurant)))].sort((a, b) => a.localeCompare(b, "zh-CN"));
      }

      function getBusinessArea(restaurant) {
        return typeof restaurant.businessArea === "string" ? restaurant.businessArea : "";
      }

      function getBusinessAreas() {
        const scoped = restaurants.filter((restaurant) =>
          selectedLocations.size === 0 || selectedLocations.has(getDistrict(restaurant.address, restaurant))
        );
        return [...new Set(scoped.map(getBusinessArea).filter(Boolean))]
          .sort((a, b) => a.localeCompare(b, "zh-CN"));
      }

      function getFilteredRestaurants() {
        const activeTab = CATEGORY_TABS.find((tab) => tab.value === activeCategoryTab);
        const filtered = restaurants.filter((restaurant) => {
          const tabMatched = !activeTab?.categories.length || activeTab.categories.includes(inferCategory(restaurant));
          const categoryMatched = matchesFoodSelection(restaurant, selectedFoodValues);
          const locationMatched = selectedLocations.size === 0 ||
            selectedLocations.has(getDistrict(restaurant.address, restaurant));
          const businessMatched = selectedBusinessAreas.size === 0 ||
            selectedBusinessAreas.has(getBusinessArea(restaurant));
          const distance = getDistanceForRestaurant(restaurant);
          const distanceMatched = !selectedDistance || (distance !== null && distance <= selectedDistance);
          return tabMatched && categoryMatched && locationMatched && businessMatched && distanceMatched;
        });
        const sorted = sortRestaurants(filtered);
        return selectedSort === "recommended" ? sorted : sorted.slice(0, 100);
      }

      function getDistanceForRestaurant(restaurant) {
        if (!userPosition) return null;
        if (!restaurantDistances.has(restaurant.id)) {
          restaurantDistances.set(restaurant.id, getRestaurantDistance(restaurant, userPosition));
        }
        return restaurantDistances.get(restaurant.id);
      }

      function sortRestaurants(items) {
        const sorted = [...items];
        if (selectedSort === "distance") {
          return sorted.sort((left, right) =>
            (getDistanceForRestaurant(left) ?? Infinity) - (getDistanceForRestaurant(right) ?? Infinity)
          );
        }
        if (selectedSort === "rating") {
          return sorted.sort((left, right) => Number(right.rating || 0) - Number(left.rating || 0));
        }
        if (selectedSort === "cost-asc") {
          return sorted.sort((left, right) => (parseAverageCost(left) ?? Infinity) - (parseAverageCost(right) ?? Infinity));
        }
        if (selectedSort === "cost-desc") {
          return sorted.sort((left, right) => (parseAverageCost(right) ?? -1) - (parseAverageCost(left) ?? -1));
        }
        return sorted.sort((left, right) =>
          Number(right.rating || 0) - Number(left.rating || 0) ||
          Number(left.rank || Infinity) - Number(right.rank || Infinity)
        );
      }

      function formatLocation(address, restaurant = {}) {
        const district = restaurant.district || getDistrict(address, restaurant);
        const area = getBusinessArea(restaurant) ? ` · ${getBusinessArea(restaurant)}` : "";
        return address ? `杭州市 · ${district}${area} · ${address}` : `杭州市 · ${district}${area} · 位置待补充`;
      }

      function getMapUrl(restaurant) {
        if (restaurant.location) {
          return `https://uri.amap.com/marker?position=${encodeURIComponent(restaurant.location)}&name=${encodeURIComponent(restaurant.name)}&src=renjianxunweiji&callnative=1`;
        }
        const query = `杭州 ${restaurant.address || ""} ${restaurant.name}`.trim();
        return `https://uri.amap.com/search?keyword=${encodeURIComponent(query)}&src=renjianxunweiji&callnative=1`;
      }

      function renderFilters(filteredRestaurants) {
        renderFilterControls();
        const tokens = [];
        const activeTab = CATEGORY_TABS.find((tab) => tab.value === activeCategoryTab);
        if (activeCategoryTab !== "recommend") tokens.push(activeTab?.label);
        if (selectedDistance) tokens.push(DISTANCE_OPTIONS.find((option) => option.value === selectedDistance)?.label);
        if (selectedLocations.size) tokens.push(...[...selectedLocations]);
        if (selectedBusinessAreas.size) tokens.push(...[...selectedBusinessAreas].slice(0, 2));
        if (selectedFoodValues.size) tokens.push(getSelectedFoodLabel());
        if (selectedSort !== "recommended") tokens.push(getSortLabel());
        elements.filterSummary.innerHTML = `
          <span>当前可抽 ${filteredRestaurants.length} / ${restaurants.length} 家</span>
          ${tokens.filter(Boolean).map((token) => `<span class="filter-token">${escapeHtml(token)}</span>`).join("")}
        `;
      }

      function renderFilterControls() {
        elements.categoryTabs.innerHTML = CATEGORY_TABS.map((tab) => `
          <button class="category-tab ${activeCategoryTab === tab.value ? "is-active" : ""}" data-category-tab="${tab.value}" type="button">${escapeHtml(tab.label)}</button>
        `).join("");
        elements.nearbyFilterButton.innerHTML = escapeHtml(getNearbyButtonLabel());
        elements.foodFilterButton.innerHTML = escapeHtml(getSelectedFoodLabel());
        elements.sortFilterButton.innerHTML = escapeHtml(getSortLabel());
        document.querySelectorAll("[data-filter-panel]").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.filterPanel === activeFilterPanel);
        });
        elements.filterDropdown.hidden = !activeFilterPanel;
        elements.filterBackdrop.hidden = !activeFilterPanel;
        if (activeFilterPanel) {
          const entryRow = document.querySelector(".filter-entry-row");
          const mobileTop = Math.min(
            window.innerHeight - 240,
            Math.max(8, (entryRow?.getBoundingClientRect().bottom || 0) + 8),
          );
          elements.filterDropdown.style.setProperty("--mobile-filter-top", `${mobileTop}px`);
          lockPageScroll();
          elements.filterDropdownContent.innerHTML = renderActiveFilterPanel();
        } else {
          unlockPageScroll();
          elements.filterDropdownContent.innerHTML = "";
        }
      }

      function renderActiveFilterPanel() {
        if (activeFilterPanel === "nearby") return renderNearbyPanel();
        if (activeFilterPanel === "food") return renderFoodPanel();
        return renderSortPanel();
      }

      function renderNearbyPanel() {
        const districts = getLocations();
        if (!activeAreaDistrict || !districts.includes(activeAreaDistrict)) {
          activeAreaDistrict = [...selectedLocations][0] || districts[0] || "";
        }
        const businessAreas = [...new Set(restaurants
          .filter((restaurant) => !activeAreaDistrict || getDistrict(restaurant.address, restaurant) === activeAreaDistrict)
          .map(getBusinessArea)
          .filter(Boolean))]
          .sort((left, right) => left.localeCompare(right, "zh-CN"));
        return `
          <div class="filter-panel-title">
            <div>
              <strong>距离 ${escapeHtml(locationStatus)}</strong>
              <div class="location-status">定位仅用于本机距离计算</div>
            </div>
            <button class="location-action" data-action="locate" type="button">${isLocating ? "定位中" : "重新定位"}</button>
          </div>
          <div class="choice-row">
            ${DISTANCE_OPTIONS.map((option) => `
              <button class="choice-button ${selectedDistance === option.value ? "is-selected" : ""}" data-distance="${option.value}" type="button">${option.label}</button>
            `).join("")}
          </div>
          <div class="area-picker">
            <div class="area-level">
              <button class="area-option ${activeAreaLevel === "district" ? "is-selected" : ""}" data-area-level="district" type="button">行政区</button>
            </div>
            <div class="area-level">
              <button class="area-option ${selectedLocations.size === 0 ? "is-selected" : ""}" data-area-level="district" data-district="" type="button">不限</button>
              ${districts.map((district) => `
                <button class="area-option ${activeAreaDistrict === district ? "is-selected" : ""}" data-area-level="district" data-district="${escapeHtml(district)}" type="button">${escapeHtml(district)}</button>
              `).join("")}
            </div>
            <div class="area-level">
              <button class="area-option ${selectedBusinessAreas.size === 0 ? "is-selected" : ""}" data-business-area="" type="button">全部商圈</button>
              ${businessAreas.map((area) => `
                <button class="area-option ${selectedBusinessAreas.has(area) ? "is-selected" : ""}" data-business-area="${escapeHtml(area)}" type="button">${escapeHtml(area)}</button>
              `).join("")}
            </div>
          </div>
        `;
      }

      function renderFoodPanel() {
        const group = FOOD_GROUPS.find((item) => item.value === activeFoodGroup) || FOOD_GROUPS[0];
        return `
          <div class="food-picker">
            <div class="food-group-nav">
              ${FOOD_GROUPS.map((item) => `
                <button class="food-group-nav-button ${item.value === group.value ? "is-selected" : ""}" data-food-group="${item.value}" type="button">${escapeHtml(item.label)}</button>
              `).join("")}
            </div>
            <div class="food-groups">
              <div class="food-group">
                <div class="food-group-title"><span>●</span><span>${escapeHtml(group.label)}</span></div>
                <div class="food-options">
                  ${group.options.map((option) => `
                    <button class="food-option ${selectedFoodValues.has(option.value) ? "is-selected" : ""}" data-food-value="${option.value}" type="button">${escapeHtml(option.label)}</button>
                  `).join("")}
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function renderSortPanel() {
        return `
          <div class="filter-panel-title"><strong>排序方式</strong></div>
          <div class="sort-options">
            ${SORT_OPTIONS.map((option) => `
              <button class="sort-option ${selectedSort === option.value ? "is-selected" : ""}" data-sort="${option.value}" type="button">
                <span>${escapeHtml(option.label)}</span><span>${selectedSort === option.value ? "●" : "○"}</span>
              </button>
            `).join("")}
          </div>
        `;
      }

      function getNearbyButtonLabel() {
        if (selectedDistance) return DISTANCE_OPTIONS.find((option) => option.value === selectedDistance)?.label || "附近";
        if (selectedBusinessAreas.size === 1) return [...selectedBusinessAreas][0];
        if (selectedLocations.size === 1) return [...selectedLocations][0];
        if (selectedLocations.size + selectedBusinessAreas.size > 1) return `已选 ${selectedLocations.size + selectedBusinessAreas.size} 项`;
        return "附近";
      }

      function getSelectedFoodLabel() {
        if (!selectedFoodValues.size) return "全部美食";
        const allOptions = FOOD_GROUPS.flatMap((group) => group.options);
        const labels = [...selectedFoodValues].map((value) =>
          allOptions.find((option) => option.value === value)?.label || getCategoryLabel(value)
        );
        return labels.length === 1 ? labels[0] : `已选 ${labels.length} 项`;
      }

      function getSortLabel() {
        if (selectedSort === "recommended") return "排序";
        return SORT_OPTIONS.find((option) => option.value === selectedSort)?.label || "排序";
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function createId(prefix) {
        return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
      }

      function showMessage(message) {
        window.clearTimeout(toastTimer);
        elements.toast.textContent = message;
        elements.toast.hidden = false;
        toastTimer = window.setTimeout(() => { elements.toast.hidden = true; }, 2600);
      }

      function switchView(view) {
        elements.homeView.hidden = view !== "home";
        elements.manageView.hidden = view !== "manage";
        elements.homeTab.classList.toggle("is-active", view === "home");
        elements.manageTab.classList.toggle("is-active", view === "manage");
        if (view === "home" && !isRolling && !selectedRestaurant) {
          renderReel(buildRollingReel(), false);
        }
      }

      function render() {
        if (selectedRestaurant && !restaurants.some((restaurant) => restaurant.id === selectedRestaurant.id)) {
          selectedRestaurant = null;
        }
        const filteredRestaurants = getFilteredRestaurants();
        renderFilters(filteredRestaurants);
        elements.count.textContent = filteredRestaurants.length;
        elements.manageCount.textContent = `${restaurants.length} 家待打卡`;
        elements.pickButton.disabled = isRolling;
        elements.pickButton.textContent = isRolling ? "正在抽取..." : "随机抽一家餐厅";
        elements.clearHistoryButton.disabled = checkIns.length === 0;
        renderResult();
        renderHistory();
        renderRestaurantForm();
        renderRestaurants();
        saveAll();
      }

      function renderReel(sequence, rolling, revealed = false) {
        if (!sequence.length) {
          elements.reelArea.className = "reel-track";
          elements.reelArea.innerHTML = "";
          return;
        }
        elements.reelArea.className = `reel-track ${revealed ? "is-revealed" : ""}`;
        elements.reelArea.innerHTML = sequence.map((restaurant, index) => `
          <article class="reel-card ${revealed && index === 0 ? "is-final" : ""}" style="${getSphereStyle(index, sequence.length, revealed)}" key="${restaurant.id}-${index}">
            <div class="food-photo" style="--food-image: url('${getRestaurantImage(restaurant)}')"><span>${escapeHtml(restaurant.name.slice(0, 2))}</span></div>
            <h3>${escapeHtml(restaurant.name)}</h3>
            <p>${escapeHtml(formatLocation(restaurant.address, restaurant))}</p>
            <div class="tag-line">
              <span class="mini-tag">${escapeHtml(getCategoryLabel(restaurant.category || inferCategory(restaurant)))}</span>
              ${restaurant.source ? `<span class="mini-tag">${escapeHtml(restaurant.source)}${restaurant.rank ? ` #${escapeHtml(String(restaurant.rank))}` : ""}</span>` : ""}
            </div>
          </article>
        `).join("");
      }

      function animateSphere(timestamp) {
        const delta = Math.min(34, Math.max(0, timestamp - sphereLastTime));
        sphereLastTime = timestamp;
        if (selectedRestaurant && !isRolling) {
          elements.reelArea.style.transform = "rotateX(0deg) rotateY(0deg) rotateZ(0deg)";
        } else {
          let speed = 0.014;
          let tilt = 9 + Math.sin(timestamp / 2300) * 3;
          if (isRolling) {
            const progress = Math.min(1, (timestamp - rollStartedAt) / ROLL_DURATION_MS);
            if (progress < 0.14) {
              const ramp = 1 - Math.pow(1 - progress / 0.14, 3);
              speed = 0.014 + (0.72 - 0.014) * ramp;
            } else {
              const slowProgress = (progress - 0.14) / 0.86;
              const smooth = slowProgress * slowProgress * (3 - 2 * slowProgress);
              speed = 0.72 + (0.018 - 0.72) * smooth;
            }
            tilt = 10 + Math.sin(progress * Math.PI * 5) * 7 * (1 - progress);
            if (progress >= 1) {
              finishPick();
              sphereFrame = requestAnimationFrame(animateSphere);
              return;
            }
          }
          sphereRotationY -= speed * delta;
          elements.reelArea.style.transform = `rotateX(${tilt.toFixed(2)}deg) rotateY(${sphereRotationY.toFixed(2)}deg) rotateZ(0deg)`;
        }
        sphereFrame = requestAnimationFrame(animateSphere);
      }

      function shuffleRestaurants(items) {
        return [...items].sort(() => Math.random() - 0.5);
      }

      function buildRollingReel() {
        const pool = getFilteredRestaurants();
        return shuffleRestaurants(pool).slice(0, Math.min(REEL_LENGTH, pool.length));
      }

      function buildFinalReel(finalRestaurant) {
        const pool = getFilteredRestaurants();
        return [finalRestaurant].concat(
          shuffleRestaurants(pool.filter((restaurant) => restaurant.id !== finalRestaurant.id))
            .slice(0, Math.min(REEL_LENGTH - 1, Math.max(pool.length - 1, 0))),
        );
      }

      function renderResult() {
        if (selectedRestaurant) {
          elements.resultArea.className = "result-card";
          elements.resultArea.innerHTML = `
            <div><p class="eyebrow">锁定目的地</p><h3>${escapeHtml(selectedRestaurant.name)}</h3></div>
            <dl>
              <div><dt>位置</dt><dd>${escapeHtml(formatLocation(selectedRestaurant.address, selectedRestaurant))}</dd></div>
              <div><dt>分类</dt><dd>${escapeHtml(getCategoryLabel(selectedRestaurant.category || inferCategory(selectedRestaurant)))}</dd></div>
              ${selectedRestaurant.rating ? `<div><dt>高德评分</dt><dd>${escapeHtml(selectedRestaurant.rating)} 分</dd></div>` : ""}
              ${getDistanceForRestaurant(selectedRestaurant) !== null ? `<div><dt>距离</dt><dd>距你约 ${escapeHtml(formatDistance(getDistanceForRestaurant(selectedRestaurant)))}</dd></div>` : ""}
              ${parseAverageCost(selectedRestaurant) ? `<div><dt>人均</dt><dd>约 ¥${escapeHtml(parseAverageCost(selectedRestaurant))}</dd></div>` : ""}
              ${selectedRestaurant.businessArea ? `<div><dt>商圈</dt><dd>${escapeHtml(selectedRestaurant.businessArea)}</dd></div>` : ""}
              ${selectedRestaurant.source ? `<div><dt>来源</dt><dd>${escapeHtml(selectedRestaurant.source)}${selectedRestaurant.rank ? ` · 第 ${escapeHtml(String(selectedRestaurant.rank))} 名` : ""}</dd></div>` : ""}
              <div><dt>推荐菜</dt><dd>${escapeHtml(getRecommendationText(selectedRestaurant.note))}</dd></div>
            </dl>
            <div class="result-actions">
              <a class="map-action" href="${getMapUrl(selectedRestaurant)}" target="_blank" rel="noreferrer">打开地图</a>
              <button class="success-action" id="complete-button" type="button">完成打卡</button>
            </div>
          `;
          document.querySelector("#complete-button").addEventListener("click", completeCheckIn);
          return;
        }
        elements.resultArea.className = "quiet-hint";
        elements.resultArea.textContent = isRolling ? "餐厅正在飞速路过，马上揭晓。" : "还没有抽取餐厅。";
      }

      function getRecommendationText(note) {
        const cleaned = String(note || "")
          .split(/[；;]/)
          .map((part) => part.trim())
          .filter((part) => part && !/^人均\s*[：:]/.test(part))
          .join("；")
          .replace(/^标签\s*[：:]\s*/, "")
          .replaceAll(",", "、")
          .trim();
        return cleaned || "暂无推荐菜";
      }

      function pickRestaurant() {
        if (isRolling) return;
        if (restaurants.length === 0) {
          alert("当前没有可抽取的餐厅，请先添加餐厅");
          return;
        }
        const pool = getFilteredRestaurants();
        if (pool.length === 0) {
          alert("当前筛选条件下没有可抽取的餐厅，请调整筛选条件");
          return;
        }
        const finalRestaurant = pool[Math.floor(Math.random() * pool.length)];
        const sequence = buildRollingReel();
        selectedRestaurant = null;
        pendingRestaurant = finalRestaurant;
        isRolling = true;
        rollStartedAt = performance.now();
        playRollingSound();
        render();
        renderReel(sequence, true);
      }

      function finishPick() {
        if (!isRolling || !pendingRestaurant) return;
        selectedRestaurant = pendingRestaurant;
        pendingRestaurant = null;
        isRolling = false;
        playLockSound();
        showMessage("已锁定本次打卡餐厅。");
        render();
        renderReel(buildFinalReel(selectedRestaurant), false, true);
      }

      function getSphereStyle(index, total, revealed = false) {
        if (revealed && index === 0) {
          return "--theta: 0deg; --phi: 0deg; --twist: 0deg; --radius: 0px; --depth-opacity: 1; --depth-saturation: 1.12; --depth-light: 1.04; --curve-scale: 1; --card-scale: 1;";
        }

        const adjustedIndex = revealed ? index - 1 : index;
        const adjustedTotal = Math.max(revealed ? total - 1 : total, 1);
        const goldenAngle = Math.PI * (3 - Math.sqrt(5));
        const y = 1 - (adjustedIndex / Math.max(adjustedTotal - 1, 1)) * 2;
        const horizontalRadius = Math.sqrt(Math.max(0, 1 - y * y));
        const theta = goldenAngle * adjustedIndex;
        const x = Math.cos(theta) * horizontalRadius;
        const z = Math.sin(theta) * horizontalRadius;
        const cardTheta = Math.atan2(x, z) * 180 / Math.PI;
        const cardPhi = Math.asin(y) * 180 / Math.PI;
        const depthOpacity = Math.max(0.24, 0.56 + z * 0.38).toFixed(2);
        const depthSaturation = Math.max(0.58, 0.82 + z * 0.24).toFixed(2);
        const depthLight = Math.max(0.58, 0.88 + z * 0.18).toFixed(2);
        const cardScale = Math.max(0.62, 0.8 + z * 0.18).toFixed(2);
        const curveScale = Math.max(0.62, 0.96 - Math.abs(x) * 0.2 - Math.max(0, -z) * 0.16).toFixed(2);
        const twist = (x * -9 + y * 5).toFixed(2);
        return `--theta: ${cardTheta.toFixed(2)}deg; --phi: ${cardPhi.toFixed(2)}deg; --twist: ${twist}deg; --radius: 214px; --depth-opacity: ${depthOpacity}; --depth-saturation: ${depthSaturation}; --depth-light: ${depthLight}; --curve-scale: ${curveScale}; --card-scale: ${cardScale};`;
      }

      function getAudioContext() {
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtor) return null;
        if (!audioContext) audioContext = new AudioCtor();
        return audioContext;
      }

      function playTone(frequency, startOffset, duration, volume = 0.05, type = "sine") {
        const context = getAudioContext();
        if (!context) return;
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        const startAt = context.currentTime + startOffset;
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, startAt);
        gain.gain.setValueAtTime(0.0001, startAt);
        gain.gain.exponentialRampToValueAtTime(volume, startAt + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start(startAt);
        oscillator.stop(startAt + duration + 0.03);
      }

      function playRollingSound() {
        const context = getAudioContext();
        if (!context) return;
        context.resume?.();
        let offset = 0;
        let index = 0;
        while (offset < ROLL_DURATION_MS / 1000 - 0.08) {
          const progress = offset / (ROLL_DURATION_MS / 1000);
          playTone(520 - progress * 250 + (index % 3) * 22, offset, 0.038 + progress * 0.02, 0.022 - progress * 0.008, "triangle");
          offset += 0.045 + progress * progress * 0.15;
          index += 1;
        }
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        const startAt = context.currentTime;
        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(150, startAt);
        oscillator.frequency.exponentialRampToValueAtTime(62, startAt + ROLL_DURATION_MS / 1000);
        gain.gain.setValueAtTime(0.0001, startAt);
        gain.gain.exponentialRampToValueAtTime(0.014, startAt + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.0001, startAt + ROLL_DURATION_MS / 1000);
        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start(startAt);
        oscillator.stop(startAt + ROLL_DURATION_MS / 1000 + 0.04);
      }

      function playLockSound() {
        const context = getAudioContext();
        if (!context) return;
        context.resume?.();
        [392, 523.25, 659.25].forEach((frequency, index) => {
          playTone(frequency, index * 0.08, 0.18, 0.055, "sine");
        });
      }

      function getRestaurantImage(restaurant) {
        const text = `${restaurant.name || ""} ${restaurant.note || ""} ${restaurant.address || ""}`;
        const imageMap = [
          [["火锅", "涮", "羊蝎子"], "https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&w=520&q=80"],
          [["烧烤", "烤", "串", "生蚝"], "https://images.unsplash.com/photo-1529193591184-b1d58069ecdd?auto=format&fit=crop&w=520&q=80"],
          [["面", "拌川", "粉", "麻辣烫"], "https://images.unsplash.com/photo-1569718212165-3a8278d5f624?auto=format&fit=crop&w=520&q=80"],
          [["小龙虾", "龙虾", "虾"], "https://images.unsplash.com/photo-1559737558-2f5a35f4523b?auto=format&fit=crop&w=520&q=80"],
          [["牛", "牛肉", "牛蛙"], "https://images.unsplash.com/photo-1558030006-450675393462?auto=format&fit=crop&w=520&q=80"],
          [["鸡", "鸡公煲", "鸭", "鹅"], "https://images.unsplash.com/photo-1562967916-eb82221dfb36?auto=format&fit=crop&w=520&q=80"],
          [["鱼", "海鲜", "蟹", "鲳"], "https://images.unsplash.com/photo-1559847844-5315695dadae?auto=format&fit=crop&w=520&q=80"],
          [["汉堡", "肯德基", "麦当劳", "必胜客", "汉堡王"], "https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=520&q=80"],
          [["砂锅", "煲", "菜馆", "小炒"], "https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=520&q=80"],
        ];
        const matched = imageMap.find(([keywords]) => keywords.some((keyword) => text.includes(keyword)));
        return matched ? matched[1] : "https://images.unsplash.com/photo-1543353071-873f17a7a088?auto=format&fit=crop&w=520&q=80";
      }

      function completeCheckIn() {
        if (!selectedRestaurant) return;
        const shouldRemove = confirm("打卡完成！是否将该餐厅从待打卡库中移除？");
        checkIns = [{
          id: createId("check-in"),
          restaurantId: selectedRestaurant.id,
          restaurantName: selectedRestaurant.name,
          address: selectedRestaurant.address,
          category: selectedRestaurant.category || inferCategory(selectedRestaurant),
          district: selectedRestaurant.district || getDistrict(selectedRestaurant.address),
          businessArea: selectedRestaurant.businessArea,
          source: selectedRestaurant.source,
          rank: selectedRestaurant.rank,
          rating: selectedRestaurant.rating,
          location: selectedRestaurant.location,
          locationVerified: selectedRestaurant.locationVerified,
          note: selectedRestaurant.note,
          checkedInAt: new Date().toISOString(),
        }, ...checkIns];
        if (shouldRemove) restaurants = restaurants.filter((restaurant) => restaurant.id !== selectedRestaurant.id);
        selectedRestaurant = null;
        showMessage(shouldRemove ? "打卡成功，餐厅已从待打卡库移除。" : "打卡成功，餐厅已保留。");
        render();
        renderReel(buildRollingReel(), false);
      }

      function renderHistory() {
        if (checkIns.length === 0) {
          elements.historyList.innerHTML = '<div class="empty-state">还没有打卡记录。</div>';
          return;
        }
        elements.historyList.innerHTML = checkIns.map((record) => `
          <article class="list-card">
            <div>
              <h3>${escapeHtml(record.restaurantName)}</h3>
              <p>${escapeHtml(formatLocation(record.address, record))}</p>
              <div class="tag-line">
                <span class="mini-tag">${escapeHtml(getCategoryLabel(record.category || inferCategory({ name: record.restaurantName, note: record.note, address: record.address })))}</span>
                ${record.source ? `<span class="mini-tag">${escapeHtml(record.source)}${record.rank ? ` #${escapeHtml(String(record.rank))}` : ""}</span>` : ""}
              </div>
              ${record.note ? `<p class="muted">${escapeHtml(record.note)}</p>` : ""}
              ${renderRatingSummary(record)}
              ${editingReviewId === record.id ? renderReviewForm(record) : ""}
              <time>${new Intl.DateTimeFormat("zh-CN", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" }).format(new Date(record.checkedInAt))}</time>
            </div>
            <div class="row-actions">
              <button class="ghost-action" data-action="edit-review" data-id="${record.id}" type="button">${hasReview(record) ? "修改评价" : "评价"}</button>
            <button class="danger-action" data-action="delete-history" data-id="${record.id}" type="button">删除</button>
            </div>
          </article>
        `).join("");
      }

      function getReview(record) {
        return record.review || {
          taste: 0,
          service: 0,
          value: 0,
          environment: 0,
          comment: record.thought || "",
          images: [],
        };
      }

      function hasReview(record) {
        const review = getReview(record);
        return Boolean(review.comment || review.taste || review.service || review.value || review.environment || review.images?.length);
      }

      function getAverageRating(review) {
        const scores = [review.taste, review.service, review.value, review.environment]
          .map((score) => Number(score) || 0)
          .filter((score) => score > 0);
        if (!scores.length) return "";
        return (scores.reduce((sum, score) => sum + score, 0) / scores.length).toFixed(1);
      }

      function renderRatingSummary(record) {
        if (!hasReview(record)) return "";
        const review = getReview(record);
        const average = getAverageRating(review);
        return `
          <div class="rating-summary">
            ${average ? `<strong>综合 ${escapeHtml(average)} / 5</strong>` : ""}
            <div class="rating-grid">
              ${renderRatingChip("口味", review.taste)}
              ${renderRatingChip("服务", review.service)}
              ${renderRatingChip("性价比", review.value)}
              ${renderRatingChip("环境", review.environment)}
            </div>
            ${review.comment ? `<p class="thought-text">${escapeHtml(review.comment)}</p>` : ""}
            ${renderReviewImages(review.images)}
          </div>
        `;
      }

      function renderRatingChip(label, score) {
        return `<div class="rating-chip"><span>${label}</span>${score ? `${"★".repeat(Number(score))}<small>${score}/5</small>` : "未评"}</div>`;
      }

      function renderReviewForm(record) {
        const review = getReview(record);
        return `
          <form class="review-form" data-review-form="${record.id}">
            <div class="review-score-grid">
              ${renderScoreSelect("taste", "口味", review.taste)}
              ${renderScoreSelect("service", "服务", review.service)}
              ${renderScoreSelect("value", "性价比", review.value)}
              ${renderScoreSelect("environment", "环境", review.environment)}
            </div>
            <label><span>点评</span><textarea name="comment" rows="3" placeholder="这家店哪里值得记住？">${escapeHtml(review.comment || "")}</textarea></label>
            ${renderReviewImages(review.images)}
            <label><span>添加图片</span><input name="images" type="file" accept="image/*" multiple /></label>
            <p class="file-hint">最多保留 3 张，会自动压缩保存在本机。</p>
            <div class="form-actions">
              <button class="secondary-action" type="submit">保存评价</button>
              <button class="ghost-action" data-action="cancel-review" data-id="${record.id}" type="button">取消</button>
            </div>
          </form>
        `;
      }

      function renderScoreSelect(name, label, value) {
        const options = ['<option value="0">未评分</option>']
          .concat([1, 2, 3, 4, 5].map((score) =>
            `<option value="${score}" ${Number(value) === score ? "selected" : ""}>${score} 分</option>`
          ))
          .join("");
        return `<label><span>${label}</span><select name="${name}">${options}</select></label>`;
      }

      function renderReviewImages(images = []) {
        if (!images.length) return "";
        return `<div class="review-images">${images.map((src) => `<img src="${escapeHtml(src)}" alt="打卡照片，点击放大" loading="lazy" data-review-image />`).join("")}</div>`;
      }

      function openImagePreview(source) {
        elements.imagePreviewContent.src = source;
        elements.imagePreview.hidden = false;
        document.body.classList.add("is-image-preview-open");
      }

      function closeImagePreview() {
        elements.imagePreview.hidden = true;
        elements.imagePreviewContent.removeAttribute("src");
        document.body.classList.remove("is-image-preview-open");
      }

      function renderRestaurantForm() {
        const editingRestaurant = restaurants.find((restaurant) => restaurant.id === editingRestaurantId);
        elements.restaurantCategoryInput.innerHTML = Object.entries(CATEGORY_LABELS)
          .map(([value, label]) => `<option value="${value}">${label}</option>`)
          .join("");
        elements.restaurantCategoryInput.value = editingRestaurant
          ? (editingRestaurant.category || inferCategory(editingRestaurant))
          : "local";
        elements.submitButton.textContent = editingRestaurant ? "保存修改" : "添加餐厅";
        elements.cancelEditButton.hidden = !editingRestaurant;
      }

      function renderRestaurants() {
        if (restaurants.length === 0) {
          elements.restaurantList.innerHTML = '<div class="empty-state">当前没有可抽取的餐厅，请先添加餐厅。</div>';
          return;
        }
        elements.restaurantList.innerHTML = restaurants.map((restaurant) => `
          <article class="list-card ${editingRestaurantId === restaurant.id ? "is-editing" : ""}">
            <div>
              <h3>${escapeHtml(restaurant.name)}</h3>
              <p>${escapeHtml(formatLocation(restaurant.address, restaurant))}</p>
              <div class="tag-line">
                <span class="mini-tag">${escapeHtml(getCategoryLabel(restaurant.category || inferCategory(restaurant)))}</span>
                ${restaurant.source ? `<span class="mini-tag">${escapeHtml(restaurant.source)}${restaurant.rank ? ` #${escapeHtml(String(restaurant.rank))}` : ""}</span>` : ""}
              </div>
              ${restaurant.note ? `<p class="muted">${escapeHtml(restaurant.note)}</p>` : ""}
            </div>
            <div class="row-actions">
              <a class="map-action" href="${getMapUrl(restaurant)}" target="_blank" rel="noreferrer">地图</a>
              <button class="ghost-action" data-action="edit" data-id="${restaurant.id}" type="button">编辑</button>
              <button class="danger-action" data-action="delete" data-id="${restaurant.id}" type="button">删除</button>
            </div>
          </article>
        `).join("");
      }

      function submitRestaurant(event) {
        event.preventDefault();
        const input = {
          name: elements.nameInput.value.trim(),
          address: elements.addressInput.value.trim(),
          category: elements.restaurantCategoryInput.value,
          note: elements.noteInput.value.trim(),
        };
        if (!input.name) {
          alert("餐厅名称不能为空");
          return;
        }
        if (editingRestaurantId) {
          restaurants = restaurants.map((restaurant) => restaurant.id === editingRestaurantId ? { ...restaurant, ...input } : restaurant);
          if (selectedRestaurant?.id === editingRestaurantId) selectedRestaurant = { ...selectedRestaurant, ...input };
          resetForm();
          showMessage("餐厅信息已更新。");
        } else {
          restaurants = [{ id: createId("restaurant"), ...input, createdAt: new Date().toISOString() }, ...restaurants];
          resetForm();
          showMessage("新餐厅已添加。");
        }
        render();
      }

      function resetForm() {
        editingRestaurantId = null;
        elements.nameInput.value = "";
        elements.addressInput.value = "";
        elements.restaurantCategoryInput.value = "local";
        elements.noteInput.value = "";
      }

      function handleRestaurantListClick(event) {
        const button = event.target.closest("button");
        if (!button) return;
        const restaurant = restaurants.find((item) => item.id === button.dataset.id);
        if (!restaurant) return;
        if (button.dataset.action === "edit") {
          editingRestaurantId = restaurant.id;
          elements.nameInput.value = restaurant.name;
          elements.addressInput.value = restaurant.address || "";
          elements.restaurantCategoryInput.value = restaurant.category || inferCategory(restaurant);
          elements.noteInput.value = restaurant.note || "";
          elements.nameInput.focus();
          render();
        }
        if (button.dataset.action === "delete") {
          if (!confirm(`确定删除「${restaurant.name}」吗？`)) return;
          restaurants = restaurants.filter((item) => item.id !== restaurant.id);
          if (editingRestaurantId === restaurant.id) resetForm();
          if (selectedRestaurant?.id === restaurant.id) selectedRestaurant = null;
          showMessage("餐厅已删除。");
          render();
        }
      }

      function handleHistoryClick(event) {
        const image = event.target.closest("[data-review-image]");
        if (image) {
          openImagePreview(image.currentSrc || image.src);
          return;
        }
        const button = event.target.closest("button");
        if (!button) return;
        if (button.dataset.action === "edit-review") {
          const record = checkIns.find((item) => item.id === button.dataset.id);
          if (!record) return;
          editingReviewId = record.id;
          render();
          return;
        }
        if (button.dataset.action === "cancel-review") {
          editingReviewId = null;
          render();
          return;
        }
        if (button.dataset.action === "delete-history") {
          checkIns = checkIns.filter((record) => record.id !== button.dataset.id);
          if (editingReviewId === button.dataset.id) editingReviewId = null;
          showMessage("打卡记录已删除。");
          render();
        }
      }

      async function submitReview(event) {
        const form = event.target.closest("[data-review-form]");
        if (!form) return;
        event.preventDefault();
        const id = form.dataset.reviewForm;
        const record = checkIns.find((item) => item.id === id);
        const formData = new FormData(form);
        const existingImages = getReview(record || {}).images || [];
        const uploadedImages = await readCompressedImages(formData.getAll("images").filter((file) => file && file.size));
        const review = {
          taste: Number(formData.get("taste")) || 0,
          service: Number(formData.get("service")) || 0,
          value: Number(formData.get("value")) || 0,
          environment: Number(formData.get("environment")) || 0,
          comment: String(formData.get("comment") || "").trim(),
          images: [...existingImages, ...uploadedImages].slice(0, 3),
          updatedAt: new Date().toISOString(),
        };
        checkIns = checkIns.map((record) =>
          record.id === id ? { ...record, review, thought: review.comment } : record,
        );
        editingReviewId = null;
        showMessage(hasAnyReviewValue(review) ? "评价已保存。" : "评价已清空。");
        render();
      }

      function hasAnyReviewValue(review) {
        return Boolean(review.comment || review.taste || review.service || review.value || review.environment || review.images?.length);
      }

      function readCompressedImages(files) {
        return Promise.all(files.slice(0, 3).map((file) => compressImage(file)));
      }

      function compressImage(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const image = new Image();
            image.onload = () => {
              const maxSide = 900;
              const ratio = Math.min(1, maxSide / Math.max(image.width, image.height));
              const canvas = document.createElement("canvas");
              canvas.width = Math.max(1, Math.round(image.width * ratio));
              canvas.height = Math.max(1, Math.round(image.height * ratio));
              const context = canvas.getContext("2d");
              context.drawImage(image, 0, 0, canvas.width, canvas.height);
              resolve(canvas.toDataURL("image/jpeg", 0.72));
            };
            image.onerror = reject;
            image.src = reader.result;
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function clearHistory() {
        if (checkIns.length === 0) return;
        if (!confirm("确定清空全部打卡记录吗？此操作不可撤销。")) return;
        checkIns = [];
        editingReviewId = null;
        showMessage("打卡历史已清空。");
        render();
      }
    </script>
  </body>
</html>
