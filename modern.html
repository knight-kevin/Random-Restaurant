<html lang="zh-CN">

    <title>人间寻味记</title>
    <style>
      :root {
        --color-text: #20252b;
        --color-muted: #697279;
        --color-soft: #f8f7f5;
        --color-panel: #ffffff;
        --color-border: #eee5df;
        --color-primary: #ff5b37;
        --color-primary-dark: #e64626;
        --color-primary-soft: #fff1eb;
        --color-accent: #ff8a3d;
        --color-surface-warm: #fffaf7;
        --radius-card: 14px;
        --radius-control: 12px;
        --shadow-soft: 0 10px 28px rgba(31, 41, 51, .06);
        --shadow-panel: 0 22px 60px rgba(31, 41, 51, .13);
        --ease-standard: cubic-bezier(.2, .8, .2, 1);
        color: var(--color-text);
        background:
          radial-gradient(circle at 12% 0%, rgba(255, 91, 55, .12), transparent 30rem),
          radial-gradient(circle at 88% 8%, rgba(80, 176, 255, .10), transparent 28rem),
          linear-gradient(180deg, #fffaf7 0%, #f7fbff 52%, #ffffff 100%);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { margin: 0; min-width: 320px; min-height: 100vh; min-height: 100dvh; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); background: inherit; overscroll-behavior-y: contain; }
      body.is-filter-open { position: fixed; width: 100%; overflow: hidden; }
      button, input, textarea { font: inherit; }
      button, a { touch-action: manipulation; }
      button { border: 0; cursor: pointer; }
      button:disabled { cursor: not-allowed; opacity: 0.7; }

      .app-shell { width: min(1120px, calc(100% - 32px)); margin: 0 auto; padding: 18px 0 44px; }
      .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; padding: 14px 6px 18px; }
      .brand-block { display: grid; gap: 10px; justify-items: start; }
      h1, h2, h3 { margin: 0; letter-spacing: 0; }
      h1 { margin-top: 4px; font-size: clamp(2.2rem, 4.2vw, 3.55rem); line-height: .98; }
      .eyebrow { margin: 0; color: #7d5544; font-size: 0.78rem; font-weight: 800; letter-spacing: 0; }
      .top-actions { display: flex; gap: 3px; padding: 3px; border: 1px solid rgba(238,229,223,.95); border-radius: 999px; background: rgba(255,255,255,.86); box-shadow: 0 8px 22px rgba(31,41,51,.05); backdrop-filter: blur(12px); }
      .nav-action { min-height: 36px; border-radius: 999px; padding: 0 13px; background: transparent; color: #35433d; font-size: .92rem; font-weight: 850; white-space: nowrap; transition: background .18s var(--ease-standard), color .18s var(--ease-standard), box-shadow .18s var(--ease-standard); }
      .nav-action.is-active { background: var(--color-primary); color: #fff; box-shadow: 0 8px 18px rgba(255,91,55,.18); }
      .city-select { min-height: 34px; min-width: 112px; border: 1px solid var(--color-border); border-radius: 999px; padding: 0 34px 0 14px; background: rgba(255,255,255,.9); color: #2f3a36; font-size: .88rem; font-weight: 850; outline: none; box-shadow: 0 6px 18px rgba(31,41,51,.04); }
      .city-select:focus { border-color: #ffc4b5; box-shadow: 0 0 0 3px rgba(255,91,55,.12); }
      .favorite-action.is-favorite { border-color: #ffc3cf; background: #fff0f4; color: #d92f58; }

      .home-grid { display: block; }
      .home-grid > * { min-width: 0; }
      .panel, .hero-stage { border: 1px solid var(--color-border); border-radius: var(--radius-card); background: rgba(255,255,255,.96); box-shadow: var(--shadow-soft); }
      .hero-stage { width: 100%; min-width: 0; overflow: visible; padding: clamp(18px, 2.35vw, 26px); }
      .hero-copy { display: grid; gap: 6px; max-width: 720px; }
      .hero-copy .eyebrow { font-size: clamp(.95rem, 1.35vw, 1.08rem); }
      .hero-copy h2 { font-family: inherit; font-size: clamp(1.85rem, 4.15vw, 3.55rem); font-weight: 900; line-height: 1.04; max-width: 820px; }
      .hero-copy p:last-child { max-width: 560px; margin: 0; color: #5d6870; font-size: 1.02rem; line-height: 1.7; }
      .filter-panel { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)) auto; gap: 12px; align-items: end; margin-top: 20px; padding: 14px; border: 1px solid rgba(255,91,91,.18); border-radius: 8px; background: rgba(255,255,255,.82); }
      .filter-panel label, .filter-field { display: grid; gap: 7px; color: #39493f; font-weight: 800; min-width: 0; }
      .filter-panel span { font-size: .82rem; color: #7d5544; }
      .filter-panel select { min-height: 42px; border: 1px solid #cbd5c4; border-radius: 8px; padding: 0 12px; background: #fff; color: #1f2933; outline: none; font-weight: 700; }
      .multi-filter { position: relative; min-width: 0; }
      .multi-filter-button { display: flex; width: 100%; min-height: 42px; align-items: center; justify-content: space-between; gap: 10px; border: 1px solid #cbd5c4; border-radius: 8px; padding: 0 12px; background: #fff; color: #1f2933; font-weight: 700; text-align: left; }
      .multi-filter-button::after { content: "v"; color: #687274; font-size: 1rem; transition: transform .18s ease; }
      .multi-filter.is-open .multi-filter-button { border-color: #ff725e; box-shadow: 0 0 0 3px rgba(255,114,94,.12); }
      .multi-filter.is-open .multi-filter-button::after { transform: rotate(180deg); }
      .multi-filter-menu { position: absolute; z-index: 12; top: calc(100% + 7px); left: 0; width: max(100%, 220px); max-height: 280px; overflow: auto; padding: 8px; border: 1px solid rgba(255,114,94,.2); border-radius: 8px; background: #fff; box-shadow: 0 18px 42px rgba(42,55,83,.18); }
      .multi-filter-option { display: flex; grid-template-columns: none; align-items: center; gap: 9px; padding: 9px 8px; border-radius: 6px; color: #33423a; cursor: pointer; }
      .multi-filter-option:hover { background: #fff3ee; }
      .multi-filter-option input { width: 18px; height: 18px; margin: 0; accent-color: #ff654f; }
      .multi-filter-option span { color: inherit; font-size: .88rem; }
      .filter-summary { margin: 0; color: #53655a; font-size: .9rem; font-weight: 800; white-space: nowrap; }
      .food-filter { position: relative; z-index: 31; width: 100%; min-width: 0; margin-top: 18px; }
      .category-tabs { display: flex; width: 100%; min-width: 0; gap: 20px; overflow-x: auto; padding: 0 2px 9px; border-bottom: 1px solid rgba(238,229,223,.8); scrollbar-width: none; }
      .category-tabs::-webkit-scrollbar { display: none; }
      .category-tab { position: relative; flex: 0 0 auto; min-height: 38px; padding: 7px 0; background: transparent; color: #20252a; font-weight: 900; white-space: nowrap; transition: color .18s var(--ease-standard); }
      .category-tab.is-active { color: var(--color-primary); }
      .category-tab.is-active::after { position: absolute; right: 0; bottom: -1px; left: 0; height: 3px; border-radius: 4px; background: var(--color-primary); content: ""; }
      .filter-entry-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      .filter-entry-row.is-single { grid-template-columns: 1fr; }
      .filter-entry { display: flex; min-width: 0; min-height: 44px; align-items: center; justify-content: center; gap: 5px; padding: 7px 10px; border: 1px solid var(--color-border); border-radius: var(--radius-control); background: #fff; color: #25292d; font-size: .9rem; font-weight: 900; line-height: 1; white-space: nowrap; box-shadow: none; transition: border-color .18s var(--ease-standard), background .18s var(--ease-standard); }
      .primary-filter-entry { justify-content: space-between; margin-top: 8px; padding: 8px 14px; text-align: left; }
      .primary-filter-entry span { min-width: 0; overflow: hidden; color: #798087; font-size: .76rem; font-weight: 800; text-overflow: ellipsis; white-space: nowrap; }
      .filter-entry::after { flex: 0 0 auto; content: "v"; color: #596068; font-size: .82rem; line-height: 1; }
      .filter-entry.is-active { border-color: #ffc4b5; background: var(--color-primary-soft); color: var(--color-primary); }
      .filter-entry.is-active::after { transform: rotate(180deg); }
      .filter-entry small { display: block; max-width: 100%; overflow: hidden; color: #777d82; font-size: .7rem; font-weight: 700; text-overflow: ellipsis; white-space: nowrap; }
      .filter-dropdown { position: absolute; top: calc(100% + 10px); right: 0; left: 0; display: flex; max-height: min(75vh, 650px); flex-direction: column; border: 1px solid var(--color-border); border-radius: 16px; background: #fff; box-shadow: var(--shadow-panel); overflow: hidden; }
      .filter-dropdown-inner { min-height: 0; overflow: auto; overscroll-behavior: contain; padding: 18px; -webkit-overflow-scrolling: touch; }
      .filter-backdrop { position: fixed; z-index: 25; inset: 0; background: rgba(25,29,34,.22); backdrop-filter: blur(1px); }
      .filter-panel-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; font-weight: 900; }
      .location-status { color: #5d6870; font-size: .86rem; font-weight: 700; }
      .location-action { padding: 8px 10px; border-radius: 7px; background: #fff1eb; color: #ff5b37; font-weight: 900; }
      .choice-row { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
      .choice-button { min-height: 40px; border: 1px solid transparent; border-radius: 10px; background: var(--color-soft); color: #30353a; font-weight: 800; transition: background .18s var(--ease-standard), border-color .18s var(--ease-standard); }
      .choice-button.is-selected { border-color: #ffb39f; background: var(--color-primary-soft); color: var(--color-primary); }
      .area-picker { display: grid; grid-template-columns: 128px minmax(0, .8fr) minmax(0, 1.2fr); min-height: 330px; margin-top: 16px; border-top: 1px solid #f0ece8; }
      .area-level { display: grid; align-content: start; gap: 2px; padding: 10px 0; }
      .area-level + .area-level { border-left: 1px solid #f0ece8; }
      .area-option { min-height: 44px; padding: 8px 14px; background: transparent; color: #30353a; text-align: left; }
      .area-option.is-selected { background: #fff7f4; color: var(--color-primary); font-weight: 900; }
      .food-picker { display: grid; min-height: 390px; }
      .food-group-nav { display: grid; align-content: start; border-right: 1px solid #f0ece8; background: #fafafa; }
      .food-group-nav-button { min-height: 52px; padding: 8px 12px; background: transparent; color: #30353a; text-align: left; font-weight: 800; }
      .food-group-nav-button.is-selected { background: #fff; color: var(--color-primary); }
      .food-groups { display: grid; align-content: start; gap: 18px; padding-left: 0; }
      .food-group { display: grid; gap: 14px; align-items: start; }
      .food-group-title { display: grid; gap: 5px; justify-items: start; color: #25292d; font-weight: 900; }
      .food-group-title span:first-child { display: grid; width: 34px; height: 34px; place-items: center; border-radius: 50%; background: #fff1eb; color: #ff5b37; }
      .food-options { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .food-option { min-height: 44px; padding: 8px 10px; border: 1px solid transparent; border-radius: 9px; background: var(--color-soft); color: #30353a; font-weight: 800; }
      .food-option.is-selected { border-color: #ffb39f; background: var(--color-primary-soft); color: var(--color-primary); }
      .sort-options { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .sort-option { display: flex; min-height: 46px; align-items: center; justify-content: space-between; padding: 0 14px; border: 1px solid var(--color-border); border-radius: 9px; background: #fff; color: #30353a; font-weight: 800; }
      .sort-option.is-selected { border-color: #ffb39f; background: var(--color-primary-soft); color: var(--color-primary); }
      .filter-footer { display: flex; flex: 0 0 auto; justify-content: space-between; gap: 10px; padding: 12px 18px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid #eee9e4; background: #fff; box-shadow: 0 -8px 20px rgba(31,41,51,.06); }
      .filter-footer button { min-height: 44px; border-radius: 8px; padding: 0 22px; font-weight: 900; }
      .filter-reset { background: #f5f5f4; color: #454b50; }
      .filter-confirm { flex: 1; max-width: 280px; background: var(--color-primary); color: #fff; }
      .active-filter-summary { display: grid; grid-template-columns: auto minmax(0, 1fr); gap: 10px; align-items: center; margin: 9px 2px 0; color: #53655a; font-size: .84rem; font-weight: 800; }
      .filter-summary-text { min-width: 0; overflow: hidden; color: var(--color-primary); text-align: right; text-overflow: ellipsis; white-space: nowrap; }
      .filter-token { padding: 3px 8px; border-radius: 999px; background: var(--color-primary-soft); color: var(--color-primary); }
      .combined-filter-panel { display: grid; gap: 18px; }
      .combined-filter-panel.is-tabbed { grid-template-columns: 112px minmax(0, 1fr); gap: 14px; min-height: min(56vh, 500px); }
      .combined-section-nav { position: sticky; top: 0; align-self: start; display: grid; align-content: start; gap: 6px; max-height: min(62vh, 520px); overflow-y: auto; overscroll-behavior: contain; padding-right: 10px; border-right: 1px solid #f0ece8; background: #fff; }
      .combined-section-tab { display: grid; min-height: 54px; align-content: center; gap: 3px; padding: 9px 10px; border-radius: 12px; background: transparent; color: #30353a; text-align: left; font-weight: 900; transition: background .18s var(--ease-standard), color .18s var(--ease-standard); }
      .combined-section-tab small { min-width: 0; overflow: hidden; color: #7b838a; font-size: .68rem; font-weight: 800; text-overflow: ellipsis; white-space: nowrap; }
      .combined-section-tab.is-selected { background: var(--color-primary-soft); color: var(--color-primary); }
      .combined-section-tab.is-selected small { color: #b5563d; }
      .combined-section-body { min-width: 0; min-height: 0; }
      .filter-section { display: grid; gap: 10px; }
      .filter-section + .filter-section { border-top: 1px solid #f0ece8; padding-top: 16px; }
      .reel-shell { position: relative; margin-top: 16px; padding: 12px; overflow: hidden; border-radius: 16px; background: radial-gradient(circle at 28% 20%, rgba(255,132,105,.16), transparent 31%), radial-gradient(circle at 76% 18%, rgba(94,194,255,.12), transparent 34%), linear-gradient(155deg, #17224d, #0c1320 76%); box-shadow: inset 0 0 0 1px rgba(255,255,255,.10), 0 12px 30px rgba(35,45,85,.12); }
      .reel-window { position: relative; height: clamp(340px, 38vw, 410px); overflow: hidden; border-radius: 12px; perspective: 1250px; }
      .reel-window::before { position: absolute; z-index: 0; inset: 34px 8%; content: ""; border-radius: 50%; background: radial-gradient(circle at 36% 28%, rgba(255,255,255,.18), rgba(255,183,112,.07) 28%, rgba(29,42,78,.15) 56%, rgba(5,10,22,.42) 74%, transparent 76%); box-shadow: inset -34px -18px 62px rgba(3,8,20,.42), inset 20px 12px 42px rgba(255,255,255,.08), 0 0 56px rgba(112,177,255,.12); }
      .reel-window::after { position: absolute; z-index: 5; inset: 31px 7.5%; border: 1px solid rgba(185,218,255,.13); border-radius: 50%; content: ""; box-shadow: inset 18px 0 26px rgba(255,255,255,.05), inset -22px 0 30px rgba(3,8,20,.28); pointer-events: none; }
      .reel-focus { position: absolute; z-index: 7; top: 50%; left: 50%; width: 22px; height: 22px; border: 1px solid rgba(255,226,184,.66); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 0 5px rgba(255,206,145,.08), 0 0 22px rgba(255,184,103,.2); pointer-events: none; }
      .reel-focus::after { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; border-radius: 50%; transform: translate(-50%, -50%); background: rgba(255,239,214,.9); box-shadow: 0 0 9px rgba(255,205,145,.7); content: ""; }
      .reel-shell.is-rolling .reel-focus { animation: focusPulse 1.1s ease-in-out infinite; }
      .reel-shell.is-settling .reel-focus { border-color: rgba(255,235,203,.92); box-shadow: 0 0 0 7px rgba(255,206,145,.1), 0 0 30px rgba(255,184,103,.38); }
      .reel-shell.is-revealed .reel-focus { opacity: 0; transform: translate(-50%, -50%) scale(.55); animation: none; transition: opacity .3s ease, transform .3s ease; }
      .reel-track { position: absolute; z-index: 2; inset: 0; transform-style: preserve-3d; transform: rotateX(10deg) rotateY(0deg); will-change: transform; }
      .reel-track.is-revealed .reel-card:not(.is-final) { opacity: 0; filter: blur(10px) saturate(.45); pointer-events: none; transition: opacity .38s ease, filter .38s ease; }
      .reel-track.is-revealed .reel-card.is-final { animation: finalReveal 1.05s cubic-bezier(.16,1,.3,1) both; }
      .reel-track.is-accelerating .reel-card { filter: saturate(.92) brightness(.96); }
      .reel-track.is-cruising .reel-card { filter: blur(.55px) saturate(.84) brightness(.88); }
      .reel-track.is-settling .reel-card { opacity: .3 !important; filter: blur(1.8px) saturate(.5) brightness(.68); transition: opacity .55s ease, filter .55s ease; }
      .reel-card { position: absolute; top: 50%; left: 50%; width: 122px; height: 148px; overflow: hidden; border: 1px solid rgba(255,255,255,.18); border-radius: 18px; background: rgba(18,27,42,.68); box-shadow: 0 10px 22px rgba(0,0,0,.22); transform: translate(-50%, -50%) rotateY(var(--theta)) rotateX(var(--phi)) translateZ(var(--radius)) scaleX(var(--curve-scale)) scale(var(--card-scale)); transform-style: preserve-3d; opacity: var(--depth-opacity); filter: saturate(var(--depth-saturation)) brightness(var(--depth-light)); backface-visibility: visible; transition: opacity .24s ease, filter .24s ease, border-color .24s ease; }
      .reel-card::before { position: absolute; z-index: 3; inset: 0; content: ""; border-radius: inherit; background: radial-gradient(ellipse at 50% 45%, transparent 0 42%, rgba(5,12,24,.12) 62%, rgba(3,8,18,.52) 100%); pointer-events: none; }
      .reel-card::after { position: absolute; z-index: 4; inset: 0; content: ""; border-radius: inherit; background: linear-gradient(96deg, rgba(255,255,255,.22), transparent 25%, transparent 68%, rgba(0,0,0,.38)); pointer-events: none; }
      .reel-card.is-final { z-index: 8; width: 218px; height: 246px; border: 1px solid rgba(255,184,121,.5); border-radius: 22px; background: linear-gradient(155deg, rgba(255,255,255,.96), rgba(255,246,238,.96)); box-shadow: 0 24px 54px rgba(0,0,0,.32), 0 0 0 2px rgba(255,190,128,.28); backdrop-filter: blur(14px); }
      .reel-card.is-final::before { background: radial-gradient(circle at 18% 72%, rgba(255,138,92,.12), transparent 36%); mix-blend-mode: normal; }
      .reel-card.is-final::after { background: linear-gradient(105deg, rgba(255,255,255,.22), transparent 38%, rgba(255,255,255,.06)); }
      .food-photo { position: relative; display: grid; height: 94px; place-items: center; background-color: #6d7480; background-image: linear-gradient(145deg, rgba(255,174,105,.12), rgba(24,39,67,.18)), var(--food-image); background-size: cover; background-position: center; }
      .food-photo[data-image-category="dessert"] { background-color: #8b5e50; }
      .food-photo[data-image-category="hotpot"] { background-color: #a83d32; }
      .food-photo[data-image-category="bbq"] { background-color: #6f382b; }

      .food-photo[data-image-category="local"] { background-color: #9a5d35; }
      .food-photo span { position: absolute; z-index: 5; right: 8px; bottom: 8px; left: 8px; display: block; overflow: hidden; border: 1px solid rgba(255,255,255,.16); border-radius: 9px; padding: 5px 8px; background: rgba(10,18,30,.42); color: #fff; font-size: .74rem; font-weight: 900; line-height: 1.15; text-align: center; text-overflow: ellipsis; white-space: nowrap; box-shadow: 0 8px 18px rgba(0,0,0,.12); backdrop-filter: blur(8px); }

      import {

      const RESTAURANT_CHANGES_KEY = "random-restaurant-checkin:restaurant-changes-v1";

      const DISTANCE_OPTIONS = [
        { value: 0, label: "不限" },

        { value: 1000, label: "1km" },
        { value: 3000, label: "3km" },
        { value: 5000, label: "5km" },
        { value: 10000, label: "10km" },
      ];
      
      const DISTRICT_RULES = [];

      let cities = [];
      let currentCity = null;
      let updateManifest = null;
      let initialRestaurants = [];
      let coreRestaurants = [];
      let restaurants = [];
      let checkIns = readJson(CHECK_INS_KEY, []);
      let favorites = readJson(FAVORITES_KEY, []);
      let availability = normalizeAvailability(readJson(AVAILABILITY_KEY, null));
      let restaurantDetailsMap = null;
      let restaurantDetailsPromise = null;
      let restaurantDetailsFailed = false;
      let restaurantsDirty = false;
      let checkInsDirty = false;
      let favoritesDirty = false;
      let availabilityDirty = false;
      let selectedRestaurant = null;
      let pendingRestaurant = null;
      let selectedPickReasons = [];

      let expandedFavoriteIds = new Set();
      let editingRestaurantId = null;
      let editingReviewId = null;

      let selectedBusinessAreas = new Set();
      let selectedDistance = 0;
      let selectedCategoryTab = "recommend";
      let activeFilterPanel = "";
      let activeAreaLevel = "district";
      let activeAreaDistrict = "";
      let userPosition = null;
      let locationStatus = "尚未定位";
      let isLocating = false;
      let lockedScrollY = 0;
      let restaurantDistances = new Map();
      let restaurantFilterEngine = null;
      let restaurantHealth = null;
      let isRolling = false;
      let toastTimer = 0;
      let audioContext = null;
      let pendingMapRestaurant = null;
      let resultRecommendationExpanded = false;
      let diaryFilter = "all";
      let sphereFrame = 0;
      let sphereLastTime = performance.now();
      let sphereRotationY = 0;
      let rollStartedAt = 0;

      const elements = {
        homeTab: document.querySelector("#home-tab"),

        reelShell: document.querySelector(".reel-shell"),
        reelArea: document.querySelector("#reel-area"),

        resultModal: document.querySelector("#result-modal"),
        resultModalHeading: document.querySelector("#result-modal-heading"),

        resultMapButton: document.querySelector("#result-map-button"),
        resultCompleteButton: document.querySelector("#result-complete-button"),
        resultRepickButton: document.querySelector("#result-repick-button"),
        resultCloseButton: document.querySelector("#result-close-button"),
        clearHistoryButton: document.querySelector("#clear-history-button"),
        historyList: document.querySelector("#history-list"),
        form: document.querySelector("#restaurant-form"),
        nameInput: document.querySelector("#name-input"),
        addressInput: document.querySelector("#address-input"),
        restaurantCategoryInput: document.querySelector("#restaurant-category-input"),
        noteInput: document.querySelector("#note-input"),
        submitButton: document.querySelector("#submit-button"),
        cancelEditButton: document.querySelector("#cancel-edit-button"),
        dataDiagnostics: document.querySelector("#data-diagnostics"),
        restaurantList: document.querySelector("#restaurant-list"),
        toast: document.querySelector("#toast"),
      };

      bootstrap();

      async function bootstrap() {
        bindEvents();
        try {
          const [cityConfig, updateInfo] = await Promise.all([loadCitiesConfig(), loadUpdateManifest()]);
          cities = cityConfig;
          updateManifest = updateInfo;
          currentCity = getInitialCity();
          renderCitySelect();
          await loadCurrentCityRestaurants();
          render();
          renderReel(buildRollingReel(), false);
          warmRestaurantDetails();
        } catch (error) {
          restaurants = [];
          render();
          renderReel([], false);
          showMessage(`${error.message || "餐厅数据加载失败"}，请刷新页面重试`);
          console.error("餐厅数据初始化失败", error);
        } finally {
          sphereFrame = requestAnimationFrame(animateSphere);
        }
      }

      async function loadCitiesConfig() {
        const response = await fetch(`cities.json?v=${CURRENT_DATASET_VERSION}`);
        if (!response.ok) throw new Error(`城市配置加载失败：${response.status}`);
        const data = await response.json();
        if (!Array.isArray(data) || data.length === 0) throw new Error("城市配置数据格式无效");
        return data;
      }

      async function loadUpdateManifest() {
        try {
          const response = await fetch(`data/update-manifest.json?v=${CURRENT_DATASET_VERSION}`);
          if (!response.ok) throw new Error(`update manifest ${response.status}`);
          const data = await response.json();
          return data && Array.isArray(data.cities) ? data : null;
        } catch (error) {
          console.warn("Data update manifest unavailable", error);
          return null;
        }
      }

      function getInitialCity() {
        const storedAdcode = localStorage.getItem(CITY_SELECTION_KEY);
        return cities.find((city) => city.adcode === storedAdcode) ||
          cities.find((city) => city.adcode === DEFAULT_CITY_ADCODE) ||
          cities[0];
      }

      function renderCitySelect() {
        if (!elements.citySelect) return;
        elements.citySelect.innerHTML = cities.map((city) =>
          `<option value="${escapeHtml(city.adcode)}">${escapeHtml(city.shortName || city.name)}</option>`
        ).join("");
        elements.citySelect.value = currentCity?.adcode || DEFAULT_CITY_ADCODE;
      }

      async function loadCurrentCityRestaurants() {
        const indexData = await loadRestaurantIndex();
        coreRestaurants = indexData;
        initialRestaurants = indexData;
        restaurantFilterEngine = createRestaurantFilterEngine({
          getDistrict,
          getBusinessArea,
          getDistanceForRestaurant,
        });
        restaurants = readRestaurants();
        invalidateFilterCache();
      }

      async function changeCity(adcode) {
        const nextCity = cities.find((city) => city.adcode === adcode);
        if (!nextCity || nextCity.adcode === currentCity?.adcode) return;
        currentCity = nextCity;
        localStorage.setItem(CITY_SELECTION_KEY, currentCity.adcode);
        resetCityScopedState();
        renderCitySelect();
        elements.citySelect.disabled = true;
        render();
        renderReel([], false);
        showMessage(`正在切换到${currentCity.shortName || currentCity.name}...`);
        try {
          await loadCurrentCityRestaurants();
          render();
          renderReel(buildRollingReel(), false);
          warmRestaurantDetails();
          showMessage(`已切换到${currentCity.shortName || currentCity.name}`);
        } catch (error) {
          restaurants = [];
          render();
          renderReel([], false);
          showMessage(`${currentCity.name}餐厅数据加载失败，请稍后重试`);
          console.error("城市餐厅数据加载失败", error);
        } finally {
          elements.citySelect.disabled = false;
        }
      }

      function resetCityScopedState() {
        closeFilterPanel();
        closeResultModal();
        selectedLocations.clear();
        selectedBusinessAreas.clear();
        selectedDistance = 0;
        selectedCategoryTab = "recommend";
        activeAreaDistrict = "";
        activeAreaLevel = "district";
        selectedRestaurant = null;
        pendingRestaurant = null;
        selectedPickReasons = [];
        restaurantDistances = new Map();
        restaurantDetailsMap = null;
        restaurantDetailsPromise = null;
        restaurantDetailsFailed = false;
        manageRenderLimit = MANAGE_PAGE_SIZE;
      }

      function getCityVersionParam() {
        return `${CURRENT_DATASET_VERSION}-${currentCity?.version || currentCity?.adcode || DEFAULT_CITY_ADCODE}`;
      }

      async function loadRestaurantIndex() {
        const primaryUrl = `${currentCity.indexPath}?v=${getCityVersionParam()}`;
        let indexData = await fetchRestaurantIndex(primaryUrl);
        const minimumCount = Number(currentCity.minRestaurants || 1);
        if (indexData.length < minimumCount) {
          console.warn(`${currentCity.name}餐厅数量异常：${indexData.length} / ${minimumCount}，正在尝试刷新缓存`);
          indexData = await fetchRestaurantIndex(`${primaryUrl}&refresh=${Date.now()}`, { cache: "reload" });
        }
        if (indexData.length < minimumCount) {
          throw new Error(`${currentCity.name}餐厅数量异常：${indexData.length} / ${minimumCount}`);
        }
        return indexData;
      }

      async function fetchRestaurantIndex(url, options = {}) {
        const response = await fetch(url, options);
        if (!response.ok) throw new Error(`餐厅索引加载失败：${response.status}`);
        const data = await response.json();
        if (!Array.isArray(data) || data.length === 0) throw new Error("餐厅索引数据格式无效");
        return data;
      }

      function warmRestaurantDetails() {
        const run = () => loadRestaurantDetails().catch(() => {});
        if ("requestIdleCallback" in window) window.requestIdleCallback(run, { timeout: 4500 });
        else window.setTimeout(run, 900);
      }

      async function loadRestaurantDetails() {
        if (restaurantDetailsMap) return restaurantDetailsMap;
        if (restaurantDetailsPromise) return restaurantDetailsPromise;
        restaurantDetailsPromise = fetch(`${currentCity.detailsPath}?v=${getCityVersionParam()}`)
          .then((response) => {
            if (!response.ok) throw new Error(`餐厅详情加载失败：${response.status}`);
            return response.json();
          })
          .then((data) => {
            if (!data || typeof data !== "object" || Array.isArray(data)) throw new Error("餐厅详情数据格式无效");
            restaurantDetailsMap = data;
            restaurantDetailsFailed = false;
            return restaurantDetailsMap;
          })
          .catch((error) => {
            restaurantDetailsFailed = true;
            restaurantDetailsPromise = null;
            console.warn("餐厅详情数据加载失败", error);
            throw error;
          });
        return restaurantDetailsPromise;
      }

      function mergeRestaurantDetail(restaurant, detail) {
        return detail ? { ...detail, ...restaurant } : restaurant;
      }

      function hydrateRestaurantSync(restaurant) {
        if (!restaurant) return restaurant;
        return mergeRestaurantDetail(restaurant, restaurantDetailsMap?.[restaurant.id]);
      }

      async function hydrateRestaurant(restaurant) {
        if (!restaurant) return restaurant;
        if (restaurantDetailsMap) return hydrateRestaurantSync(restaurant);
        try {
          const details = await loadRestaurantDetails();
          return mergeRestaurantDetail(restaurant, details[restaurant.id]);
        } catch {
          return restaurant;
        }
      }

      function handleCategoryTabClick(event) {
        const button = event.target.closest("[data-category-tab]");
        if (!button) return;
        const nextCategory = button.dataset.categoryTab || "recommend";
        if (nextCategory === selectedCategoryTab) return;
        selectedCategoryTab = nextCategory;
        closeFilterPanel();
        selectedRestaurant = null;
        selectedPickReasons = [];
        render();
        renderReel(buildRollingReel(), false);
      }

      function bindEvents() {
        elements.citySelect.addEventListener("change", (event) => changeCity(event.target.value));
        elements.homeTab.addEventListener("click", () => { closeFilterPanel(); switchView("home"); });
        elements.historyTab.addEventListener("click", () => { closeFilterPanel(); switchView("history"); });

        elements.backHomeButton.addEventListener("click", () => { closeFilterPanel(); switchView("home"); });
        elements.favoritesBackButton.addEventListener("click", () => switchView("home"));
        elements.categoryTabs.addEventListener("click", handleCategoryTabClick);
        document.querySelectorAll("[data-filter-panel]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            toggleFilterPanel(button.dataset.filterPanel);
          });
        });
        elements.filterDropdownContent.addEventListener("click", handleFilterPanelClick);
        elements.filterBackdrop.addEventListener("click", closeFilterPanel);
        elements.imagePreview.addEventListener("click", (event) => {
          if (event.target === elements.imagePreview) closeImagePreview();
        });
        elements.imagePreviewClose.addEventListener("click", closeImagePreview);
        elements.mapPicker.addEventListener("click", (event) => {
          if (event.target === elements.mapPicker) closeMapPicker();
        });
        elements.mapPickerClose.addEventListener("click", closeMapPicker);
        elements.mapPickerOptions.addEventListener("click", handleMapProviderClick);
        elements.mapPicker.addEventListener("click", handleMapCopyClick);
        elements.resultModal.addEventListener("click", (event) => {
          if (event.target === elements.resultModal) closeResultModal();
        });
        elements.resultModalContent.addEventListener("click", handleResultDecisionClick);
        elements.resultCloseButton.addEventListener("click", closeResultModal);
        elements.resultMapButton.addEventListener("click", () => {
          if (selectedRestaurant) openMapPicker(hydrateRestaurantSync(selectedRestaurant));
        });
        elements.resultCompleteButton.addEventListener("click", completeCheckIn);
        elements.resultRepickButton.addEventListener("click", () => {
          closeResultModal();
          selectedRestaurant = null;
          selectedPickReasons = [];
          pickRestaurant();
        });
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && !elements.imagePreview.hidden) closeImagePreview();
          if (event.key === "Escape" && !elements.mapPicker.hidden) closeMapPicker();
          if (event.key === "Escape" && !elements.resultModal.hidden) closeResultModal();
        });
        elements.filterResetButton.addEventListener("click", resetActiveFilterPanel);
        elements.filterConfirmButton.addEventListener("click", closeFilterPanel);
        document.addEventListener("click", (event) => {
          if (!event.composedPath().includes(document.querySelector(".food-filter"))) closeFilterPanel();
        });
        elements.pickButton.addEventListener("click", pickRestaurant);
        elements.clearHistoryButton.addEventListener("click", clearHistory);
        elements.cancelEditButton.addEventListener("click", () => { resetForm(); render(); });
        elements.form.addEventListener("submit", submitRestaurant);
        elements.restaurantList.addEventListener("click", handleRestaurantListClick);
        elements.dataDiagnostics.addEventListener("click", handleDataDiagnosticsClick);
        elements.historyList.addEventListener("click", handleHistoryClick);
        elements.historyList.addEventListener("submit", submitReview);
        elements.diaryFilters.addEventListener("click", handleDiaryFilterClick);
        elements.favoritesList.addEventListener("click", handleFavoritesClick);
      }

      function resetSelectionAfterFilterChange() {
        selectedRestaurant = null;
        pendingRestaurant = null;
        selectedPickReasons = [];
        invalidateFilterCache();
        render();
        renderReel(buildRollingReel(), false);
      }

      function invalidateFilterCache() {
        restaurantFilterEngine?.invalidate();
      }

      function toggleFilterPanel(panel) {
        activeFilterPanel = activeFilterPanel === panel ? "" : panel;
        renderFilterControls();
      }

      function closeFilterPanel() {
        if (!activeFilterPanel) return;
        activeFilterPanel = "";
        renderFilterControls();
      }

      function lockPageScroll() {
        if (document.body.classList.contains("is-filter-open")) return;
        lockedScrollY = window.scrollY;
        document.body.style.top = `-${lockedScrollY}px`;
        document.body.classList.add("is-filter-open");
      }

      function unlockPageScroll() {
        if (!document.body.classList.contains("is-filter-open")) return;
        document.body.classList.remove("is-filter-open");
        document.body.style.top = "";
        window.scrollTo(0, lockedScrollY);
      }

      function handleFilterPanelClick(event) {
        const target = event.target.closest("button");
        if (!target) return;
        if (target.dataset.distance !== undefined) {
          selectedDistance = Number(target.dataset.distance);
          if (selectedDistance > 0 && !userPosition) locateUser();
        }
        if (target.dataset.areaLevel) activeAreaLevel = target.dataset.areaLevel;
        if (target.dataset.district !== undefined) {
          const value = target.dataset.district;
          if (value) {
            activeAreaDistrict = value;
            selectedLocations.clear();
            selectedLocations.add(value);
          } else {
            selectedLocations.clear();
            activeAreaDistrict = "";
          }
          selectedBusinessAreas.clear();
        }
        if (target.dataset.businessArea !== undefined) {
          if (target.dataset.businessArea) toggleSetValue(selectedBusinessAreas, target.dataset.businessArea);
          else selectedBusinessAreas.clear();
        }
        if (target.dataset.action === "locate") locateUser();
        resetSelectionAfterFilterChange();
      }

      function toggleSetValue(set, value) {
        if (set.has(value)) set.delete(value);
        else set.add(value);
      }

      async function locateUser() {
        if (isLocating) return;
        isLocating = true;
        locationStatus = "正在定位...";
        renderFilterControls();
        try {
          userPosition = await requestCurrentPosition();
          restaurantDistances = new Map();
          invalidateFilterCache();
          locationStatus = `定位成功，精度约 ${Math.round(userPosition.accuracy)}m`;
          if (!selectedDistance) selectedDistance = 3000;
          showMessage("已获取当前位置，可以随机周边美食。");
        } catch (error) {
          userPosition = null;
          selectedDistance = 0;
          locationStatus = error.message;
          showMessage(error.message);
        } finally {
          isLocating = false;
          resetSelectionAfterFilterChange();
        }
      }

      function resetActiveFilterPanel() {
        if (activeFilterPanel === "combined") {
          selectedDistance = 0;
          selectedLocations.clear();
          selectedBusinessAreas.clear();
        }
        resetSelectionAfterFilterChange();
      }

      function readJson(key, fallback) {
        return storageReadJson(key, fallback);
      }

      function readRestaurants() {
        try {
          const storageKeys = getRestaurantStorageKeys();
          const result = readRestaurantState({
            coreRestaurants,
            legacyCoreRestaurantCount: getLegacyCoreRestaurantCount(),
            currentDatasetVersion: getCityVersionParam(),
            keys: storageKeys,
            inferCategory,
            readJson: storageReadJson,
            safeSetItem,
          });
          restaurantHealth = result.health;
          return result.restaurants;
        } catch (error) {
          console.warn("读取本地餐厅数据失败，已使用内置餐厅库", error);
          restaurantHealth = null;
          return initialRestaurants;
        }
      }

      function getRestaurantStorageKeys() {
        if (!currentCity || currentCity.adcode === DEFAULT_CITY_ADCODE) {
          return {
            restaurants: RESTAURANTS_KEY,
            version: RESTAURANTS_VERSION_KEY,
            changes: RESTAURANT_CHANGES_KEY,
          };
        }
        return {
          restaurants: `${RESTAURANTS_KEY}:${currentCity.adcode}`,
          version: `${RESTAURANTS_VERSION_KEY}:${currentCity.adcode}`,
          changes: `${RESTAURANT_CHANGES_KEY}:${currentCity.adcode}`,
        };
      }

      function getLegacyCoreRestaurantCount() {
        return currentCity?.adcode === DEFAULT_CITY_ADCODE ? LEGACY_CORE_RESTAURANT_COUNT : coreRestaurants.length;
      }

      function applyRestaurantChanges(baseRestaurants, changes) {
        const deleted = new Set(changes.deletedIds);
        const base = baseRestaurants
          .filter((restaurant) => !deleted.has(restaurant.id))
          .map((restaurant) => changes.overrides[restaurant.id]
            ? { ...restaurant, ...changes.overrides[restaurant.id] }
            : restaurant);
        return [...changes.added, ...base];
      }

      function buildRestaurantChanges(currentRestaurants) {
        return buildRestaurantChangesFromStore(currentRestaurants, initialRestaurants, inferCategory);
      }

      function saveAll() {
        const storageKeys = getRestaurantStorageKeys();
        if (restaurantsDirty && safeSetItem(storageKeys.changes, JSON.stringify(buildRestaurantChanges(restaurants)))) {
          safeSetItem(storageKeys.version, getCityVersionParam());
          localStorage.removeItem(storageKeys.restaurants);
          restaurantsDirty = false;
        }
        if (checkInsDirty && safeSetItem(CHECK_INS_KEY, JSON.stringify(checkIns))) checkInsDirty = false;
        if (favoritesDirty && safeSetItem(FAVORITES_KEY, JSON.stringify(favorites))) favoritesDirty = false;
        if (availabilityDirty && safeSetItem(AVAILABILITY_KEY, JSON.stringify(availability))) availabilityDirty = false;
      }

      function safeSetItem(key, value) {
        return storageSafeSetItem(key, value, {
          onError: () => showMessage("本地存储空间不足，请删除部分打卡图片后重试"),
        });
      }

      function getRestaurantText(restaurant) {
        return `${restaurant.name || ""} ${restaurant.note || ""} ${restaurant.address || ""}`;
      }

      function matchesCategory(restaurant, categoryValue) {
        return inferCategory(restaurant) === categoryValue;
      }

      function inferCategory(restaurant) {
        return inferRestaurantCategory(restaurant);
      }

      function getDistrict(address = "", restaurant = {}) {
        if (restaurant.district) return restaurant.district;
        const matched = DISTRICT_RULES.find((rule) =>
          rule.keywords.some((keyword) => address.includes(keyword)),
        );
        return matched ? matched.district : "鍏朵粬鍖哄煙";
      }

      function getLocations() {
        return [...new Set(restaurants.map((restaurant) => getDistrict(restaurant.address, restaurant)))].sort((a, b) => a.localeCompare(b, "zh-CN"));
      }

      function getBusinessArea(restaurant) {
        return typeof restaurant.businessArea === "string" ? restaurant.businessArea : "";
      }

      function getBusinessAreas() {
        const scoped = restaurants.filter((restaurant) =>
          selectedLocations.size === 0 || selectedLocations.has(getDistrict(restaurant.address, restaurant))
        );
        return [...new Set(scoped.map(getBusinessArea).filter(Boolean))]
          .sort((a, b) => a.localeCompare(b, "zh-CN"));
      }

      function getFilteredRestaurants() {
        return applyCategoryTabFilter(getBaseAvailableRestaurants());
      }

      function getBaseAvailableRestaurants() {
        const filtered = restaurantFilterEngine?.getFilteredRestaurants(restaurants, {
          selectedLocations,
          selectedBusinessAreas,
          selectedDistance,
          userPosition,
        }) || [];
        return rankAvailablePool(filterAvailableRestaurants(filtered, availability), availability);
      }

      function applyCategoryTabFilter(items) {
        const tab = CATEGORY_TABS.find((entry) => entry.value === selectedCategoryTab);
        if (!tab || !tab.categories?.length) return items;
        const allowedCategories = new Set(tab.categories);
        return items.filter((restaurant) => {
          const category = inferCategory(restaurant);
          const subcategory = inferSubcategory(restaurant);
          return allowedCategories.has(category) || allowedCategories.has(subcategory);
        });
      }

      function getDistanceForRestaurant(restaurant) {
        if (!userPosition) return null;
        if (!restaurantDistances.has(restaurant.id)) {
          restaurantDistances.set(restaurant.id, getRestaurantDistance(restaurant, userPosition));
        }
        return restaurantDistances.get(restaurant.id);
      }

      function formatLocation(address, restaurant = {}) {
        const district = restaurant.district || getDistrict(address, restaurant);
        const area = getBusinessArea(restaurant) ? ` · ${getBusinessArea(restaurant)}` : "";
        const cityName = restaurant.city || "杭州市";
        return address ? `${cityName} · ${district}${area} · ${address}` : `${cityName} · ${district}${area} · 位置待补充`;
      }

      function getMapUrl(restaurant, provider) {
        return buildMapUrl(restaurant, provider, navigator.userAgent);
      }

      function getCurrentUpdateInfo() {
        return updateManifest?.cities?.find((city) => city.adcode === currentCity?.adcode) || null;
      }

      function formatUpdateTime(value) {
        if (!value) return "暂无";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "暂无";
        return new Intl.DateTimeFormat("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        }).format(date);
      }

      function openMapPicker(restaurant) {
        pendingMapRestaurant = restaurant;
        elements.mapPickerName.textContent = restaurant.name || restaurant.restaurantName || "";
        const providers = getMapProviders(navigator.userAgent);
        elements.mapPickerOptions.innerHTML = providers.map((provider) => `
          <button class="map-provider" data-map-provider="${provider.value}" data-map-symbol="${provider.symbol}" type="button">${provider.label}</button>

      function handleMapProviderClick(event) {

      async function handleMapCopyClick(event) {

          showMessage(button.dataset.mapCopy === "full" ? "已复制店名和地址。" : "已复制地址。");

      function renderFilters(filteredRestaurants) {
        renderCategoryTabs();
        renderFilterControls();
        const tokens = [];
        if (selectedDistance) tokens.push(DISTANCE_OPTIONS.find((option) => option.value === selectedDistance)?.label);
        if (selectedLocations.size) tokens.push(...[...selectedLocations]);
        if (selectedBusinessAreas.size) tokens.push(...[...selectedBusinessAreas].slice(0, 2));

      function renderFilterControls() {
        elements.combinedFilterButton.innerHTML = `位置筛选<span>${escapeHtml(getCombinedFilterLabel())}</span>`;

          const entryRow = document.querySelector(".filter-entry-row");

      function renderActiveFilterPanel() {

      function getNearbySectionHint() {
        const selectedCount = selectedLocations.size + selectedBusinessAreas.size;
        if (selectedDistance) return DISTANCE_OPTIONS.find((option) => option.value === selectedDistance)?.label || "距离";
        if (selectedCount === 1) return getNearbyButtonLabel();

      }

      function renderNearbyPanel() {
        const districts = getLocations();
        if (activeAreaDistrict && !districts.includes(activeAreaDistrict)) {
          activeAreaDistrict = "";
        }
        if (!activeAreaDistrict && selectedLocations.size) {
          activeAreaDistrict = [...selectedLocations][0] || "";
        }
        const businessAreas = [...new Set(restaurants
          .filter((restaurant) => !activeAreaDistrict || getDistrict(restaurant.address, restaurant) === activeAreaDistrict)
          .map(getBusinessArea)
          .filter(Boolean))]
          .sort((left, right) => left.localeCompare(right, "zh-CN"));
        return `
          <div class="filter-panel-title">
            <div>
              <strong>距离 ${escapeHtml(locationStatus)}</strong>
              <div class="location-status">定位仅用于本机距离计算</div>
            </div>
            <button class="location-action" data-action="locate" type="button">${isLocating ? "定位中" : "重新定位"}</button>
          </div>
          <div class="choice-row compact-choice-row">
            ${DISTANCE_OPTIONS.map((option) => `
              <button class="choice-button ${selectedDistance === option.value ? "is-selected" : ""}" data-distance="${option.value}" type="button">${option.label}</button>
            `).join("")}
          </div>
          <div class="area-picker">
            <div class="area-level">
              <button class="area-option ${activeAreaLevel === "district" ? "is-selected" : ""}" data-area-level="district" type="button">行政区</button>
            </div>
            <div class="area-level">
              <button class="area-option ${selectedLocations.size === 0 ? "is-selected" : ""}" data-area-level="district" data-district="" type="button">不限</button>
              ${districts.map((district) => `
                <button class="area-option ${selectedLocations.has(district) ? "is-selected" : ""}" data-area-level="district" data-district="${escapeHtml(district)}" type="button">${escapeHtml(district)}</button>
              `).join("")}
            </div>
            <div class="area-level">
              <button class="area-option ${selectedBusinessAreas.size === 0 ? "is-selected" : ""}" data-business-area="" type="button">全部商圈</button>
              ${businessAreas.map((area) => `
                <button class="area-option ${selectedBusinessAreas.has(area) ? "is-selected" : ""}" data-business-area="${escapeHtml(area)}" type="button">${escapeHtml(area)}</button>
              `).join("")}

          </div>
        `;
      }
      function getNearbyButtonLabel() {
        if (selectedDistance) return DISTANCE_OPTIONS.find((option) => option.value === selectedDistance)?.label || "附近";
        if (selectedBusinessAreas.size === 1) return [...selectedBusinessAreas][0];
        if (selectedLocations.size === 1) return [...selectedLocations][0];
        if (selectedLocations.size + selectedBusinessAreas.size > 1) return `已选 ${selectedLocations.size + selectedBusinessAreas.size} 项`;
        return "附近";

      function getCombinedFilterLabel() {
        const tokens = [];
        const nearby = getNearbyButtonLabel();
        if (nearby !== "附近") tokens.push(nearby);
        return tokens.length ? tokens.join(" · ") : "全部位置";

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function createId(prefix) {

      }

        elements.historyView.hidden = view !== "history";

        elements.historyTab.classList.toggle("is-active", view === "history");

        elements.favoritesTab.classList.toggle("is-active", view === "favorites");
        if (view === "manage") {
          loadRestaurantDetails().then(() => {
            if (!elements.manageView.hidden) renderRestaurants();
          }).catch(() => {});
          manageRenderLimit = MANAGE_PAGE_SIZE;
          renderRestaurantForm();

      function render() {

        renderPickButton();

        renderDiaryHeader();

        renderFavorites();
        if (!elements.manageView.hidden) {

      function renderPickButton() {
        elements.pickButton.disabled = isRolling;
        const label = isRolling ? "正在抽取..." : "随机抽一家餐厅";
        elements.pickButton.innerHTML = `
          <span class="random-button-main">${label}</span>
        `;
      }

      function renderReel(sequence, rolling, revealed = false) {
        if (!sequence.length) {
          elements.reelArea.className = "reel-track";
          elements.reelShell.classList.remove("is-rolling", "is-settling", "is-revealed");
          elements.reelArea.innerHTML = "";
          return;
        }
        elements.reelArea.className = `reel-track ${rolling ? "is-rolling" : ""} ${revealed ? "is-revealed" : ""}`;
        elements.reelShell.classList.toggle("is-rolling", rolling);
        elements.reelShell.classList.toggle("is-revealed", revealed);
        elements.reelShell.classList.remove("is-settling");
        elements.reelArea.innerHTML = sequence.map((restaurant, index) => `
          <article class="reel-card ${revealed && index === 0 ? "is-final" : ""}" style="${getSphereStyle(index, sequence.length, revealed)}" key="${restaurant.id}-${index}">
            <div class="food-photo" data-image-category="${getRestaurantImageCategory(restaurant)}" style="--food-image: url('${getCategoryRestaurantImage(restaurant)}')"><span>${escapeHtml(getCategoryLabel(restaurant.category || inferCategory(restaurant)))}</span></div>
            <h3>${escapeHtml(restaurant.name)}</h3>
            <p>${escapeHtml([getDistrict(restaurant.address, restaurant), getCategoryLabel(restaurant.category || inferCategory(restaurant))].filter(Boolean).join(" 路 "))}</p>
            <div class="tag-line">
              <span class="mini-tag">${escapeHtml(getCategoryLabel(restaurant.category || inferCategory(restaurant)))}</span>
            </div>
          </article>
        `).join("");
      }

      function animateSphere(timestamp) {
        const delta = Math.min(34, Math.max(0, timestamp - sphereLastTime));
        sphereLastTime = timestamp;
        if (selectedRestaurant && !isRolling) {
          elements.reelArea.style.transform = "rotateX(0deg) rotateY(0deg) rotateZ(0deg)";
        } else {
          let speed = 0.014;
          let tilt = 9 + Math.sin(timestamp / 2300) * 3;
          if (isRolling) {
            const progress = Math.min(1, (timestamp - rollStartedAt) / ROLL_DURATION_MS);
            const accelerating = progress < 0.18;
            const cruising = progress >= 0.18 && progress < 0.58;
            const settling = progress >= 0.58;
            elements.reelArea.classList.toggle("is-accelerating", accelerating);
            elements.reelArea.classList.toggle("is-cruising", cruising);
            elements.reelArea.classList.toggle("is-settling", settling);
            elements.reelShell.classList.toggle("is-settling", settling);
            if (accelerating) {
              const phase = progress / 0.18;
              const eased = 1 - Math.pow(1 - phase, 3);
              speed = 0.016 + (0.54 - 0.016) * eased;
            } else if (cruising) {
              speed = 0.54;
            } else {
              const phase = (progress - 0.58) / 0.42;
              const inertia = Math.pow(1 - phase, 4);
              speed = 0.018 + (0.54 - 0.018) * inertia;
            }
            tilt = 7 + Math.sin(progress * Math.PI * 2.5) * 2.4 * (1 - progress);
            if (progress >= 1) {
              finishPick();
              sphereFrame = requestAnimationFrame(animateSphere);
              return;
            }
          }
          else {
            elements.reelArea.classList.remove("is-accelerating", "is-cruising", "is-settling");
            elements.reelShell.classList.remove("is-settling");
          }
          sphereRotationY -= speed * delta;
          elements.reelArea.style.transform = `rotateX(${tilt.toFixed(2)}deg) rotateY(${sphereRotationY.toFixed(2)}deg) rotateZ(0deg)`;
        }
        sphereFrame = requestAnimationFrame(animateSphere);
      }

      function shuffleRestaurants(items) {
        return [...items].sort(() => Math.random() - 0.5);
      }

      function buildRollingReel() {
        const pool = getFilteredRestaurants();
        return shuffleRestaurants(pool).slice(0, Math.min(REEL_LENGTH, pool.length));
      }

      function buildFinalReel(finalRestaurant) {
        const pool = getFilteredRestaurants();
        return [finalRestaurant].concat(
          shuffleRestaurants(pool.filter((restaurant) => restaurant.id !== finalRestaurant.id))
            .slice(0, Math.min(REEL_LENGTH - 1, Math.max(pool.length - 1, 0))),
        );
      }

      function buildPickReasons(restaurant, wasRecentPick = false) {

          categoryLabel: getCategoryLabel(restaurant.category || inferCategory(restaurant)),

      function getSphereStyle(index, total, revealed = false) {
        if (revealed && index === 0) {
          return "--theta: 0deg; --phi: 0deg; --twist: 0deg; --radius: 0px; --depth-opacity: 1; --depth-saturation: 1.12; --depth-light: 1.04; --curve-scale: 1; --card-scale: 1;";
        }

        const adjustedIndex = revealed ? index - 1 : index;
        const adjustedTotal = Math.max(revealed ? total - 1 : total, 1);
        const sphereRadius = Math.min(196, 112 + Math.sqrt(adjustedTotal) * 11.5);
        const densityScale = adjustedTotal <= 4
          ? 1.18
          : adjustedTotal <= 10
            ? 1.08
            : adjustedTotal <= 22
              ? 0.98
              : adjustedTotal >= 40
                ? 0.8
                : 0.9;
        const position = getRingSpherePosition(adjustedIndex, adjustedTotal);
        const { x, y, z } = position;
        const cardTheta = Math.atan2(x, z) * 180 / Math.PI;
        const cardPhi = Math.asin(y) * 180 / Math.PI;
        const depthOpacity = Math.max(0.24, 0.56 + z * 0.38).toFixed(2);
        const depthSaturation = Math.max(0.58, 0.82 + z * 0.24).toFixed(2);
        const depthLight = Math.max(0.58, 0.88 + z * 0.18).toFixed(2);
        const cardScale = Math.max(0.56, (0.82 + z * 0.18) * densityScale).toFixed(2);
        const curveScale = Math.max(0.5, 0.94 - Math.abs(x) * 0.28 - Math.max(0, -z) * 0.18).toFixed(2);
        return `--theta: ${cardTheta.toFixed(2)}deg; --phi: ${cardPhi.toFixed(2)}deg; --twist: 0deg; --radius: ${sphereRadius.toFixed(1)}px; --depth-opacity: ${depthOpacity}; --depth-saturation: ${depthSaturation}; --depth-light: ${depthLight}; --curve-scale: ${curveScale}; --card-scale: ${cardScale};`;
      }

      function getRingSpherePosition(index, total) {
        if (total <= 1) return { x: 0, y: 0, z: 1 };
        if (total <= 5) {
          const angle = (index / total) * Math.PI * 2;
          return { x: Math.sin(angle), y: 0, z: Math.cos(angle) };
        }

        const ringCount = Math.max(2, Math.min(8, Math.round(Math.sqrt(total / 1.35))));
        const rings = Array.from({ length: ringCount }, (_, ringIndex) => {
          const latitude = -Math.PI / 2 + Math.PI * (ringIndex + 0.5) / ringCount;
          return { latitude, weight: Math.max(0.18, Math.cos(latitude)), count: 1 };
        });
        const remaining = total - ringCount;
        const weightTotal = rings.reduce((sum, ring) => sum + ring.weight, 0);
        const quotas = rings.map((ring) => remaining * ring.weight / weightTotal);
        rings.forEach((ring, ringIndex) => {
          ring.count += Math.floor(quotas[ringIndex]);
        });
        let unassigned = total - rings.reduce((sum, ring) => sum + ring.count, 0);
        const remainderOrder = quotas
          .map((quota, ringIndex) => ({ ringIndex, remainder: quota - Math.floor(quota) }))
          .sort((left, right) => right.remainder - left.remainder);
        for (let extraIndex = 0; extraIndex < unassigned; extraIndex += 1) {
          rings[remainderOrder[extraIndex % remainderOrder.length].ringIndex].count += 1;
        }

        let cursor = 0;
        for (let ringIndex = 0; ringIndex < rings.length; ringIndex += 1) {
          const ring = rings[ringIndex];
          if (index >= cursor + ring.count) {
            cursor += ring.count;
            continue;
          }
          const localIndex = index - cursor;
          const stagger = ringIndex % 2 ? 0.5 : 0;
          const longitude = Math.PI * 2 * (localIndex + stagger) / ring.count;
          const horizontalRadius = Math.cos(ring.latitude);
          return {
            x: Math.sin(longitude) * horizontalRadius,
            y: Math.sin(ring.latitude),
            z: Math.cos(longitude) * horizontalRadius,
          };
        }
        return { x: 0, y: 0, z: -1 };
      }

      function getAudioContext() {
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtor) return null;
        if (!audioContext) audioContext = new AudioCtor();
        return audioContext;
      }

      function playTone(frequency, startOffset, duration, volume = 0.05, type = "sine") {
        const context = getAudioContext();
        if (!context) return;
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        const startAt = context.currentTime + startOffset;
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, startAt);
        gain.gain.setValueAtTime(0.0001, startAt);
        gain.gain.exponentialRampToValueAtTime(volume, startAt + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start(startAt);
        oscillator.stop(startAt + duration + 0.03);
      }

      function playRollingSound() {
        const context = getAudioContext();
        if (!context) return;
        context.resume?.();
        let offset = 0;
        let index = 0;
        while (offset < ROLL_DURATION_MS / 1000 - 0.08) {
          const progress = offset / (ROLL_DURATION_MS / 1000);
          playTone(520 - progress * 250 + (index % 3) * 22, offset, 0.038 + progress * 0.02, 0.022 - progress * 0.008, "triangle");
          offset += 0.045 + progress * progress * 0.15;
          index += 1;
        }
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        const startAt = context.currentTime;
        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(150, startAt);
        oscillator.frequency.exponentialRampToValueAtTime(62, startAt + ROLL_DURATION_MS / 1000);
        gain.gain.setValueAtTime(0.0001, startAt);
        gain.gain.exponentialRampToValueAtTime(0.014, startAt + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.0001, startAt + ROLL_DURATION_MS / 1000);
        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start(startAt);
        oscillator.stop(startAt + ROLL_DURATION_MS / 1000 + 0.04);
      }

      function playLockSound() {
        const context = getAudioContext();
        if (!context) return;
        context.resume?.();
        [392, 523.25, 659.25].forEach((frequency, index) => {
          playTone(frequency, index * 0.08, 0.18, 0.055, "sine");
        });
      }
