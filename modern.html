<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="人间寻味记" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#fff7e8" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <title>人间寻味记</title>
    <style>
      :root {
        color: #1e2329;
        background:
          radial-gradient(circle at 12% 8%, rgba(255, 88, 110, 0.26), transparent 28rem),
          radial-gradient(circle at 88% 16%, rgba(66, 211, 255, 0.22), transparent 30rem),
          radial-gradient(circle at 55% 96%, rgba(255, 205, 78, 0.24), transparent 30rem),
          linear-gradient(135deg, #fff8f0 0%, #f7fbff 48%, #fff3fb 100%);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { margin: 0; min-width: 320px; min-height: 100vh; min-height: 100dvh; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); overscroll-behavior-y: contain; }
      body.is-filter-open { position: fixed; width: 100%; overflow: hidden; }
      button, input, textarea { font: inherit; }
      button, a { touch-action: manipulation; }
      button { border: 0; cursor: pointer; }
      button:disabled { cursor: not-allowed; opacity: 0.7; }

      .app-shell { width: min(1160px, calc(100% - 32px)); margin: 0 auto; padding: 22px 0 48px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 18px 20px; }
      h1, h2, h3 { margin: 0; letter-spacing: 0; }
      h1 { margin-top: 4px; font-size: clamp(2rem, 4.8vw, 4rem); line-height: 1.02; }
      .eyebrow { margin: 0; color: #7d5544; font-size: 0.78rem; font-weight: 800; letter-spacing: 0; }
      .top-actions { display: flex; gap: 8px; padding: 6px; border: 1px solid rgba(255, 91, 91, 0.18); border-radius: 999px; background: rgba(255,255,255,.78); box-shadow: 0 18px 42px rgba(45,54,60,.08); }
      .nav-action { min-height: 42px; border-radius: 999px; padding: 0 14px; background: transparent; color: #33423a; font-weight: 800; white-space: nowrap; }
      .nav-action.is-active { background: linear-gradient(135deg, #ff5b6e, #ff8a3d); color: #fff; }
      .favorite-action.is-favorite { border-color: #ffc3cf; background: #fff0f4; color: #d92f58; }

      .home-grid { display: grid; grid-template-columns: minmax(0, 1.35fr) minmax(320px, .65fr); gap: 18px; align-items: start; }
      .home-grid > * { min-width: 0; }
      .panel, .hero-stage { border: 1px solid rgba(255,255,255,.74); border-radius: 8px; background: rgba(255,255,255,.86); box-shadow: 0 24px 70px rgba(42,55,83,.13); backdrop-filter: blur(18px); }
      .hero-stage { width: 100%; min-width: 0; overflow: visible; padding: clamp(20px, 3vw, 32px); backdrop-filter: none; }
      .hero-copy { display: grid; gap: 10px; max-width: 720px; }
      .hero-copy .eyebrow { font-size: clamp(.98rem, 1.5vw, 1.12rem); }
      .hero-copy h2 { font-family: inherit; font-size: clamp(1.9rem, 5vw, 4.6rem); font-weight: 900; line-height: 1.02; }
      .hero-copy p:last-child { max-width: 560px; margin: 0; color: #5d6870; font-size: 1.02rem; line-height: 1.7; }
      .filter-panel { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)) auto; gap: 12px; align-items: end; margin-top: 20px; padding: 14px; border: 1px solid rgba(255,91,91,.18); border-radius: 8px; background: rgba(255,255,255,.82); }
      .filter-panel label, .filter-field { display: grid; gap: 7px; color: #39493f; font-weight: 800; min-width: 0; }
      .filter-panel span { font-size: .82rem; color: #7d5544; }
      .filter-panel select { min-height: 42px; border: 1px solid #cbd5c4; border-radius: 8px; padding: 0 12px; background: #fff; color: #1f2933; outline: none; font-weight: 700; }
      .multi-filter { position: relative; min-width: 0; }
      .multi-filter-button { display: flex; width: 100%; min-height: 42px; align-items: center; justify-content: space-between; gap: 10px; border: 1px solid #cbd5c4; border-radius: 8px; padding: 0 12px; background: #fff; color: #1f2933; font-weight: 700; text-align: left; }
      .multi-filter-button::after { content: "⌄"; color: #687274; font-size: 1rem; transition: transform .18s ease; }
      .multi-filter.is-open .multi-filter-button { border-color: #ff725e; box-shadow: 0 0 0 3px rgba(255,114,94,.12); }
      .multi-filter.is-open .multi-filter-button::after { transform: rotate(180deg); }
      .multi-filter-menu { position: absolute; z-index: 12; top: calc(100% + 7px); left: 0; width: max(100%, 220px); max-height: 280px; overflow: auto; padding: 8px; border: 1px solid rgba(255,114,94,.2); border-radius: 8px; background: #fff; box-shadow: 0 18px 42px rgba(42,55,83,.18); }
      .multi-filter-option { display: flex; grid-template-columns: none; align-items: center; gap: 9px; padding: 9px 8px; border-radius: 6px; color: #33423a; cursor: pointer; }
      .multi-filter-option:hover { background: #fff3ee; }
      .multi-filter-option input { width: 18px; height: 18px; margin: 0; accent-color: #ff654f; }
      .multi-filter-option span { color: inherit; font-size: .88rem; }
      .filter-summary { margin: 0; color: #53655a; font-size: .9rem; font-weight: 800; white-space: nowrap; }
      .food-filter { position: relative; z-index: 31; width: 100%; min-width: 0; margin-top: 20px; }
      .category-tabs { display: flex; width: 100%; min-width: 0; gap: 24px; overflow-x: auto; padding: 0 4px 12px; scrollbar-width: none; }
      .category-tabs::-webkit-scrollbar { display: none; }
      .category-tab { position: relative; flex: 0 0 auto; padding: 8px 0; background: transparent; color: #20252a; font-weight: 900; white-space: nowrap; }
      .category-tab.is-active { color: #ff5b37; }
      .category-tab.is-active::after { position: absolute; right: 0; bottom: 0; left: 0; height: 4px; border-radius: 4px; background: #ff5b37; content: ""; }
      .filter-entry-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      .filter-entry { display: flex; min-width: 0; min-height: 42px; align-items: center; justify-content: center; gap: 5px; padding: 6px 9px; border: 1px solid #ece8e3; border-radius: 9px; background: #f8f8f7; color: #25292d; font-size: .9rem; font-weight: 900; line-height: 1; white-space: nowrap; box-shadow: 0 4px 12px rgba(38,42,47,.04); }
      .filter-entry::after { flex: 0 0 auto; content: "⌄"; color: #596068; font-size: .82rem; line-height: 1; }
      .filter-entry.is-active { border-color: #ffb6a2; background: #fff1eb; color: #ff5b37; }
      .filter-entry.is-active::after { transform: rotate(180deg); }
      .filter-entry small { display: block; max-width: 100%; overflow: hidden; color: #777d82; font-size: .7rem; font-weight: 700; text-overflow: ellipsis; white-space: nowrap; }
      .filter-dropdown { position: absolute; top: calc(100% + 10px); right: 0; left: 0; display: flex; max-height: min(75vh, 650px); flex-direction: column; border: 1px solid #eee9e4; border-radius: 8px; background: #fff; box-shadow: 0 22px 50px rgba(42,55,83,.16); overflow: hidden; }
      .filter-dropdown-inner { min-height: 0; overflow: auto; overscroll-behavior: contain; padding: 18px; -webkit-overflow-scrolling: touch; }
      .filter-backdrop { position: fixed; z-index: 25; inset: 0; background: rgba(25,29,34,.22); backdrop-filter: blur(1px); }
      .filter-panel-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; font-weight: 900; }
      .location-status { color: #5d6870; font-size: .86rem; font-weight: 700; }
      .location-action { padding: 8px 10px; border-radius: 7px; background: #fff1eb; color: #ff5b37; font-weight: 900; }
      .choice-row { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
      .choice-button { min-height: 42px; border: 1px solid transparent; border-radius: 7px; background: #f7f7f6; color: #30353a; font-weight: 800; }
      .choice-button.is-selected { border-color: #ff6547; background: #fff2ed; color: #ff5433; }
      .area-picker { display: grid; grid-template-columns: 128px minmax(0, .8fr) minmax(0, 1.2fr); min-height: 330px; margin-top: 16px; border-top: 1px solid #f0ece8; }
      .area-level { display: grid; align-content: start; gap: 2px; padding: 10px 0; }
      .area-level + .area-level { border-left: 1px solid #f0ece8; }
      .area-option { min-height: 44px; padding: 8px 14px; background: transparent; color: #30353a; text-align: left; }
      .area-option.is-selected { background: #f7f7f6; color: #ff5b37; font-weight: 900; }
      .food-picker { display: grid; grid-template-columns: 112px minmax(0, 1fr); min-height: 390px; }
      .food-group-nav { display: grid; align-content: start; border-right: 1px solid #f0ece8; background: #fafafa; }
      .food-group-nav-button { min-height: 52px; padding: 8px 12px; background: transparent; color: #30353a; text-align: left; font-weight: 800; }
      .food-group-nav-button.is-selected { background: #fff; color: #ff5b37; }
      .food-groups { display: grid; align-content: start; gap: 18px; padding-left: 16px; }
      .food-group { display: grid; gap: 14px; align-items: start; }
      .food-group-title { display: grid; gap: 5px; justify-items: start; color: #25292d; font-weight: 900; }
      .food-group-title span:first-child { display: grid; width: 34px; height: 34px; place-items: center; border-radius: 50%; background: #fff1eb; color: #ff5b37; }
      .food-options { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .food-option { min-height: 46px; padding: 8px 10px; border: 1px solid transparent; border-radius: 7px; background: #f8f8f7; color: #30353a; font-weight: 800; }
      .food-option.is-selected { border-color: #ff6547; background: #fff2ed; color: #ff5433; }
      .sort-options { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .sort-option { display: flex; min-height: 50px; align-items: center; justify-content: space-between; padding: 0 14px; border: 1px solid #ece8e3; border-radius: 7px; background: #fff; color: #30353a; font-weight: 800; }
      .sort-option.is-selected { border-color: #ff6547; background: #fff2ed; color: #ff5433; }
      .filter-footer { display: flex; flex: 0 0 auto; justify-content: space-between; gap: 10px; padding: 12px 18px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid #eee9e4; background: #fff; box-shadow: 0 -8px 20px rgba(31,41,51,.06); }
      .filter-footer button { min-height: 44px; border-radius: 8px; padding: 0 22px; font-weight: 900; }
      .filter-reset { background: #f5f5f4; color: #454b50; }
      .filter-confirm { flex: 1; max-width: 280px; background: linear-gradient(135deg, #ff704d, #ff4d32); color: #fff; }
      .active-filter-summary { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; margin: 12px 2px 0; color: #53655a; font-size: .86rem; font-weight: 800; }
      .filter-token { padding: 4px 8px; border-radius: 999px; background: #fff1eb; color: #ff5b37; }

      .reel-shell { position: relative; margin-top: 24px; padding: 18px; overflow: hidden; border-radius: 8px; background: radial-gradient(circle at 28% 20%, rgba(255,132,105,.28), transparent 31%), radial-gradient(circle at 76% 18%, rgba(94,194,255,.2), transparent 34%), linear-gradient(155deg, #202957, #101725 72%); box-shadow: inset 0 0 0 1px rgba(255,255,255,.12), 0 18px 46px rgba(35,45,85,.18); }
      .reel-window { position: relative; height: 430px; overflow: hidden; border-radius: 8px; perspective: 1250px; }
      .reel-window::before { position: absolute; z-index: 0; inset: 34px 8%; content: ""; border-radius: 50%; background: radial-gradient(circle at 36% 28%, rgba(255,255,255,.18), rgba(255,183,112,.07) 28%, rgba(29,42,78,.15) 56%, rgba(5,10,22,.42) 74%, transparent 76%); box-shadow: inset -34px -18px 62px rgba(3,8,20,.42), inset 20px 12px 42px rgba(255,255,255,.08), 0 0 56px rgba(112,177,255,.12); }
      .reel-window::after { position: absolute; z-index: 5; inset: 31px 7.5%; border: 1px solid rgba(185,218,255,.13); border-radius: 50%; content: ""; box-shadow: inset 18px 0 26px rgba(255,255,255,.05), inset -22px 0 30px rgba(3,8,20,.28); pointer-events: none; }
      .reel-focus { position: absolute; z-index: 7; top: 50%; left: 50%; width: 22px; height: 22px; border: 1px solid rgba(255,226,184,.66); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 0 5px rgba(255,206,145,.08), 0 0 22px rgba(255,184,103,.2); pointer-events: none; }
      .reel-focus::after { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; border-radius: 50%; transform: translate(-50%, -50%); background: rgba(255,239,214,.9); box-shadow: 0 0 9px rgba(255,205,145,.7); content: ""; }
      .reel-shell.is-rolling .reel-focus { animation: focusPulse 1.1s ease-in-out infinite; }
      .reel-shell.is-settling .reel-focus { border-color: rgba(255,235,203,.92); box-shadow: 0 0 0 7px rgba(255,206,145,.1), 0 0 30px rgba(255,184,103,.38); }
      .reel-shell.is-revealed .reel-focus { opacity: 0; transform: translate(-50%, -50%) scale(.55); animation: none; transition: opacity .3s ease, transform .3s ease; }
      .reel-track { position: absolute; z-index: 2; inset: 0; transform-style: preserve-3d; transform: rotateX(10deg) rotateY(0deg); will-change: transform; }
      .reel-track.is-revealed .reel-card:not(.is-final) { opacity: 0; filter: blur(10px) saturate(.45); pointer-events: none; transition: opacity .38s ease, filter .38s ease; }
      .reel-track.is-revealed .reel-card.is-final { animation: finalReveal 1.05s cubic-bezier(.16,1,.3,1) both; }
      .reel-track.is-accelerating .reel-card { filter: saturate(.92) brightness(.96); }
      .reel-track.is-cruising .reel-card { filter: blur(.55px) saturate(.84) brightness(.88); }
      .reel-track.is-settling .reel-card { opacity: .3 !important; filter: blur(1.8px) saturate(.5) brightness(.68); transition: opacity .55s ease, filter .55s ease; }
      .reel-card { position: absolute; top: 50%; left: 50%; width: 126px; height: 150px; overflow: hidden; border: 1px solid rgba(255,255,255,.2); border-radius: 20px; background: rgba(18,27,42,.78); box-shadow: 0 12px 26px rgba(0,0,0,.26); transform: translate(-50%, -50%) rotateY(var(--theta)) rotateX(var(--phi)) translateZ(var(--radius)) scaleX(var(--curve-scale)) scale(var(--card-scale)); transform-style: preserve-3d; opacity: var(--depth-opacity); filter: saturate(var(--depth-saturation)) brightness(var(--depth-light)); backface-visibility: visible; transition: opacity .24s ease, filter .24s ease, border-color .24s ease; }
      .reel-card::before { position: absolute; z-index: 3; inset: 0; content: ""; border-radius: inherit; background: radial-gradient(ellipse at 50% 45%, transparent 0 42%, rgba(5,12,24,.12) 62%, rgba(3,8,18,.52) 100%); pointer-events: none; }
      .reel-card::after { position: absolute; z-index: 4; inset: 0; content: ""; border-radius: inherit; background: linear-gradient(96deg, rgba(255,255,255,.22), transparent 25%, transparent 68%, rgba(0,0,0,.38)); pointer-events: none; }
      .reel-card.is-final { z-index: 8; width: 238px; height: 270px; border: 1px solid rgba(255,190,128,.55); border-radius: 24px; background: linear-gradient(155deg, rgba(255,255,255,.96), rgba(255,240,226,.94) 62%, rgba(245,238,255,.94)); box-shadow: 0 30px 64px rgba(0,0,0,.38), 0 0 0 3px rgba(255,190,128,.34), 0 0 42px rgba(255,153,102,.22); backdrop-filter: blur(18px); }
      .reel-card.is-final::before { background: radial-gradient(circle at 82% 86%, rgba(164,115,255,.13), transparent 34%), radial-gradient(circle at 16% 70%, rgba(255,138,92,.13), transparent 36%); mix-blend-mode: normal; }
      .reel-card.is-final::after { background: linear-gradient(105deg, rgba(255,255,255,.28), transparent 34%, rgba(255,255,255,.08)); }
      .food-photo { position: relative; display: grid; height: 94px; place-items: center; background-color: #6d7480; background-image: linear-gradient(145deg, rgba(255,174,105,.12), rgba(24,39,67,.18)), var(--food-image); background-size: cover; background-position: center; }
      .food-photo[data-image-category="dessert"] { background-color: #8b5e50; }
      .food-photo[data-image-category="hotpot"] { background-color: #a83d32; }
      .food-photo[data-image-category="bbq"] { background-color: #6f382b; }
      .food-photo[data-image-category="noodle"] { background-color: #b06f38; }
      .food-photo[data-image-category="seafood"] { background-color: #277b8c; }
      .food-photo[data-image-category="western"] { background-color: #9b4d38; }
      .food-photo[data-image-category="asian"] { background-color: #9b344c; }
      .food-photo[data-image-category="snack"] { background-color: #bb783f; }
      .food-photo[data-image-category="buffet"] { background-color: #4d7861; }
      .food-photo[data-image-category="local"] { background-color: #9a5d35; }
      .food-photo span { position: absolute; z-index: 5; right: 8px; bottom: 8px; left: 8px; display: block; overflow: hidden; border: 1px solid rgba(255,255,255,.2); border-radius: 9px; padding: 5px 8px; background: rgba(10,18,30,.5); color: #fff; font-size: .78rem; font-weight: 900; line-height: 1.15; text-align: center; text-overflow: ellipsis; white-space: nowrap; box-shadow: 0 8px 18px rgba(0,0,0,.16); backdrop-filter: blur(9px); }
      .reel-card h3 { padding: 10px 10px 0; font-size: .86rem; }
      .reel-card p { margin: 4px 0 0; padding: 0 10px; color: #687274; font-size: .76rem; }
      .reel-card:not(.is-final) .food-photo { height: 100%; }
      .reel-track.is-rolling .reel-card:not(.is-final) .food-photo span { opacity: 0; transform: translateY(5px); }
      .reel-card:not(.is-final) .food-photo span { transition: opacity .2s ease, transform .2s ease; }
      .reel-card:not(.is-final) h3, .reel-card:not(.is-final) p, .reel-card:not(.is-final) .tag-line { display: none; }
      .reel-card.is-final .food-photo { height: 116px; }
      .reel-card.is-final .food-photo span { display: none; }
      .reel-card.is-final h3 { padding: 11px 13px 0; overflow-wrap: anywhere; font-size: .92rem; line-height: 1.25; }
      .reel-card.is-final p { padding-inline: 13px; overflow-wrap: anywhere; font-size: .7rem; line-height: 1.38; }
      .reel-card.is-final .tag-line { padding: 7px 13px 0; }
      .reel-card.is-final .tag-line .mini-tag:nth-child(n+2) { display: none; }
      .reel-placeholder { display: grid; position: relative; z-index: 2; height: 100%; place-items: center; color: rgba(255,255,255,.72); text-align: center; }
      @keyframes finalReveal { 0% { transform: translate(-50%, -50%) rotateY(-24deg) rotateX(8deg) translateZ(82px) scale(.5); opacity: 0; filter: blur(10px) saturate(.72); } 48% { opacity: 1; filter: blur(1px) saturate(1); } 78% { transform: translate(-50%, -50%) rotateY(3deg) rotateX(-1deg) translateZ(12px) scale(1.035); } 100% { transform: translate(-50%, -50%) rotateY(0deg) rotateX(0deg) translateZ(0) scale(1); opacity: 1; filter: blur(0) saturate(1.08); } }
      @keyframes focusPulse { 0%, 100% { opacity: .62; transform: translate(-50%, -50%) scale(.9); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); } }

      @media (prefers-reduced-motion: reduce) {
        .reel-track, .reel-card, .reel-track.is-revealed .reel-card.is-final { animation: none !important; transition-duration: .01ms !important; }
        .random-button { transition: none; }
      }

      .random-controls { display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: center; margin-top: 14px; }
      .count-pill { display: grid; min-width: 86px; min-height: 62px; place-items: center; padding: 9px 12px; border-radius: 18px; background: #fff2f5; color: #f04462; box-shadow: inset 0 0 0 1px rgba(240,68,98,.12), 0 12px 24px rgba(240,68,98,.1); }
      .count-pill strong { font-size: 1.72rem; line-height: 1; }
      .count-pill span { font-size: .82rem; font-weight: 800; }
      .random-button { min-height: clamp(64px, 10vw, 110px); border-radius: 999px; background: radial-gradient(circle at 34% 18%, rgba(255,255,255,.38), transparent 30%), linear-gradient(135deg, #ff5b6e, #ff8a3d 50%, #8b5cf6); color: #fff; font-size: clamp(1.2rem, 3vw, 2.15rem); font-weight: 900; box-shadow: 0 18px 36px rgba(255,91,110,.24), inset 0 -10px 24px rgba(88,30,110,.18); transition: transform .18s ease, filter .18s ease; }
      .random-button:hover { transform: translateY(-2px) scale(1.01); }
      .random-button:active { transform: translateY(1px) scale(.99); }

      .result-card { display: grid; gap: 16px; margin-top: 22px; padding: 20px; border: 1px solid rgba(255,91,110,.22); border-radius: 8px; background: linear-gradient(135deg, #fff, #fff1f5 52%, #fff8e8); box-shadow: 0 18px 44px rgba(255,91,110,.12); }
      .result-card h3 { margin-top: 4px; font-size: clamp(1.8rem, 5vw, 3.2rem); }
      .result-card dl { display: grid; gap: 12px; margin: 0; }
      .result-card dt { color: #7d5544; font-size: .85rem; font-weight: 900; }
      .result-card dd { margin: 4px 0 0; line-height: 1.6; }
      .quiet-hint { margin-top: 18px; color: #687274; text-align: center; }

      .panel { padding: 20px; }
      .manage-panel { max-width: 980px; margin: 18px auto 0; }
      .section-heading { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
      .section-heading h2 { margin-top: 3px; font-size: 1.45rem; }
      .success-action, .secondary-action, .ghost-action, .danger-action, .map-action { min-height: 42px; border-radius: 8px; padding: 10px 14px; font-weight: 800; }
      .success-action, .secondary-action { background: #1f5d4a; color: #fff; }
      .ghost-action { border: 1px solid #c7d0c2; background: #fff; color: #2d4c3a; }

      async function bootstrap() {
        bindEvents();
        try {
          const indexResponse = await fetch(`restaurants-index.json?v=${CURRENT_DATASET_VERSION}`);
          if (!indexResponse.ok) throw new Error(`餐厅索引加载失败（${indexResponse.status}）`);
          const indexData = await indexResponse.json();
          if (!Array.isArray(indexData) || indexData.length === 0) throw new Error("餐厅索引数据格式无效");
          coreRestaurants = indexData;
          initialRestaurants = indexData;
          restaurants = readRestaurants();
          render();
          renderReel(buildRollingReel(), false);
          warmRestaurantDetails();
        } catch (error) {
          restaurants = [];
          render();
          renderReel([], false);
          showMessage(`${error.message || "餐厅数据加载失败"}，请刷新页面重试`);
          console.error("餐厅数据初始化失败", error);
        } finally {
          sphereFrame = requestAnimationFrame(animateSphere);
        }
      }

      function warmRestaurantDetails() {
        const run = () => loadRestaurantDetails().catch(() => {});
        if ("requestIdleCallback" in window) window.requestIdleCallback(run, { timeout: 4500 });
        else window.setTimeout(run, 900);
      }

      async function loadRestaurantDetails() {
        if (restaurantDetailsMap) return restaurantDetailsMap;
        if (restaurantDetailsPromise) return restaurantDetailsPromise;
        restaurantDetailsPromise = fetch(`restaurants-details.json?v=${CURRENT_DATASET_VERSION}`)
          .then((response) => {
            if (!response.ok) throw new Error(`餐厅详情加载失败（${response.status}）`);
            return response.json();
          })
          .then((data) => {
            if (!data || typeof data !== "object" || Array.isArray(data)) throw new Error("餐厅详情数据格式无效");
            restaurantDetailsMap = data;
            restaurantDetailsFailed = false;
            return restaurantDetailsMap;
          })
          .catch((error) => {
            restaurantDetailsFailed = true;
            restaurantDetailsPromise = null;
            console.warn("餐厅详情数据加载失败", error);
            throw error;
          });
        return restaurantDetailsPromise;
      }

      function mergeRestaurantDetail(restaurant, detail) {
        return detail ? { ...detail, ...restaurant } : restaurant;
      }

      function hydrateRestaurantSync(restaurant) {
        if (!restaurant) return restaurant;
        return mergeRestaurantDetail(restaurant, restaurantDetailsMap?.[restaurant.id]);
      }

      async function hydrateRestaurant(restaurant) {
        if (!restaurant) return restaurant;
        if (restaurantDetailsMap) return hydrateRestaurantSync(restaurant);
        try {
          const details = await loadRestaurantDetails();
          return mergeRestaurantDetail(restaurant, details[restaurant.id]);
        } catch {
          return restaurant;
        }
      }

      function bindEvents() {
        elements.homeTab.addEventListener("click", () => { closeFilterPanel(); switchView("home"); });
        elements.historyTab.addEventListener("click", () => { closeFilterPanel(); switchView("history"); });
        elements.favoritesTab.addEventListener("click", () => { closeFilterPanel(); switchView("favorites"); });
        elements.manageTab.addEventListener("click", () => { closeFilterPanel(); switchView("manage"); });
        elements.historyBackButton.addEventListener("click", () => switchView("home"));
        elements.backHomeButton.addEventListener("click", () => { closeFilterPanel(); switchView("home"); });
        elements.favoritesBackButton.addEventListener("click", () => switchView("home"));
        elements.categoryTabs.addEventListener("click", handleCategoryTabClick);
        document.querySelectorAll("[data-filter-panel]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            toggleFilterPanel(button.dataset.filterPanel);
          });
        });
        elements.filterDropdownContent.addEventListener("click", handleFilterPanelClick);
        elements.filterBackdrop.addEventListener("click", closeFilterPanel);
        elements.imagePreview.addEventListener("click", (event) => {
          if (event.target === elements.imagePreview) closeImagePreview();
        });
        elements.imagePreviewClose.addEventListener("click", closeImagePreview);
        elements.mapPicker.addEventListener("click", (event) => {
          if (event.target === elements.mapPicker) closeMapPicker();

        elements.mapPickerClose.addEventListener("click", closeMapPicker);
        elements.mapPickerOptions.addEventListener("click", handleMapProviderClick);
        elements.resultModal.addEventListener("click", (event) => {

        });
        elements.resultCloseButton.addEventListener("click", closeResultModal);
        elements.resultMapButton.addEventListener("click", () => {
          if (selectedRestaurant) openMapPicker(hydrateRestaurantSync(selectedRestaurant));
        });
        elements.resultCompleteButton.addEventListener("click", completeCheckIn);
        elements.resultRepickButton.addEventListener("click", () => {
          closeResultModal();
          pickRestaurant();
        });
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && !elements.imagePreview.hidden) closeImagePreview();
          if (event.key === "Escape" && !elements.mapPicker.hidden) closeMapPicker();
          if (event.key === "Escape" && !elements.resultModal.hidden) closeResultModal();
        });
        elements.filterResetButton.addEventListener("click", resetActiveFilterPanel);
        elements.filterConfirmButton.addEventListener("click", closeFilterPanel);
        document.addEventListener("click", (event) => {
          if (!event.composedPath().includes(document.querySelector(".food-filter"))) closeFilterPanel();
        });
        elements.pickButton.addEventListener("click", pickRestaurant);
        elements.clearHistoryButton.addEventListener("click", clearHistory);
        elements.cancelEditButton.addEventListener("click", () => { resetForm(); render(); });
        elements.form.addEventListener("submit", submitRestaurant);
        elements.restaurantList.addEventListener("click", handleRestaurantListClick);
        elements.historyList.addEventListener("click", handleHistoryClick);
        elements.historyList.addEventListener("submit", submitReview);
        elements.favoritesList.addEventListener("click", handleFavoritesClick);

      function resetSelectionAfterFilterChange() {
        selectedRestaurant = null;
        pendingRestaurant = null;
        render();
        renderReel(buildRollingReel(), false);
      }

      function handleCategoryTabClick(event) {
        const button = event.target.closest("[data-category-tab]");
        if (!button) return;
        closeFilterPanel();
        activeCategoryTab = button.dataset.categoryTab;
        resetSelectionAfterFilterChange();
      }

      function toggleFilterPanel(panel) {
        activeFilterPanel = activeFilterPanel === panel ? "" : panel;
        renderFilterControls();
      }

      function closeFilterPanel() {
        if (!activeFilterPanel) return;
        activeFilterPanel = "";
        renderFilterControls();
      }

      function lockPageScroll() {
        if (document.body.classList.contains("is-filter-open")) return;
        lockedScrollY = window.scrollY;
        document.body.style.top = `-${lockedScrollY}px`;
        document.body.classList.add("is-filter-open");
      }

      function unlockPageScroll() {
        if (!document.body.classList.contains("is-filter-open")) return;
        document.body.classList.remove("is-filter-open");
        document.body.style.top = "";
        window.scrollTo(0, lockedScrollY);
      }

      function handleFilterPanelClick(event) {
        const target = event.target.closest("button");
        if (!target) return;
        if (target.dataset.distance !== undefined) {
          selectedDistance = Number(target.dataset.distance);
          if (selectedDistance > 0 && !userPosition) locateUser();
        }
        if (target.dataset.areaLevel) activeAreaLevel = target.dataset.areaLevel;
        if (target.dataset.district !== undefined) {
          const value = target.dataset.district;
          if (value) {
            activeAreaDistrict = value;
            toggleSetValue(selectedLocations, value);
          } else {
            selectedLocations.clear();
            activeAreaDistrict = "";
          }
          selectedBusinessAreas.clear();
        }
        if (target.dataset.businessArea !== undefined) {
          if (target.dataset.businessArea) toggleSetValue(selectedBusinessAreas, target.dataset.businessArea);
          else selectedBusinessAreas.clear();
        }
        if (target.dataset.foodValue) toggleSetValue(selectedFoodValues, target.dataset.foodValue);
        if (target.dataset.foodGroup) activeFoodGroup = target.dataset.foodGroup;
        if (target.dataset.sort) {
          selectedSort = target.dataset.sort;
          if (selectedSort === "distance" && !userPosition) locateUser();
        }
        if (target.dataset.action === "locate") locateUser();
        resetSelectionAfterFilterChange();
      }

      function toggleSetValue(set, value) {
        if (set.has(value)) set.delete(value);
        else set.add(value);
      }

      async function locateUser() {
        if (isLocating) return;
        isLocating = true;
        locationStatus = "正在定位...";
        renderFilterControls();
        try {
          userPosition = await requestCurrentPosition();
          restaurantDistances = new Map();
          locationStatus = `定位成功，精度约 ${Math.round(userPosition.accuracy)}m`;
          if (!selectedDistance) selectedDistance = 3000;
          showMessage("已获取当前位置，可以随机周边美食。");
        } catch (error) {
          userPosition = null;
          selectedDistance = 0;
          locationStatus = error.message;
          showMessage(error.message);
        } finally {
          isLocating = false;
          resetSelectionAfterFilterChange();
        }
      }

      function resetActiveFilterPanel() {
        if (activeFilterPanel === "nearby") {
          selectedDistance = 0;
          selectedLocations.clear();
          selectedBusinessAreas.clear();
        }
        if (activeFilterPanel === "food") selectedFoodValues.clear();
        if (activeFilterPanel === "sort") selectedSort = "recommended";
        resetSelectionAfterFilterChange();
      }

      function readJson(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      }

      function readRestaurants() {
        try {
          let changes = readJson(RESTAURANT_CHANGES_KEY, null);
          if (!isRestaurantChanges(changes)) {
            changes = migrateLegacyRestaurants();
            safeSetItem(RESTAURANT_CHANGES_KEY, JSON.stringify(changes));
            localStorage.removeItem(RESTAURANTS_KEY);
          }
          safeSetItem(RESTAURANTS_VERSION_KEY, CURRENT_DATASET_VERSION);
          return applyRestaurantChanges(initialRestaurants, changes);
        } catch (error) {
          console.warn("读取本地餐厅数据失败，已使用内置餐厅库", error);
          return initialRestaurants;
        }
      }

      function migrateLegacyRestaurants() {
        const stored = readJson(RESTAURANTS_KEY, null);
        if (!Array.isArray(stored) || isPlaceholderRestaurantList(stored)) return emptyRestaurantChanges();
        const coreMap = new Map(coreRestaurants.map((restaurant) => [restaurant.id, restaurant]));
        const storedMap = new Map(stored.map((restaurant) => [restaurant.id, restaurant]));
        const deletedIds = coreRestaurants
          .filter((restaurant) => !storedMap.has(restaurant.id))
          .map((restaurant) => restaurant.id);
        const added = stored.filter((restaurant) => !coreMap.has(restaurant.id));
        const overrides = {};
        stored.forEach((restaurant) => {
          const original = coreMap.get(restaurant.id);
          if (original && hasEditableChanges(original, restaurant)) overrides[restaurant.id] = pickEditableFields(restaurant);
        });
        return { added, overrides, deletedIds };
      }

      function emptyRestaurantChanges() {
        return { added: [], overrides: {}, deletedIds: [] };
      }

      function isRestaurantChanges(value) {
        return Boolean(value && Array.isArray(value.added) && value.overrides && Array.isArray(value.deletedIds));
      }

      function applyRestaurantChanges(baseRestaurants, changes) {
        const deleted = new Set(changes.deletedIds);
        const base = baseRestaurants
          .filter((restaurant) => !deleted.has(restaurant.id))
          .map((restaurant) => changes.overrides[restaurant.id]
            ? { ...restaurant, ...changes.overrides[restaurant.id] }
            : restaurant);
        return [...changes.added, ...base];
      }

      function buildRestaurantChanges(currentRestaurants) {
        const initialMap = new Map(initialRestaurants.map((restaurant) => [restaurant.id, restaurant]));
        const currentMap = new Map(currentRestaurants.map((restaurant) => [restaurant.id, restaurant]));
        const deletedIds = initialRestaurants
          .filter((restaurant) => !currentMap.has(restaurant.id))
          .map((restaurant) => restaurant.id);
        const added = currentRestaurants.filter((restaurant) => !initialMap.has(restaurant.id));
        const overrides = {};
        currentRestaurants.forEach((restaurant) => {
          const original = initialMap.get(restaurant.id);
          if (original && hasEditableChanges(original, restaurant)) overrides[restaurant.id] = pickEditableFields(restaurant);
        });
        return { added, overrides, deletedIds };
      }

      function hasEditableChanges(original, current) {
        return ["name", "address", "note", "category"].some((field) =>
          String(original[field] ?? "") !== String(current[field] ?? "")
        );
      }

      function pickEditableFields(restaurant) {
        return {
          name: restaurant.name || "",
          address: restaurant.address || "",
          note: restaurant.note || "",
          category: restaurant.category || inferCategory(restaurant),
        };
      }

      function isPlaceholderRestaurantList(items) {
        return items.length === 99 && items.every((restaurant, index) => restaurant.name === `餐厅 ${String(index + 1).padStart(3, "0")}`);
      }

      function saveAll() {
        if (restaurantsDirty && safeSetItem(RESTAURANT_CHANGES_KEY, JSON.stringify(buildRestaurantChanges(restaurants)))) {
          safeSetItem(RESTAURANTS_VERSION_KEY, CURRENT_DATASET_VERSION);
          localStorage.removeItem(RESTAURANTS_KEY);
          restaurantsDirty = false;
        }
        if (checkInsDirty && safeSetItem(CHECK_INS_KEY, JSON.stringify(checkIns))) checkInsDirty = false;
        if (favoritesDirty && safeSetItem(FAVORITES_KEY, JSON.stringify(favorites))) favoritesDirty = false;
      }

      function safeSetItem(key, value) {
        try {
          localStorage.setItem(key, value);
          return true;
        } catch (error) {
          console.warn(`本地存储写入失败：${key}`, error);
          showMessage("本地存储空间不足，请删除部分打卡图片后重试");
          return false;
        }
      }

      function getRestaurantText(restaurant) {
        return `${restaurant.name || ""} ${restaurant.note || ""} ${restaurant.address || ""}`;
      }

      function matchesCategory(restaurant, categoryValue) {
        return inferCategory(restaurant) === categoryValue;
      }

      function inferCategory(restaurant) {
        return inferRestaurantCategory(restaurant);
      }

      function getDistrict(address = "", restaurant = {}) {
        if (restaurant.district) return restaurant.district;
        const matched = DISTRICT_RULES.find((rule) =>
          rule.keywords.some((keyword) => address.includes(keyword)),
        );
        return matched ? matched.district : "其他区域";
      }

      function getLocations() {
        return [...new Set(restaurants.map((restaurant) => getDistrict(restaurant.address, restaurant)))].sort((a, b) => a.localeCompare(b, "zh-CN"));
      }

      function getBusinessArea(restaurant) {
        return typeof restaurant.businessArea === "string" ? restaurant.businessArea : "";
      }

      function getBusinessAreas() {
        const scoped = restaurants.filter((restaurant) =>
          selectedLocations.size === 0 || selectedLocations.has(getDistrict(restaurant.address, restaurant))
        );
        return [...new Set(scoped.map(getBusinessArea).filter(Boolean))]
          .sort((a, b) => a.localeCompare(b, "zh-CN"));
      }

      function getFilteredRestaurants() {
        const activeTab = CATEGORY_TABS.find((tab) => tab.value === activeCategoryTab);
        const filtered = restaurants.filter((restaurant) => {
          const tabMatched = !activeTab?.categories.length || activeTab.categories.includes(inferCategory(restaurant));
          const categoryMatched = matchesFoodSelection(restaurant, selectedFoodValues);
          const locationMatched = selectedLocations.size === 0 ||
            selectedLocations.has(getDistrict(restaurant.address, restaurant));
          const businessMatched = selectedBusinessAreas.size === 0 ||
            selectedBusinessAreas.has(getBusinessArea(restaurant));
          const distance = getDistanceForRestaurant(restaurant);
          const distanceMatched = !selectedDistance || (distance !== null && distance <= selectedDistance);
          return tabMatched && categoryMatched && locationMatched && businessMatched && distanceMatched;
        });
        const sorted = sortRestaurants(filtered);
        return selectedSort === "recommended" ? sorted : sorted.slice(0, 100);
      }

      function getDistanceForRestaurant(restaurant) {
        if (!userPosition) return null;
        if (!restaurantDistances.has(restaurant.id)) {
          restaurantDistances.set(restaurant.id, getRestaurantDistance(restaurant, userPosition));
        }
        return restaurantDistances.get(restaurant.id);
      }

      function sortRestaurants(items) {
        const sorted = [...items];
        if (selectedSort === "distance") {
          return sorted.sort((left, right) =>
            (getDistanceForRestaurant(left) ?? Infinity) - (getDistanceForRestaurant(right) ?? Infinity)
          );
        }
        if (selectedSort === "rating") {
          return sorted.sort((left, right) => Number(right.rating || 0) - Number(left.rating || 0));
        }
        if (selectedSort === "cost-asc") {
          return sorted.sort((left, right) => (parseAverageCost(left) ?? Infinity) - (parseAverageCost(right) ?? Infinity));
        }
        if (selectedSort === "cost-desc") {
          return sorted.sort((left, right) => (parseAverageCost(right) ?? -1) - (parseAverageCost(left) ?? -1));
        }
        return sorted.sort((left, right) =>
          Number(right.rating || 0) - Number(left.rating || 0) ||
          Number(left.rank || Infinity) - Number(right.rank || Infinity)
        );
      }

      function formatLocation(address, restaurant = {}) {
        const district = restaurant.district || getDistrict(address, restaurant);
        const area = getBusinessArea(restaurant) ? ` · ${getBusinessArea(restaurant)}` : "";
        return address ? `杭州市 · ${district}${area} · ${address}` : `杭州市 · ${district}${area} · 位置待补充`;
      }

      function getMapUrl(restaurant, provider) {
        const query = `杭州 ${restaurant.address || ""} ${restaurant.name}`.trim();
        const isAppleMobile = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        const isAndroidFamily = /Android|HarmonyOS|HUAWEI/i.test(navigator.userAgent);
        const [longitude = "", latitude = ""] = String(restaurant.location || "").split(",");
        const encodedQuery = encodeURIComponent(query);
        if (provider === "baidu") {
          if (isAppleMobile || isAndroidFamily) {
            return `baidumap://map/place/search?query=${encodedQuery}&region=${encodeURIComponent("杭州")}&src=webapp.renjianxunweiji`;
          }
          return `https://map.baidu.com/search/${encodedQuery}`;
        }
        if (provider === "tencent") {
          if ((isAppleMobile || isAndroidFamily) && latitude && longitude) {
            const marker = encodeURIComponent(`coord:${latitude},${longitude};title:${restaurant.name};addr:${restaurant.address || ""}`);
            return `qqmap://map/marker?marker=${marker}&referer=renjianxunweiji`;
          }
          return `https://map.qq.com/?type=search&keyword=${encodedQuery}&region=${encodeURIComponent("杭州")}`;
        }
        if (provider === "apple") {
          const coordinate = latitude && longitude ? `&ll=${encodeURIComponent(`${latitude},${longitude}`)}` : "";
          return `https://maps.apple.com/?q=${encodeURIComponent(restaurant.name)}${coordinate}`;
        }
        if (restaurant.location) {
          const params = `sourceApplication=${encodeURIComponent("人间寻味记")}&poiname=${encodeURIComponent(restaurant.name)}&lat=${encodeURIComponent(latitude)}&lon=${encodeURIComponent(longitude)}&dev=0`;
          if (isAppleMobile) return `iosamap://viewMap?${params}`;
          if (isAndroidFamily) return `androidamap://viewMap?${params}`;
          return `https://uri.amap.com/marker?position=${encodeURIComponent(restaurant.location)}&name=${encodeURIComponent(restaurant.name)}&src=renjianxunweiji&callnative=1`;
        }
        if (isAppleMobile) {
          return `iosamap://poi?sourceApplication=${encodeURIComponent("人间寻味记")}&name=${encodeURIComponent(query)}`;
        }
        if (isAndroidFamily) {
          return `androidamap://poi?sourceApplication=${encodeURIComponent("人间寻味记")}&keywords=${encodeURIComponent(query)}&dev=0`;
        }
        return `https://uri.amap.com/search?keyword=${encodeURIComponent(query)}&src=renjianxunweiji&callnative=1`;
      }

      function openMapPicker(restaurant) {
        pendingMapRestaurant = restaurant;
        elements.mapPickerName.textContent = restaurant.name || restaurant.restaurantName || "";
        const isAppleDevice = /iPhone|iPad|iPod|Macintosh/i.test(navigator.userAgent);
        const providers = [
          { value: "amap", label: "高德地图", symbol: "高" },
          { value: "baidu", label: "百度地图", symbol: "百" },
          { value: "tencent", label: "腾讯地图", symbol: "腾" },
          ...(isAppleDevice ? [{ value: "apple", label: "Apple 地图", symbol: "A" }] : []),
        ];
        elements.mapPickerOptions.innerHTML = providers.map((provider) => `
          <button class="map-provider" data-map-provider="${provider.value}" data-map-symbol="${provider.symbol}" type="button">${provider.label}</button>
        `).join("");
        elements.mapPicker.hidden = false;
        document.body.classList.add("is-map-picker-open");
      }

      function closeMapPicker() {
        elements.mapPicker.hidden = true;
        pendingMapRestaurant = null;
        document.body.classList.remove("is-map-picker-open");
      }

      function handleMapProviderClick(event) {
        const button = event.target.closest("[data-map-provider]");
        if (!button || !pendingMapRestaurant) return;
        const url = getMapUrl(pendingMapRestaurant, button.dataset.mapProvider);
        closeMapPicker();
        window.location.href = url;
      }

      function renderFilters(filteredRestaurants) {
        renderFilterControls();
        const tokens = [];
        const activeTab = CATEGORY_TABS.find((tab) => tab.value === activeCategoryTab);
        if (activeCategoryTab !== "recommend") tokens.push(activeTab?.label);
        if (selectedDistance) tokens.push(DISTANCE_OPTIONS.find((option) => option.value === selectedDistance)?.label);
        if (selectedLocations.size) tokens.push(...[...selectedLocations]);

      function renderReel(sequence, rolling, revealed = false) {

        elements.reelShell.classList.toggle("is-rolling", rolling);
        elements.reelShell.classList.toggle("is-revealed", revealed);
        elements.reelShell.classList.remove("is-settling");
        elements.reelArea.innerHTML = sequence.map((restaurant, index) => `
          <article class="reel-card ${revealed && index === 0 ? "is-final" : ""}" style="${getSphereStyle(index, sequence.length, revealed)}" key="${restaurant.id}-${index}">
            <div class="food-photo" data-image-category="${getRestaurantImageCategory(restaurant)}" style="--food-image: url('${getCategoryRestaurantImage(restaurant)}')"><span>${escapeHtml(restaurant.name.slice(0, 2))}</span></div>

            <div class="tag-line">
              <span class="mini-tag">${escapeHtml(getCategoryLabel(restaurant.category || inferCategory(restaurant)))}</span>
              ${restaurant.source ? `<span class="mini-tag">${escapeHtml(restaurant.source)}${restaurant.rank ? ` #${escapeHtml(String(restaurant.rank))}` : ""}</span>` : ""}
            </div>
          </article>
        `).join("");
      }

      function animateSphere(timestamp) {
        const delta = Math.min(34, Math.max(0, timestamp - sphereLastTime));
        sphereLastTime = timestamp;
        if (selectedRestaurant && !isRolling) {
          elements.reelArea.style.transform = "rotateX(0deg) rotateY(0deg) rotateZ(0deg)";
        } else {
          let speed = 0.014;
          let tilt = 9 + Math.sin(timestamp / 2300) * 3;
          if (isRolling) {
            const progress = Math.min(1, (timestamp - rollStartedAt) / ROLL_DURATION_MS);
            const accelerating = progress < 0.18;
            const cruising = progress >= 0.18 && progress < 0.58;
            const settling = progress >= 0.58;
            elements.reelArea.classList.toggle("is-accelerating", accelerating);
            elements.reelArea.classList.toggle("is-cruising", cruising);
            elements.reelArea.classList.toggle("is-settling", settling);
            elements.reelShell.classList.toggle("is-settling", settling);
            if (accelerating) {
              const phase = progress / 0.18;
              const eased = 1 - Math.pow(1 - phase, 3);
              speed = 0.016 + (0.54 - 0.016) * eased;
            } else if (cruising) {
              speed = 0.54;
            } else {
              const phase = (progress - 0.58) / 0.42;
              const inertia = Math.pow(1 - phase, 4);
              speed = 0.018 + (0.54 - 0.018) * inertia;
            }
            tilt = 7 + Math.sin(progress * Math.PI * 2.5) * 2.4 * (1 - progress);
            if (progress >= 1) {
              finishPick();
              sphereFrame = requestAnimationFrame(animateSphere);
              return;
            }
          }
          else {
            elements.reelArea.classList.remove("is-accelerating", "is-cruising", "is-settling");
            elements.reelShell.classList.remove("is-settling");
          }
          sphereRotationY -= speed * delta;
          elements.reelArea.style.transform = `rotateX(${tilt.toFixed(2)}deg) rotateY(${sphereRotationY.toFixed(2)}deg) rotateZ(0deg)`;
        }
        sphereFrame = requestAnimationFrame(animateSphere);
      }

      function shuffleRestaurants(items) {
        return [...items].sort(() => Math.random() - 0.5);
      }

      function buildRollingReel() {
        const pool = getFilteredRestaurants();
        return shuffleRestaurants(pool).slice(0, Math.min(REEL_LENGTH, pool.length));
      }

      function buildFinalReel(finalRestaurant) {
        const pool = getFilteredRestaurants();
        return [finalRestaurant].concat(
          shuffleRestaurants(pool.filter((restaurant) => restaurant.id !== finalRestaurant.id))
            .slice(0, Math.min(REEL_LENGTH - 1, Math.max(pool.length - 1, 0))),
        );
      }

          .join("；")

      function pickRestaurant() {
