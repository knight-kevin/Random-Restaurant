        const groups = favorites.reduce((bucket, favorite) => {
          const key = new Intl.DateTimeFormat("zh-CN", { year: "numeric", month: "2-digit", day: "2-digit" })
            .format(new Date(favorite.favoritedAt || Date.now()));
          if (!bucket.has(key)) bucket.set(key, []);
          bucket.get(key).push(favorite);
          return bucket;
        }, new Map());
        elements.favoritesList.innerHTML = [...groups.entries()].map(([date, items]) => `
          <section class="timeline-group">
            <div class="timeline-date">${escapeHtml(date)}</div>
            ${items.map(renderFavoriteTimelineCard).join("")}
          </section>
        `).join("");
      }

      function renderFavoriteTimelineCard(favorite) {
        const expanded = expandedFavoriteIds.has(favorite.id);
        const category = getCategoryLabel(favorite.category || inferCategory({
          name: favorite.restaurantName,
          note: favorite.note,
          address: favorite.address,
        }));
        const district = favorite.district || getDistrict(favorite.address, favorite);
        const time = new Intl.DateTimeFormat("zh-CN", { hour: "2-digit", minute: "2-digit" })
          .format(new Date(favorite.favoritedAt || Date.now()));
        const recommendation = getRecommendationText(favorite.note || "");
        return `
          <article class="timeline-card favorite-timeline-card ${expanded ? "is-expanded" : ""}">
            <button class="timeline-summary" data-action="toggle-favorite-card" data-id="${favorite.id}" type="button">
              <span class="timeline-dot"></span>
              <span class="timeline-main">
                <strong>${escapeHtml(favorite.restaurantName)}</strong>
                <small>${escapeHtml([time, district, category].filter(Boolean).join(" · "))}</small>
                ${recommendation ? `<em>${escapeHtml(recommendation.slice(0, 42))}${recommendation.length > 42 ? "..." : ""}</em>` : ""}
              </span>
              <span class="timeline-meta">
                ${favorite.rating ? `<b>${escapeHtml(favorite.rating)}</b>` : ""}
                <i>已收藏</i>
              </span>
            </button>
            <div class="timeline-detail" ${expanded ? "" : "hidden"}>
              <p>${escapeHtml(formatLocation(favorite.address, favorite))}</p>
              <div class="tag-line">
                <span class="mini-tag">${escapeHtml(category)}</span>
                ${favorite.rating ? `<span class="mini-tag">高德 ${escapeHtml(favorite.rating)} 分</span>` : ""}
                ${favorite.source ? `<span class="mini-tag">${escapeHtml(favorite.source)}${favorite.rank ? ` #${escapeHtml(String(favorite.rank))}` : ""}</span>` : ""}
              </div>
              ${recommendation ? `<p class="muted">${escapeHtml(recommendation)}</p>` : ""}
              <div class="row-actions">
                <button class="map-action" data-action="open-map" data-id="${favorite.id}" type="button">打开地图</button>
                <button class="danger-action" data-action="remove-favorite" data-id="${favorite.id}" type="button">取消收藏</button>
              </div>
            </div>
          </article>
        `;
      }

      function handleFavoritesClick(event) {
        const button = event.target.closest("button");
        if (!button) return;
        if (button.dataset.action === "toggle-favorite-card") {
          if (expandedFavoriteIds.has(button.dataset.id)) expandedFavoriteIds.delete(button.dataset.id);
          else expandedFavoriteIds.add(button.dataset.id);
          renderFavorites();
          return;
        }
        if (button.dataset.action === "open-map") {
          const favorite = favorites.find((item) => item.id === button.dataset.id);
          if (favorite) openMapPicker({ ...favorite, name: favorite.restaurantName });
          return;
        }
        if (button.dataset.action !== "remove-favorite") return;
        favorites = favorites.filter((favorite) => favorite.id !== button.dataset.id);
        expandedFavoriteIds.delete(button.dataset.id);
        favoritesDirty = true;
        showMessage("已取消收藏。");
        render();
      }

      function getReview(record) {
        return record.review || {
          taste: 0,
          service: 0,
          value: 0,
          environment: 0,
          comment: record.thought || "",
          images: [],
        };
      }

      function hasReview(record) {
        const review = getReview(record);
        return Boolean(review.comment || review.taste || review.service || review.value || review.environment || review.images?.length);
      }

      function getAverageRating(review) {
        const scores = [review.taste, review.service, review.value, review.environment]
          .map((score) => Number(score) || 0)
          .filter((score) => score > 0);
        if (!scores.length) return "";
        return (scores.reduce((sum, score) => sum + score, 0) / scores.length).toFixed(1);
      }

      function renderRatingSummary(record) {
        if (!hasReview(record)) return "";
        const review = getReview(record);
        const average = getAverageRating(review);
        return `
          <div class="rating-summary">
            ${average ? `<strong>综合 ${escapeHtml(average)} / 5</strong>` : ""}
            <div class="rating-grid">
              ${renderRatingChip("口味", review.taste)}
              ${renderRatingChip("服务", review.service)}
              ${renderRatingChip("性价比", review.value)}
              ${renderRatingChip("环境", review.environment)}
            </div>
            ${review.comment ? `<p class="thought-text">${escapeHtml(review.comment)}</p>` : ""}
            ${renderReviewImages(review.images)}
          </div>
        `;
      }

      function renderRatingChip(label, score) {
        return `<div class="rating-chip"><span>${label}</span>${score ? `${"★".repeat(Number(score))}<small>${score}/5</small>` : "未评"}</div>`;
      }

      function renderReviewForm(record) {
        const review = getReview(record);
        return `
          <form class="review-form" data-review-form="${record.id}">
            <div class="review-score-grid">
              ${renderScoreSelect("taste", "口味", review.taste)}
              ${renderScoreSelect("service", "服务", review.service)}
              ${renderScoreSelect("value", "性价比", review.value)}
              ${renderScoreSelect("environment", "环境", review.environment)}
            </div>
            <label><span>点评</span><textarea name="comment" rows="3" placeholder="这家店哪里值得记住？">${escapeHtml(review.comment || "")}</textarea></label>
            ${renderReviewImages(review.images)}
            <label><span>添加图片</span><input name="images" type="file" accept="image/*" multiple /></label>
            <p class="file-hint">最多保留 3 张，会自动压缩保存在本机。</p>
            <div class="form-actions">
              <button class="secondary-action" type="submit">保存评价</button>
              <button class="ghost-action" data-action="cancel-review" data-id="${record.id}" type="button">取消</button>
            </div>
          </form>
        `;
      }

      function renderScoreSelect(name, label, value) {
        const options = ['<option value="0">未评分</option>']
          .concat([1, 2, 3, 4, 5].map((score) =>
            `<option value="${score}" ${Number(value) === score ? "selected" : ""}>${score} 分</option>`
          ))
          .join("");
        return `<label><span>${label}</span><select name="${name}">${options}</select></label>`;
      }

      function renderReviewImages(images = []) {
        if (!images.length) return "";
        return `<div class="review-images">${images.map((src) => `<img src="${escapeHtml(src)}" alt="打卡照片，点击放大" loading="lazy" data-review-image />`).join("")}</div>`;
      }

      function openImagePreview(source) {
        elements.imagePreviewContent.src = source;
        elements.imagePreview.hidden = false;
        document.body.classList.add("is-image-preview-open");
      }

      function closeImagePreview() {
        elements.imagePreview.hidden = true;
        elements.imagePreviewContent.removeAttribute("src");
        document.body.classList.remove("is-image-preview-open");
      }

      function renderRestaurantForm() {
        const editingRestaurant = restaurants.find((restaurant) => restaurant.id === editingRestaurantId);
        elements.restaurantCategoryInput.innerHTML = Object.entries(CATEGORY_LABELS)
          .map(([value, label]) => `<option value="${value}">${label}</option>`)
          .join("");
        elements.restaurantCategoryInput.value = editingRestaurant
          ? (editingRestaurant.category || inferCategory(editingRestaurant))
          : "local";
        elements.submitButton.textContent = editingRestaurant ? "保存修改" : "添加餐厅";
        elements.cancelEditButton.hidden = !editingRestaurant;
      }

      function renderDataDiagnostics() {
        const changes = buildRestaurantChanges(restaurants);
        const availabilitySummary = getAvailabilitySummary(availability);
        const updateInfo = getCurrentUpdateInfo();
        restaurantHealth = getRestaurantHealthReport({
          coreRestaurants,
          restaurants,
          changes,
          currentDatasetVersion: getCityVersionParam(),
          legacyCoreRestaurantCount: getLegacyCoreRestaurantCount(),
        });
        elements.dataDiagnostics.innerHTML = `
          <div class="diagnostic-actions">
            <div>
              <p class="eyebrow">数据诊断</p>
              <h3>餐厅库健康状态</h3>
            </div>
            <div class="row-actions">
              <button class="ghost-action" data-action="restore-hidden" type="button">恢复不再推荐</button>
              <button class="ghost-action" data-action="repair-data" type="button">修复餐厅库</button>
            </div>
          </div>
          <div class="diagnostic-grid">
            ${renderDiagnosticChip("官方库", restaurantHealth.officialCount)}
            ${renderDiagnosticChip("当前城市", currentCity?.shortName || currentCity?.name || "杭州")}
            ${renderDiagnosticChip("当前可用", restaurantHealth.currentCount)}
            ${renderDiagnosticChip("用户新增", restaurantHealth.userAddedCount)}
            ${renderDiagnosticChip("用户删除", restaurantHealth.userDeletedCount)}
            ${renderDiagnosticChip("用户编辑", restaurantHealth.userOverrideCount)}
            ${renderDiagnosticChip("异常删除", restaurantHealth.suspiciousDeletedCount, restaurantHealth.suspiciousDeletedCount > 0)}
            ${renderDiagnosticChip("最近更新", updateInfo ? formatUpdateTime(updateInfo.updatedAt) : "暂无")}
            ${renderDiagnosticChip("评分门槛", updateInfo ? `${updateInfo.minRating}+` : `${currentCity?.minRating || 4}+`)}
            ${renderDiagnosticChip("数据版本", updateInfo?.version || currentCity?.version || "暂无")}
            ${renderDiagnosticChip("今日跳过", availabilitySummary.todaySkippedCount)}
            ${renderDiagnosticChip("稍后再说", availabilitySummary.deferredCount)}
            ${renderDiagnosticChip("不再推荐", availabilitySummary.hiddenCount, availabilitySummary.hiddenCount > 0)}
          </div>
          <div class="diagnostic-status">
            ${restaurantHealth.healthy ? "状态正常。版本：" : "检测到可能的旧缓存异常，可点击修复。版本："}${escapeHtml(restaurantHealth.version)}
          </div>
        `;
      }

      function renderDiagnosticChip(label, value, warning = false) {
        return `<div class="diagnostic-chip ${warning ? "is-warning" : ""}">${escapeHtml(label)}<strong>${escapeHtml(value)}</strong></div>`;
      }

      function handleDataDiagnosticsClick(event) {
        const button = event.target.closest("button");
        if (!button) return;
        if (button.dataset.action === "restore-hidden") {
          availability = restoreHiddenRestaurants(availability);
          availabilityDirty = true;
          invalidateFilterCache();
          showMessage("不再推荐列表已恢复。");
          render();
          return;
        }
        if (button.dataset.action !== "repair-data") return;
        const changes = buildRestaurantChanges(restaurants);
        const officialIds = new Set(coreRestaurants.map((restaurant) => restaurant.id));
        const repairedChanges = {
          ...changes,
          deletedIds: changes.deletedIds.filter((id) => !officialIds.has(id)),
        };
        restaurants = applyRestaurantChanges(initialRestaurants, repairedChanges);
        restaurantsDirty = true;
        invalidateFilterCache();
        showMessage("餐厅库诊断修复已完成。");
        render();
      }

      function renderRestaurants() {
        if (restaurants.length === 0) {
          elements.restaurantList.innerHTML = '<div class="empty-state">当前没有可抽取的餐厅，请先添加餐厅。</div>';
          return;
        }
        const visibleRestaurants = restaurants.slice(0, manageRenderLimit).map(hydrateRestaurantSync);
        elements.restaurantList.innerHTML = visibleRestaurants.map((restaurant) => `
          <article class="list-card ${editingRestaurantId === restaurant.id ? "is-editing" : ""}">
            <div>
              <h3>${escapeHtml(restaurant.name)}</h3>
              <p>${escapeHtml(formatLocation(restaurant.address, restaurant))}</p>
              <div class="tag-line">
                <span class="mini-tag">${escapeHtml(getCategoryLabel(restaurant.category || inferCategory(restaurant)))}</span>
                ${restaurant.source ? `<span class="mini-tag">${escapeHtml(restaurant.source)}${restaurant.rank ? ` #${escapeHtml(String(restaurant.rank))}` : ""}</span>` : ""}
              </div>
              ${restaurant.note ? `<p class="muted">${escapeHtml(restaurant.note)}</p>` : ""}
            </div>
            <div class="row-actions">
              <button class="map-action" data-action="open-map" data-id="${restaurant.id}" type="button">打开地图</button>
              <button class="ghost-action" data-action="edit" data-id="${restaurant.id}" type="button">编辑</button>
              <button class="danger-action" data-action="delete" data-id="${restaurant.id}" type="button">删除</button>
            </div>
          </article>
        `).join("") + (visibleRestaurants.length < restaurants.length ? `
          <button class="secondary-action" data-action="load-more-restaurants" type="button">
            加载更多（已显示 ${visibleRestaurants.length} / ${restaurants.length}）
          </button>
        ` : "");
      }

      function submitRestaurant(event) {
        event.preventDefault();
        const input = {
          name: elements.nameInput.value.trim(),
          address: elements.addressInput.value.trim(),
          category: elements.restaurantCategoryInput.value,
          note: elements.noteInput.value.trim(),
          province: currentCity?.province || "浙江省",
          city: currentCity?.name || "杭州市",
          cityAdcode: currentCity?.adcode || DEFAULT_CITY_ADCODE,
        };
        if (!input.name) {
          alert("餐厅名称不能为空");
          return;
        }
        if (editingRestaurantId) {
          restaurants = restaurants.map((restaurant) => restaurant.id === editingRestaurantId ? { ...restaurant, ...input } : restaurant);
          if (selectedRestaurant?.id === editingRestaurantId) selectedRestaurant = { ...selectedRestaurant, ...input };
          resetForm();
          showMessage("餐厅信息已更新。");
        } else {
          restaurants = [{
            id: createId("restaurant"),
            ...input,
            district: getDistrict(input.address, input),
            createdAt: new Date().toISOString(),
          }, ...restaurants];
          resetForm();
          showMessage("新餐厅已添加。");
        }
        restaurantsDirty = true;
        invalidateFilterCache();
        render();
      }

      function resetForm() {
        editingRestaurantId = null;
        elements.nameInput.value = "";
        elements.addressInput.value = "";
        elements.restaurantCategoryInput.value = "local";
        elements.noteInput.value = "";
      }

      function handleRestaurantListClick(event) {
        const button = event.target.closest("button");
        if (!button) return;
        if (button.dataset.action === "load-more-restaurants") {
          manageRenderLimit += MANAGE_PAGE_SIZE;
          renderRestaurants();
          return;
        }
        const restaurant = hydrateRestaurantSync(restaurants.find((item) => item.id === button.dataset.id));
        if (!restaurant) return;
        if (button.dataset.action === "open-map") {
          openMapPicker(restaurant);
          return;
        }
        if (button.dataset.action === "edit") {
          editingRestaurantId = restaurant.id;
          elements.nameInput.value = restaurant.name;
          elements.addressInput.value = restaurant.address || "";
          elements.restaurantCategoryInput.value = restaurant.category || inferCategory(restaurant);
          elements.noteInput.value = restaurant.note || "";
          elements.nameInput.focus();
          render();
        }
        if (button.dataset.action === "delete") {
          if (!confirm(`确定删除「${restaurant.name}」吗？`)) return;
          restaurants = restaurants.filter((item) => item.id !== restaurant.id);
          restaurantsDirty = true;
          invalidateFilterCache();
          if (editingRestaurantId === restaurant.id) resetForm();
          if (selectedRestaurant?.id === restaurant.id) selectedRestaurant = null;
          showMessage("餐厅已删除。");
          render();
        }
      }

      function handleHistoryClick(event) {
        const image = event.target.closest("[data-review-image]");
        if (image) {
          openImagePreview(image.currentSrc || image.src);
          return;
        }
        const button = event.target.closest("button");
        if (!button) return;
        if (button.dataset.action === "toggle-history") {
          if (expandedHistoryIds.has(button.dataset.id)) expandedHistoryIds.delete(button.dataset.id);
          else expandedHistoryIds.add(button.dataset.id);
          renderHistory();
          return;
        }
        if (button.dataset.action === "open-map") {
          const record = checkIns.find((item) => item.id === button.dataset.id);
          if (record) openMapPicker({ ...record, name: record.restaurantName });
          return;
        }
        if (button.dataset.action === "toggle-favorite") {
          const record = checkIns.find((item) => item.id === button.dataset.id);
          if (record) toggleFavorite(record);
          return;
        }
        if (button.dataset.action === "edit-review") {
          const record = checkIns.find((item) => item.id === button.dataset.id);
          if (!record) return;
          editingReviewId = record.id;
          expandedHistoryIds.add(record.id);
          render();
          return;
        }
        if (button.dataset.action === "cancel-review") {
          editingReviewId = null;
          render();
          return;
        }
        if (button.dataset.action === "delete-history") {
          checkIns = checkIns.filter((record) => record.id !== button.dataset.id);
          checkInsDirty = true;
          if (editingReviewId === button.dataset.id) editingReviewId = null;
          expandedHistoryIds.delete(button.dataset.id);
          showMessage("打卡记录已删除。");
          render();
        }
      }

      async function submitReview(event) {
        const form = event.target.closest("[data-review-form]");
        if (!form) return;
        event.preventDefault();
        const id = form.dataset.reviewForm;
        const record = checkIns.find((item) => item.id === id);
        const formData = new FormData(form);
        const existingImages = getReview(record || {}).images || [];
        const uploadedImages = await readCompressedImages(formData.getAll("images").filter((file) => file && file.size));
        const review = {
          taste: Number(formData.get("taste")) || 0,
          service: Number(formData.get("service")) || 0,
          value: Number(formData.get("value")) || 0,
          environment: Number(formData.get("environment")) || 0,
          comment: String(formData.get("comment") || "").trim(),
          images: [...existingImages, ...uploadedImages].slice(0, 3),
          updatedAt: new Date().toISOString(),
        };
        checkIns = checkIns.map((record) =>
          record.id === id ? { ...record, review, thought: review.comment } : record,
        );
        checkInsDirty = true;
        editingReviewId = null;
        expandedHistoryIds.add(id);
        showMessage(hasAnyReviewValue(review) ? "评价已保存。" : "评价已清空。");
        render();
      }

      function hasAnyReviewValue(review) {
        return Boolean(review.comment || review.taste || review.service || review.value || review.environment || review.images?.length);
      }

      function readCompressedImages(files) {
        return Promise.all(files.slice(0, 3).map((file) => compressImage(file)));
      }

      function compressImage(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const image = new Image();
            image.onload = () => {
              const maxSide = 900;
              const ratio = Math.min(1, maxSide / Math.max(image.width, image.height));
              const canvas = document.createElement("canvas");
              canvas.width = Math.max(1, Math.round(image.width * ratio));
              canvas.height = Math.max(1, Math.round(image.height * ratio));
              const context = canvas.getContext("2d");
              context.drawImage(image, 0, 0, canvas.width, canvas.height);
              resolve(canvas.toDataURL("image/jpeg", 0.72));
            };
            image.onerror = reject;
            image.src = reader.result;
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function clearHistory() {
        if (checkIns.length === 0) return;
        if (!confirm("确定清空全部打卡记录吗？此操作不可撤销。")) return;
        checkIns = [];
        expandedHistoryIds.clear();
        checkInsDirty = true;
        editingReviewId = null;
        showMessage("打卡历史已清空。");
        render();
      }
    </script>
  </body>
</html>
