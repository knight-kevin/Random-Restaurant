  <style>
    :root {

      --accent: #8c3f2b;
      --chip: #efe5d8;
      --panel: #fffaf3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(247, 244, 239, .94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 18px clamp(16px, 3vw, 34px);
    }
    h1 { margin: 0; font-size: 22px; letter-spacing: 0; }
    .sub { margin: 6px 0 0; color: var(--muted); }
    main { padding: 18px clamp(16px, 3vw, 34px) 40px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
    }
    input, select {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
      min-width: 190px;
    }
    .count { color: var(--muted); }
    section {
      margin: 18px 0 24px;
      border-top: 2px solid var(--ink);
    }
    h2 {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin: 14px 0 8px;
      font-size: 18px;
    }
    h2 span { color: var(--muted); font-size: 13px; font-weight: 500; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--line);
    }
    th, td {
      padding: 10px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #efe8dc;
      font-size: 13px;
      white-space: nowrap;
    }
    td.num { width: 48px; color: var(--muted); }
    td.biz { width: 110px; color: var(--muted); }
    td.type { width: 120px; }
    .actions { min-width: 176px; }
    a {
      display: inline-block;
      margin: 0 8px 6px 0;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(140, 63, 43, .35);
    }
    .tag {
      display: inline-block;
      background: var(--chip);
      border-radius: 999px;
      padding: 2px 8px;
      color: #5d5145;
      font-size: 12px;
    }
    .note {
      margin: 14px 0 0;
      color: var(--muted);
      max-width: 980px;
    }
    @media (max-width: 820px) {
      table, thead, tbody, th, tr, td { display: block; }
      thead { display: none; }
      tr { border-bottom: 1px solid var(--line); padding: 8px 0; }
      td { border: 0; padding: 4px 10px; }
      td::before {
        content: attr(data-label);
        display: inline-block;
        width: 76px;
        color: var(--muted);
      }
      td.dishes::before, td.actions::before { vertical-align: top; }
    }
  </style>
</head>

    ];

    const excluded = [
      "肯德基", "麦当劳", "必胜客", "汉堡王", "一席地本地鸡窝", "传统韩家（已关）", "杨国福麻辣烫",
      "渝八两鸡公煲", "永旺夜市", "红盔甲", "郭淑芬自助老火锅", "先启半步颠", "木屋烧烤",
      "老头儿油爆虾", "吃饭皇帝大", "很久以前羊肉串"
    ];

    const q = document.querySelector("#q");
    const district = document.querySelector("#district");
    const app = document.querySelector("#app");
    const count = document.querySelector("#count");

    function link(url, label) {
      return `<a target="_blank" rel="noreferrer" href="${url}">${label}</a>`;
    }
    function esc(s) {
      return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }
    function searchText(r) {
      return `杭州 ${r.name} ${r.biz}`;
    }
    function render() {
      const keyword = q.value.trim().toLowerCase();
      const d = district.value;
      const filtered = restaurants.filter(r => {
        const blob = `${r.name} ${r.biz} ${r.district} ${r.type} ${r.dishes}`.toLowerCase();
        return (!d || r.district === d) && (!keyword || blob.includes(keyword));
      });
      count.textContent = `${filtered.length} 家，已剔除 ${excluded.length} 个连锁/关停/综合夜市项`;
      const groups = filtered.reduce((acc, r) => {
        (acc[r.district] ||= []).push(r);
        return acc;
      }, {});
      app.innerHTML = Object.entries(groups).map(([name, rows]) => `
        <section>
          <h2>${esc(name)} <span>${rows.length} 家</span></h2>
          <table>
            <thead>
              <tr><th>序号</th><th>店名</th><th>原商圈/位置</th><th>种类</th><th>推荐菜</th><th>位置与门头</th></tr>
            </thead>
            <tbody>
              ${rows.sort((a,b) => a.n - b.n).map(r => {
                const base = encodeURIComponent(searchText(r));
                const img = encodeURIComponent(`${searchText(r)} 门头 招牌`);
                return `<tr>
                  <td class="num" data-label="序号">${r.n}</td>
                  <td data-label="店名"><strong>${esc(r.name)}</strong></td>
                  <td class="biz" data-label="商圈">${esc(r.biz)}</td>
                  <td class="type" data-label="种类"><span class="tag">${esc(r.type)}</span></td>
                  <td class="dishes" data-label="推荐菜">${esc(r.dishes)}</td>
                  <td class="actions" data-label="检索">
                    ${link(`https://ditu.amap.com/search?query=${base}`, "高德位置")}
                    ${link(`https://map.baidu.com/search/${base}`, "百度位置")}
                    ${link(`https://www.bing.com/images/search?q=${img}`, "门头图片")}
                  </td>
                </tr>`;
              }).join("")}
            </tbody>
          </table>
        </section>
      `).join("");
    }

    const districts = [...new Set(restaurants.map(r => r.district))].sort((a, b) => a.localeCompare(b, "zh-CN"));
    district.innerHTML = `<option value="">全部区域</option>` + districts.map(d => `<option value="${esc(d)}">${esc(d)}</option>`).join("");
    q.addEventListener("input", render);
    district.addEventListener("change", render);
    render();
  </script>
</body>
</html>
