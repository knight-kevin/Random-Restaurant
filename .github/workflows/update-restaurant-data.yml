name: Update restaurant data

on:
  workflow_dispatch:
    inputs:
      city_adcode:
        description: "City to update: all, 330100, or 331000"
        required: false
        default: "all"
  schedule:
    - cron: "0 18 * * 0"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update city data
        env:
          AMAP_KEY: ${{ secrets.AMAP_KEY }}
          REQUEST_DELAY_MS: "360"
          MAX_PAGES: "5"
        run: |
          CITY_ADCODE="${{ github.event.inputs.city_adcode || 'all' }}"
          node scripts/update-city-data.cjs --city="${CITY_ADCODE}"

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cities.json data/cities data/update-manifest.json restaurants-index.json restaurants-details.json image-match-report.json
          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
          else
            git commit -m "chore: update restaurant data"
            git push
          fi
